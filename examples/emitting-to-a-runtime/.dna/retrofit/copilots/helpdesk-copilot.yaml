apiVersion: github.com/ruinosus/dna/v1
kind: Copilot
metadata:
  name: helpdesk-copilot
  description: >-
    A workflow-shaped Microsoft Agent Framework copilot, shaped after the
    foundry reference's /helpdesk workflow — a triage->retrieve->resolve step
    chain with a workflow-level human-approval escalation node, over an
    RBAC-governed MCP registry and 3-dimension inbound tenant. Retrofit
    validation target for the agent-framework emitter.
spec:
  mounts:
  - id: helpdesk
    agent: helpdesk-agent
    path: /agui
  serving:
    transport: ag-ui
  tenant:
    propagate: true
  hitl:
    approval_card:
      title: Approve escalation
      details_from: args.summary
  workflow:
    chain:
    - triage
    - retrieve
    - resolve
