apiVersion: github.com/ruinosus/dna/v1
kind: Copilot
metadata:
  name: memory-copilot
  description: A servable AG-UI memory copilot — mounts memory-agent, propagates
    DNA's 3-dimension inbound tenant (tenant + workspace + oid), gates writes
    with an approval card, and may read the knowledge-base collection.
spec:
  mounts:
  - id: memory
    agent: memory-agent
    path: /agui
  serving:
    transport: ag-ui
  tenant:
    propagate: true
  hitl:
    approval_card:
      title: Confirm write
      details_from: args.text
      reason_from: args.reason
  knowledge:
    collections:
    - knowledge-base
    store:
      backend: pgvector
      ref: primary-pg
      embed:
        model: text-embedding-3-small
        dims: 1536
  persistence:
    checkpoint:
      backend: postgres
      ref: primary-pg
    memory:
      backend: postgres
      ref: primary-pg
    cache:
      backend: null
  hosting:
    mode: self-hosted
    target: foundry
    resources:
      cpu: "0.5"
      memory: 1Gi
    image:
      registry_hint: acr
      remote_build: true
      base_image: null
      port: null
    env:
      LOG_LEVEL: info
    stores:
      postgres: required
      redis: required
  frontend:
    console: copilotkit
    panels:
    - memory-timeline
    suggested_prompts:
    - What did I ask you to remember?
