apiVersion: github.com/ruinosus/dna/v1
kind: Copilot
metadata:
  name: memory-copilot
  description: A servable AG-UI memory copilot — mounts memory-agent, propagates
    inbound tenant, gates writes with an approval card, and may read the
    aap-knowledge-base collection.
spec:
  mounts:
  - id: memory
    agent: memory-agent
    path: /agui
  serving:
    transport: ag-ui
  tenant:
    propagate: true
  hitl:
    approval_card:
      title: Confirm write
      details_from: args.text
      reason_from: args.reason
  knowledge:
    collections:
    - aap-knowledge-base
  frontend:
    console: copilotkit
    panels:
    - memory-timeline
    suggested_prompts:
    - What did I ask you to remember?
