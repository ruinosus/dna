apiVersion: github.com/ruinosus/dna/testkit/v1
kind: TestGuide
metadata:
  name: tg-kz001-close
spec:
  description: Roteiro de teste de s-cli-localresolver-consistency (derivado das acceptance_criteria).
  kind_of_test: smoke
  status: active
  steps:
  - action: "No Studio, valide: Given a scope with a local:<lib-scope> dep, When the\
      \ CLI boot path (dna eval run) builds the kernel and resolves the manifest,\
      \ Then the local: dep resolves (LocalResolver present) \u2014 same result as\
      \ Kernel.quick."
    where: "<rota/tela \u2014 ex. /scopes/:scope/...>"
    expected: "<o que voc\xEA V\xCA quando est\xE1 certo (marque \u2717 S\xD3 se estiver\
      \ quebrado)>"
  - action: 'No Studio, valide: Given a non-filesystem source (sqlite/postgres) with
      no resolvable base_dir, When the CLI boots, Then no LocalResolver is wired (documented
      no-op) and boot does not error.'
    where: "<rota/tela \u2014 ex. /scopes/:scope/...>"
    expected: "<o que voc\xEA V\xCA quando est\xE1 certo (marque \u2717 S\xD3 se estiver\
      \ quebrado)>"
  - action: 'No Studio, valide: Given Kernel.quick for the same scenario, When it
      resolves the manifest, Then it still resolves the local: dep (no regression).'
    where: "<rota/tela \u2014 ex. /scopes/:scope/...>"
    expected: "<o que voc\xEA V\xCA quando est\xE1 certo (marque \u2717 S\xD3 se estiver\
      \ quebrado)>"
  verifies:
  - Story/s-cli-localresolver-consistency
