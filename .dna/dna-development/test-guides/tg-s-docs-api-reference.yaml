apiVersion: github.com/ruinosus/dna/testkit/v1
kind: TestGuide
metadata:
  name: tg-s-docs-api-reference
spec:
  description: Manual + CI gates for the source-generated API reference (Py mkdocstrings,
    TS TypeDoc, CLI/Kinds generators) wired into the MkDocs site.
  kind_of_test: manual
  status: active
  steps:
  - action: pip install -r requirements-docs.txt && pip install -e packages/sdk-py
      -e packages/cli
    expected: deps install clean
  - action: python scripts/gen_cli_docs.py --check && python scripts/gen_kinds_docs.py
      --check
    expected: generators idempotent (exit 0)
  - action: cd packages/sdk-ts && bun run docs:api
    expected: TypeDoc emits deterministic markdown to docs/reference/typescript/
  - action: cd packages/sdk-ts && bun run typecheck
    expected: tsc --noEmit clean
  - action: mkdocs build --strict
    expected: site builds with 0 warnings
  - action: python3 scripts/brand_guard.py --self-test && python3 scripts/brand_guard.py
    expected: no forbidden brand tokens
  verifies:
  - Story/s-docs-api-reference
  created_at: '2026-07-09T15:27:09+00:00'
  updated_at: '2026-07-09T15:27:09+00:00'
