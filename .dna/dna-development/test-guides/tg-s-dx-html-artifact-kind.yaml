apiVersion: github.com/ruinosus/dna/testkit/v1
kind: TestGuide
metadata:
  name: tg-s-dx-html-artifact-kind
spec:
  description: "Smoke: HtmlArtifact Kind end-to-end \u2014 create from HTML file (byte-faithful),\
    \ link to a work item via produces, list/show."
  kind_of_test: smoke
  status: active
  steps:
  - action: dna sdlc artifact create ha-e-dna-dx-design --from <design.html> --title
      ... --source ...
    expected: CREATED HtmlArtifact/ha-e-dna-dx-design; .dna/dna-development/html-artifacts/ha-e-dna-dx-design/ARTIFACT.html
      is byte-identical to the source file (diff empty)
  - action: dna sdlc produces add Epic/e-dna-dx HtmlArtifact/ha-e-dna-dx-design --role
      design-doc
    expected: Epic/e-dna-dx produces -> HtmlArtifact/ha-e-dna-dx-design
  - action: dna sdlc produces list Epic/e-dna-dx
    expected: "lists 'HtmlArtifact ha-e-dna-dx-design . design-doc' \u2014 the epic\
      \ resolves its own design doc"
  - action: dna sdlc artifact show ha-e-dna-dx-design
    expected: prints title/description/source/created_at + html_bytes; --html dumps
      the raw page verbatim
  verifies:
  - Story/s-dx-html-artifact-kind
  created_at: '2026-07-11T07:30:27+00:00'
  updated_at: '2026-07-11T07:30:27+00:00'
  owner: claude-code
