apiVersion: github.com/ruinosus/dna/testkit/v1
kind: TestGuide
metadata:
  name: tg-mcp-remote-transport
spec:
  description: "Verify the DNA MCP server is reachable over Streamable HTTP (remote/web\
    \ clients) \u2014 same tools/resources as the stdio MVP."
  kind_of_test: integration
  status: active
  steps:
  - action: Run pytest packages/cli/tests/test_mcp_transport.py
    expected: "2 passed \u2014 a web-style FastMCP Client over an http:// URL reaches\
      \ all 10 tools + the manifest resource and composes a prompt live; the serve\
      \ CLI exposes --transport http + --host/--port"
  - action: dna mcp serve --transport http --host 127.0.0.1 --port 8000
    expected: FastMCP serves the MCP endpoint at http://127.0.0.1:8000/mcp/ (Streamable
      HTTP, no new transport code)
  - action: Point a remote/web MCP client (Claude web/ChatGPT config {type:http,url:.../mcp/})
      at the endpoint
    expected: client reaches the same tools/resources as stdio
  - action: mkdocs build --strict
    expected: exit 0 (mcp-server guide remote section + regenerated CLI reference
      build clean)
  verifies:
  - Story/s-mcp-remote-transport
  created_at: '2026-07-11T15:47:18+00:00'
  updated_at: '2026-07-11T15:47:18+00:00'
  owner: claude-code
