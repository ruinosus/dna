apiVersion: github.com/ruinosus/dna/testkit/v1
kind: TestGuide
metadata:
  name: tg-sdlc-gallery
spec:
  description: "Product smoke do dna sdlc gallery: painel board-native lista os HtmlArtifacts\
    \ agrupados por status + --html gera o painel naveg\xE1vel com os 5 prot\xF3tipos."
  kind_of_test: smoke
  status: active
  steps:
  - action: Rodar 'dna sdlc gallery --scope dna-development'
    expected: "painel lista os 6 HtmlArtifacts agrupados em Decis\xF5es / Shipado\
      \ / Em andamento; cada card mostra work item, status e link publicado"
  - action: "Conferir bucket Decis\xF5es"
    expected: "ha-dna-vs-agentframework aparece sob 'Decis\xF5es' linkado a ADR/adr-dna-pivot-portability\
      \ [accepted]"
  - action: Rodar 'dna sdlc gallery --html /tmp/panel.html' e abrir no browser
    expected: "UM arquivo self-contained (sem CDN), cards por artifact com chip de\
      \ status colorido, 5 links 'Abrir artifact \u2197' clic\xE1veis pros claude.ai\
      \ artifacts"
  - action: "Conferir os 5 prot\xF3tipos registrados"
    expected: ha-dna-dx-antes-depois, ha-tenant-overlays, ha-dna-vs-agentframework,
      ha-build-emit-vs-runtime, ha-dna-panel todos presentes com published_url
  verifies:
  - Story/s-sdlc-gallery
  created_at: '2026-07-11T14:46:15+00:00'
  updated_at: '2026-07-11T14:46:15+00:00'
