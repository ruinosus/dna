apiVersion: github.com/ruinosus/dna/testkit/v1
kind: TestGuide
metadata:
  name: tg-s-mcp-idp-pluggable-c
spec:
  description: 'Verifica a camada N-provider config-driven do MCP: parse por-tipo,
    routing multi-issuer, claim->tenant por provider, e2e 2-providers emulados, e
    o defer do Entra e2e pro azd up.'
  kind_of_test: integration
  status: active
  steps:
  - action: parse_auth_providers aplica defaults por tipo (entra=tid, clerk/workos=org_id)
      + deriva JWKS do issuer + relaxa Entra common
    expected: test_entra_defaults_* + test_clerk_and_workos_default_org_id_claim verdes
  - action: generic oidc exige tenant_claim; provider sem type/tipo desconhecido/sem
      key source falham loud
    expected: test_generic_oidc_requires_tenant_claim + fail-loud tests verdes
  - action: 'dna.config.yaml carrega auth: como passthrough opaco (Py+TS) e providers_from_config
      parseia'
    expected: test_dna_config_passthrough_and_providers_from_config verde
  - action: 'e2e: 2 IdPs OIDC emulados (claims ''tenant'' e ''org'') no MESMO server;
      cada token resolve pro tenant certo'
    expected: test_two_providers_each_resolve_their_own_tenant verde
  - action: issuer nao-configurado negado; cross-tenant negado; PRM lista os 2 issuers
    expected: test_unconfigured_issuer_denied + test_cross_tenant_denied_multi_provider
      + test_prm_advertises_all_provider_issuers verdes
  - action: Entra e2e real (login Azure->token->server) DEFERIDO pro azd up
    expected: test_entra_end_to_end_real_login SKIPPED sem DNA_MCP_ENTRA_E2E (documentado
      no guia)
  verifies:
  - Story/s-mcp-idp-pluggable
  created_at: '2026-07-11T16:38:32+00:00'
  updated_at: '2026-07-11T16:38:32+00:00'
  owner: claude-code
