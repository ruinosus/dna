metadata:
  name: tg-speckit-mcp-apps-sdk
spec:
  description: "Test-gate do lado SDK do card de mem\xF3ria MCP Apps (spec 001-mcp-apps-memory-card):\
    \ golden byte-stable do template + declara\xE7\xE3o com resourceUri + resources/read\
    \ com mimeType da spec + template sem dados/sem URL externa + grep-guard \xA7\
    3 + degrada\xE7\xE3o byte-id\xEAntica + smoke de render real no basic-host do\
    \ ext-apps"
  kind_of_test: regression
  status: active
  steps:
  - action: python -m pytest packages/sdk-py/tests/test_emit_mcp_ui.py packages/cli/tests/test_mcp_apps.py
      -v
    expected: "17 testes verdes cobrindo as muta\xE7\xF5es do design (pointer removido,\
      \ registro removido, dados assados, CDN plantado, TODO plantado \u2014 cada\
      \ uma morre)"
  - action: python -m pytest packages/sdk-py/tests packages/cli/tests
    expected: "su\xEDtes completas verdes contra a baseline (nenhuma falha nova)"
  - action: 'dna mcp serve --transport http + basic-host do ext-apps + chrome headless:
      list_memories, recall e empty state'
    expected: "card renderiza dados reais, hits e o empty state honesto; zero elementos\
      \ interativos (s\xF3 leitura)"
