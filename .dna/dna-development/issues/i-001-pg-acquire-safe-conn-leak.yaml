apiVersion: github.com/ruinosus/dna/sdlc/v1
kind: Issue
metadata:
  name: i-001-pg-acquire-safe-conn-leak
spec:
  description: "PostgresSource._acquire_safe (dna/adapters/postgres/source.py) leaks\
    \ the pooled connection when the block raises anything OTHER than CancelledError/InterfaceError:\
    \ the except clause only covers those two, and the else clause only runs on success\
    \ \u2014 a generic exception (e.g. a writer/hook failure inside save_document)\
    \ never releases the connection back to the pool. Symptom: Pool.close() hangs\
    \ >60s (asyncpg 'unreleased connections' warning); found via test_postgres_source.py::TestPhase15_1OutboxWrites::test_write_atomicity_no_partial_state\
    \ whose teardown times out against a live PG. Fix: release in a finally (terminate+discard\
    \ only on the cancel/interface paths). Test is temporarily @pytest.mark.skip'ed\
    \ referencing this issue (s-public-ci) \u2014 un-skip when fixed. NOTE: file is\
    \ in the SqlAlchemySource agent work area (adapters/), hence not fixed by the\
    \ CI story."
  type: bug
  severity: medium
  status: resolved
  owner: claude-code
  timeline:
  - at: '2026-07-08T19:17:48+00:00'
    actor: claude-code
    type: status_change
    source: cli
    to: open
  - at: '2026-07-10T13:23:14+00:00'
    actor: claude-code
    type: status_change
    source: cli
    from: open
    to: resolved
    summary: "Resolvida por REMO\xC7\xC3O do c\xF3digo afetado (s-retire-raw-sql-adapters):\
      \ PostgresSource._acquire_safe deixou de existir \u2014 o adapter cru inteiro\
      \ (adapters/postgres/source.py) foi removido e o caminho SQL Python \xE9 o SqlAlchemySource,\
      \ cujo pooling \xE9 do SQLAlchemy (release em finally \xE9 responsabilidade\
      \ do engine, n\xE3o de c\xF3digo nosso). N\xE3o \xE9 um fix do defeito em si\
      \ \u2014 o defeito morreu com o c\xF3digo. Prova de que o substituto n\xE3o\
      \ apresenta a classe do problema: a matriz de conformance + test_sqlalchemy_source\
      \ (incl. test_pg_write_atomicity / rollback sem outbox fantasma) passam contra\
      \ PG real, incluindo o cen\xE1rio bundle_entry_round_trip que o pool cru travava\
      \ (i-093-class) \u2014 2850 passed com DATABASE_URL vivo. O teste skipado que\
      \ referia esta issue (test_postgres_source.py::test_write_atomicity_no_partial_state)\
      \ foi removido junto com o arquivo; o cen\xE1rio equivalente vive em test_sqlalchemy_source\
      \ e passa."
  closed_at: '2026-07-10T13:23:14+00:00'
  resolution: "Resolvida por REMO\xC7\xC3O do c\xF3digo afetado (s-retire-raw-sql-adapters):\
    \ PostgresSource._acquire_safe deixou de existir \u2014 o adapter cru inteiro\
    \ (adapters/postgres/source.py) foi removido e o caminho SQL Python \xE9 o SqlAlchemySource,\
    \ cujo pooling \xE9 do SQLAlchemy (release em finally \xE9 responsabilidade do\
    \ engine, n\xE3o de c\xF3digo nosso). N\xE3o \xE9 um fix do defeito em si \u2014\
    \ o defeito morreu com o c\xF3digo. Prova de que o substituto n\xE3o apresenta\
    \ a classe do problema: a matriz de conformance + test_sqlalchemy_source (incl.\
    \ test_pg_write_atomicity / rollback sem outbox fantasma) passam contra PG real,\
    \ incluindo o cen\xE1rio bundle_entry_round_trip que o pool cru travava (i-093-class)\
    \ \u2014 2850 passed com DATABASE_URL vivo. O teste skipado que referia esta issue\
    \ (test_postgres_source.py::test_write_atomicity_no_partial_state) foi removido\
    \ junto com o arquivo; o cen\xE1rio equivalente vive em test_sqlalchemy_source\
    \ e passa."
  produces:
