    \ e forward-only (adapters/_migrations.py itera sorted(migrations) e pula versoes\
    \ ja aplicadas); _preflight_edges + _apply_edges + call sites em scripts/migrate_engram_postgres.py;\
    \ os dois testes edges-only e os trechos de edges no teste de migracao limpa;\
    \ as 4 mencoes em docs/guides/engram-postgres-cutover.md; a mencao em migrate_lesson_learned_to_engram.py;\
