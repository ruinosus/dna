    source: cli
    from: open
    to: in-progress
  - at: '2026-07-13T09:14:09+00:00'
    actor: claude-code
    type: comment
    source: cli
    summary: "Root cause confirmado: source_sync.py:89 chama kp.canonical_digest(doc);\
      \ o metodo so existia em KindBase, nao em DeclarativeKindPort \u2014 AttributeError\
      \ em todo Kind descriptor (F3), matando digest_manifest/diff_manifests/push_scope\
      \ (dna source diff/push). Repro fixado ao vivo em IntelSource antes/depois."
  - at: '2026-07-13T09:14:29+00:00'
    actor: claude-code
    type: comment
    source: cli
    summary: "Fix aplicado (Py): DeclarativeKindPort agora COMPARTILHA os metodos\
      \ canonicos do KindBase por referencia direta de funcao (_canonical_spec = KindBase._canonical_spec;\
      \ canonical_digest = KindBase.canonical_digest) \u2014 mesmo objeto de codigo,\
      \ zero copia divergente. Usa self.VOLATILE_SPEC_FIELDS (defaults do KindBase\
      \ + extras do descriptor) e self.kind, ja montados no __init__. Verificado ao\
      \ vivo: digest de um doc IntelSource == digest de um KindBase equivalente (byte-identico)."
  - at: '2026-07-13T09:14:33+00:00'
    actor: claude-code
    type: comment
    source: cli
    summary: "Paridade Py<->TS: o gemeo TS tinha a MESMA lacuna (KindBase.canonicalDigest\
      \ existe, DeclarativeKindPort nao). TS ainda NAO exercita source-sync (sem digestManifest/pushScope;\
      \ canonicalDigest nem esta na interface KindPort) \u2014 lacuna latente, sem\
      \ crash. Ainda assim, para manter paridade extrai o algoritmo do KindBase em\
      \ helpers de modulo (canonicalSpecOf/canonicalDigestOf) e liguei KindBase E\
      \ DeclarativeKindPort neles (codigo unico, sem copia). Futuro-prova um caminho\
      \ de source-sync TS."
