apiVersion: github.com/ruinosus/dna/sdlc/v1
kind: Issue
metadata:
  name: i-030-declarative-canonical-digest
spec:
  description: 'DeclarativeKindPort sem canonical_digest -> dna source push/diff crasham
    em Kinds descriptor (F3) -> caminho FS->Postgres morto. Fix: compartilhar a implementacao
    canonica do KindBase usando VOLATILE_SPEC_FIELDS que o port ja expoe. Ref spike
    sp-postgres-substrate.'
  type: bug
  severity: high
  status: in-progress
  related_feature: f-dna-cloud-intelligence
  timeline:
  - at: '2026-07-13T09:13:40+00:00'
    actor: claude-code
    type: status_change
    source: cli
    to: open
  - at: '2026-07-13T09:14:06+00:00'
    actor: claude-code
