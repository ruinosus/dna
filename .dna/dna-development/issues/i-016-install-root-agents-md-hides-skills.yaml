    \ only + probe expl\xEDcito da raiz AGENTS.md); o install precisa de fix pr\xF3\
    prio \u2014 ex.: claim de doc single-file (AGENTS.md) n\xE3o deveria bloquear\
    \ a recurs\xE3o nos subdirs, s\xF3 claim de bundle-dir (Skill)."
