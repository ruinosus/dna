    source: cli
    from: open
    to: resolved
    summary: 'PR #197, v0.22.0. Lookup pelo alias DECLARADO do registro; fallback
      OPEN barulhento (UserWarning nomeando Kind + politica assumida); detector de
      typo no build. Alias quebrado derruba teste. Restante (politica no KindPort)
      e a i-049, que tambem cobre a assimetria leitura/escrita achada no caminho.'
  closed_at: '2026-07-21T14:05:50+00:00'
