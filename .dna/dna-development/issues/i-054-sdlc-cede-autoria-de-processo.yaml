    \ flow por feature para nao gerar plano duplo. O split i-052 e o veiculo natural.\
    \ Superpowers local esta 4 minors atras (5.0.2 vs 6.1.1, ~2x mais rapido) \u2014\
    \ atualizar via /plugin install superpowers@claude-plugins-official e conferir\
    \ .gitignore para .worktrees/."
