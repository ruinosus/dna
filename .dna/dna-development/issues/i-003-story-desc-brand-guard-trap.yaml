    \ SDK' / 'the source project', nunca o nome proibido. Op\xE7\xE3o t\xE9cnica futura:\
    \ brand_guard poderia ter allowlist de contexto pra descri\xE7\xF5es de story,\
    \ MAS isso enfraquece o guard \u2014 prefiro a disciplina de escrita. Registrar\
    \ aqui pra n\xE3o recorrer."
