  findings: "MEIO real, meio aspiracional. DNA JA entrega proveniencia de CAMADA (resolve_document\
    \ -> ResolutionPath: layers consultados, found/contributed, effective_layer, is_inherited\
    \ + has_overlay/overlay_fields inline; paridade Py/TS, testado) \u2014 folder\
    \ de YAML nao responde nada disso. MAS proveniencia por-SECAO do prompt NAO existe\
    \ no surface: build_prompt devolve string plana; sem build_prompt(explain=True)\
    \ nem 'dna explain'. O mapa secao->artefato+hash+versao+layer eh reconstruivel\
    \ em ~200 linhas dos proprios blocos do kernel (layout template + dep_filters\
    \ + flatten), provado com gate byte-a-byte vs build_prompt. Gaps: (1) sem explain\
    \ no CLI/SDK; (2) resolve_document library-only; (3) version_sha=None no FS source;\
    \ (4) ordem declarada de guardrails nao preservada; (5) Document sem hash/file-path,\
    \ doc.origin fica 'local' ate no doc sobrescrito."
  recommendation: 'Promover o renderer pro engine: build_prompt(explain=True) devolvendo
