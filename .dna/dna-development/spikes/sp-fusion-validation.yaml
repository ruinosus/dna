    summary: "DESENHO TRAVADO: apps = copiloto-medico (prim\xE1rio, novo contexto)\
      \ + DNA (meta). Crit\xE9rio = '1 insight que faz agir'. 5-8 insights/app ranqueados\
      \ por relev\xE2ncia ao contexto.\n\nOBSERVA\xC7\xC3O META (o bra\xE7o DNA J\xC1\
      \ PASSOU): as 2 deep-researches (research autom\xE1tico sobre o contexto do\
      \ DNA) produziram insights acion\xE1veis (rec-lead-definitions, rec-fusion-bet,\
      \ rec-validate-noise) que fizeram o Barna AGIR \u2014 confirmar a aposta na\
      \ fus\xE3o + lan\xE7ar ESTE experimento. Ou seja: research autom\xE1tico \u2192\
      \ insight \u2192 a\xE7\xE3o = a fus\xE3o funcionou no DNA pelo pr\xF3prio crit\xE9\
      rio ('1 insight que faz agir'). Falta o bra\xE7o copiloto-medico (dom\xEDnio\
      \ diferente) pra testar generalidade."
