  name: sp-fusion-validation
spec:
  title: "Validar a fus\xE3o: intelig\xEAncia-de-contexto vs ru\xEDdo, no portf\xF3\
    lio real do Barna"
  question_to_answer: "A camada de intelig\xEAncia do DNA, usando o contexto REAL\
    \ do Barna (seus apps: definitions + mem\xF3ria + trabalho), produz insights que\
    \ ele julga VALIOSOS e acion\xE1veis \u2014 n\xE3o ru\xEDdo?"
  status: answered
  feature: f-dna-cloud-intelligence
  time_box_hours: 8
  research_refs:
  - rsh-dna-cloud-positioning
  - rsh-dna-cloud-intelligence
  - rsh-copiloto-medico-fusion-insights
  labels:
  - dogfood
  - research
  body: "## Hip\xF3tese\nA FUS\xC3O (contexto DNA do usu\xE1rio \u2192 insight pessoal\
    \ + acion\xE1vel) \xE9 o \xDANICO diferenci\xE1vel (as 2 pesquisas), mas \xE9\
    \ N\xC3O-PROVADA + o anti-ru\xEDdo \xE9 o maior risco. Este spike testa se ela\
    \ funciona no portf\xF3lio REAL do Barna antes de escalar.\n\n## Experimento (o\
    \ esqueleto \u2014 a moldar com o Barna)\n1. Escolher 1-2 apps REAIS do Barna.\n\
    2. Definir o CONTEXTO de cada (o que \xE9, o espa\xE7o, os objetivos) \u2014 o\
    \ input de personaliza\xE7\xE3o.\n3. Rodar research autom\xE1tico (o deep-research\
    \ harness que j\xE1 existe) por app, sobre o mundo relevante (concorrentes, aporte,\
    \ GitHub, releases, HN).\n4. Produzir INSIGHTS ranqueados pela relev\xE2ncia ao\
    \ contexto do app (n\xE3o feed gen\xE9rico).\n5. Barna JULGA cada insight: valioso\
    \ (vale saber/agir) vs ru\xEDdo.\n\n## Crit\xE9rio de sucesso (o teste anti-ru\xED\
    do)\n- Signal ratio: de N insights, % que o Barna marca valioso (threshold a definir).\n\
    - Acionabilidade: >=1 insight virou a\xE7\xE3o real (mudan\xE7a/card/decis\xE3\
    o)? Mesmo 1 = sinal forte.\n- KILL: se for majoritariamente ru\xEDdo \u2192 a\
    \ fus\xE3o falha \u2192 pivota.\n\n## Perguntas de desenho (a moldar juntos)\n\
    1. Quais 1-2 apps? 2. Qual contexto define cada? 3. O que \xE9 'valioso' pro Barna?\
    \ 4. Threshold de sucesso? 5. Quais fontes? 6. Quantos insights por run?"
