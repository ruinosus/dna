    source: cli
    summary: "Setup: Docker/colima VM disk estava corrompido (containerd content-store\
      \ I/O error no pull de postgres:16 + write error no meta.db). Fallback: subi\
      \ um Postgres 16 NATIVO dedicado (homebrew postgresql@16) numa data-dir isolada,\
