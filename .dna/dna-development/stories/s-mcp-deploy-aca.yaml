apiVersion: github.com/ruinosus/dna/sdlc/v1
kind: Story
metadata:
  name: s-mcp-deploy-aca
spec:
  title: Deploy DNA MCP on Azure Container Apps + Entra ID (azd up recipe)
  description: 'Containerize `dna mcp serve --transport http` and ship an azd/bicep
    recipe: Container App + HTTPS ingress + user-assigned Managed Identity (ACR pull,
    no secrets) + Entra-JWT auth env (DNA_MCP_JWKS_URI/ISSUER/AUDIENCE/RESOURCE_URL/AUTH_SERVERS
    + DNA_MCP_TENANT_CLAIM) + mounted DNA source. Runbook documents the Entra app
    registration + `azd up` + a post-deploy smoke (an MCP client connects over HTTPS
    with an Entra token). Owner runs the real `azd up`; local proof = az bicep build
    + docker build + serve boots.'
  status: in-progress
  feature: f-dna-hosting
  acceptance_criteria:
  - deploy/azure/Dockerfile containerizes 'dna mcp serve --transport http' on python:3.12-slim,
    uvicorn, port 8080
  - deploy/azure bicep provisions a Container App with external HTTPS ingress, a user-assigned
    Managed Identity (AcrPull, no secrets), the Entra-JWT auth env vars, and a mounted
    DNA source
  - az bicep build is clean on all bicep; docker build succeeds (or validated by inspection);
    'dna mcp serve --transport http' boots and answers MCP initialize locally
  - 'deploy/azure/README.md is a runbook: azd up step-by-step, the Entra app-registration
    the owner configures, and a post-deploy smoke test'
  - docs published on the site (mkdocs build --strict green), CHANGELOG [Unreleased]
    updated, brand + gitleaks guards green
  acceptance_criteria_source: cli-create
  definition_of_done:
  - "az bicep build clean + docker build ok + serve boots locally (TestGuide+TestRun\
    \ recorded); mkdocs --strict + guards green; PR opened via story pr --base main\
    \ (NOT merged \u2014 CI frozen)"
  definition_of_done_source: cli-create
