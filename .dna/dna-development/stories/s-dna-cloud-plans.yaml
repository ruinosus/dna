apiVersion: github.com/ruinosus/dna/sdlc/v1
kind: Story
metadata:
  name: s-dna-cloud-plans
spec:
  title: "Plan taxonomy Kind \u2014 Free/Dev/Pro/Enterprise as declarative data (limits\
    \ + feature flags)"
  description: 'Model the plans as DECLARATIVE data (a Plan/Tier Kind or catalog doc),
    NOT hardcoded: each plan declares calls/day, tenants, rate-limit, and which feature
    families it unlocks (definitions-compose / SDLC-read / memory read+write / emit).
    The server resolves a token''s plan claim -> the Plan doc -> the concrete caps.
    Keeps the no-deploy thesis: changing a tier limit is a file edit, not a redeploy.
    Aligns with DNA''s ''everything is a Kind'' principle.'
  status: in-progress
  feature: f-dna-cloud
  priority: high
  labels:
  - saas
  - plans
  - tiers
  - kind
  - declarative
  reporter: claude-code
  business_value: 560
  acceptance_criteria:
  - Given the plan catalog, When a Free token is resolved, Then its caps (e.g. ~100
    calls/day, 1 tenant, memory read-only, no emit) come from the Plan doc not code
  - Given the owner changes a tier limit in the Plan doc, When the server reloads,
    Then the new cap applies with no redeploy
  acceptance_criteria_source: claude-code
  definition_of_done:
  - Plan/Tier declarative Kind (Py+TS parity) with limits + feature flags; resolver
    plan-claim -> caps; tests; docs; owner-approved tier numbers
  definition_of_done_source: claude-code
