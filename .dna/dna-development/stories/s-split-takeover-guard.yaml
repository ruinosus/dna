    summary: "PR #173 (squash em main, 9ac3efc). Nenhuma mudanca de comportamento:\
      \ o guard decide exatamente o mesmo. O que muda e que passou a ter nome (assert_may_bootstrap_workspace),\
      \ contrato escrito e cobertura propria. O problema era que UMA condicao (identity.tid\
      \ != workspace_id) fazia DOIS trabalhos \u2014 zero-migration, que o D5 exige\
      \ remover, e anti-takeover, que nunca pode sair \u2014 e a Regra 2 nao tem implementacao\
      \ propria: e efeito colateral da Regra 1. A unica cobertura do ramo de negacao\
      \ ficava a 25 linhas de um detector que o D5 obriga a apagar, entao reescrever\
      \ aquele arquivo (o caminho natural) removeria a protecao contra takeover sem\
      \ nada ficar vermelho. Agora ha test_workspace_takeover_guard.py: arquivo separado,\
      \ unitario, frasado como propriedade do sistema e nao como mecanismo. Mutantes\
      \ mortos: guard virado no-op -> 11 falham e EXATAMENTE 1 passa (o baseline anti-vacuidade,\
      \ provando que os 11 nao passariam num guard que nega tudo); comparacao trocada\
      \ por strip().lower() -> falham exatamente os 3 near-miss. CI: 14 checks verdes.\
      \ Fica em aberto, por ser decisao de produto: sob ids gerados, quem pode reivindicar\
      \ um id ainda NAO reivindicado. Workspace ja possuido ja e protegido pelo ramo\
      \ has_active_owner, independente de tid."
