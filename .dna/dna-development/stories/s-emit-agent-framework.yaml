apiVersion: github.com/ruinosus/dna/sdlc/v1
kind: Story
metadata:
  name: s-emit-agent-framework
spec:
  title: dna emit --target agent-framework
  description: 'Productize the spike emitter into a first-class DNA capability: dna
    emit <agent> --target agent-framework produces the native agent-framework PromptAgent
    YAML from the DNA definition, with a structural field de-para (instructions/model/tools/outputSchema)
    and a pluggable EmitterPort registry.'
  status: done
  feature: f-dna-emitters
  priority: highest
  labels:
  - emitters
  - cli
  - portability
  acceptance_criteria:
  - text: Given a DNA agent, when I run 'dna emit <agent> --target agent-framework',
      then I get a valid agent-framework PromptAgent YAML on stdout (or --out file).
    done: true
    done_at: '2026-07-11T13:16:51+00:00'
    done_by: story-done-auto
  - text: Given the emitted YAML, when parsed, then its 'instructions' is byte-equal
      to mi.build_prompt(agent) (the DNA-composed prompt).
    done: true
    done_at: '2026-07-11T13:16:51+00:00'
    done_by: story-done-auto
  - text: Given an agent with spec.tools, when emitted, then each Tool's description
      + input_schema is mapped into the target's tools list.
    done: true
    done_at: '2026-07-11T13:16:51+00:00'
    done_by: story-done-auto
  - text: Given the agent-framework runtime is installed, when the emitted YAML is
      loaded via AgentFactory, then a live Agent object is produced (test skips when
      the runtime/.NET is absent).
    done: true
    done_at: '2026-07-11T13:16:51+00:00'
    done_by: story-done-auto
  - text: Given a new target, when a developer registers an EmitterPort, then 'dna
      emit --target <new>' dispatches to it with no changes to the CLI core.
    done: true
    done_at: '2026-07-11T13:16:51+00:00'
    done_by: story-done-auto
  acceptance_criteria_source: cli-create
  definition_of_done:
  - text: 'Code: dna.emit module (EmitterPort + registry + agent_framework emitter)
      + emit_cmd CLI wired into the dna group.'
    done: true
    done_at: '2026-07-11T13:16:51+00:00'
    done_by: story-done-auto
  - text: 'Tests: byte-equal round-trip test (always runs) + AgentFactory load test
      (skips without runtime); suites green.'
    done: true
    done_at: '2026-07-11T13:16:51+00:00'
    done_by: story-done-auto
  - text: 'Docs: ''Emitting to a runtime (the de-para)'' guide in mkdocs nav; mkdocs
      build --strict green.'
    done: true
    done_at: '2026-07-11T13:16:51+00:00'
    done_by: story-done-auto
  - text: 'CI: 11/11 checks green on the PR; CHANGELOG [Unreleased] updated (no release
      cut).'
    done: true
    done_at: '2026-07-11T13:16:51+00:00'
    done_by: story-done-auto
  - text: 'UX: losses (tenant/composition/eval) documented in emitter output + guide.'
    done: true
    done_at: '2026-07-11T13:16:51+00:00'
    done_by: story-done-auto
