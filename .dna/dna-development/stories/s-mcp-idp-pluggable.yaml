kind: Story
metadata:
  name: s-mcp-idp-pluggable
spec:
  title: Fecha o loop OAuth 2.1 end-to-end com IdP REAL, via uma camada de provider
    PLUGG
  description: "Fecha o loop OAuth 2.1 end-to-end com IdP REAL, via uma camada de\
    \ provider PLUGGABLE (N providers). Hoje s\xF3 o Resource Server (valida JWT)\
    \ roda; falta o Authorization Server real. DESIGN CHAVE: provider \xE9 CONFIG,\
    \ n\xE3o c\xF3digo \u2014 cada IdP exp\xF5e JWKS/OIDC discovery, ent\xE3o um registry\
    \ declarativo (dna.config.yaml: {type, issuer, jwks_uri, audience, tenant_claim})\
    \ cobre Entra/Clerk/WorkOS/Auth0/OIDC-gen\xE9rico sem c\xF3digo por-provider.\
    \ O bridge claim->tenant \xE9 POR provider (Entra=tid, Clerk=org_id, etc.). REFER\xCA\
    NCIA: Azure Entra ID primeiro (o foundry j\xE1 usa entraTenantId/entraApiClientId;\
    \ deploy Azure via azd; e o tid do Entra mapeia LIMPO pra tenant do DNA). FastMCP:\
    \ JWTVerifier aponta pra qualquer JWKS; OAuthProxy pros sem-DCR."
  status: done
  feature: f-dna-mcp-server
  priority: high
  labels:
  - sdk
  - auth
  - mcp
  reporter: claude-code
