  title: "Trazer o Research Kind (s\xEDntese curada de N References com findings evidence-rat"
  description: "Trazer o Research Kind (s\xEDntese curada de N References com findings\
    \ evidence-rated + recommendations + citation graph) do SDK upstream pro DNA \u2014\
    \ infraestrutura de conhecimento agent-facing, a resposta declarativa/curada do\
    \ DNA ao problema OpenWiki/DeepWiki. Porta a extension research (Py 762loc + twin\
    \ research.ts) + CLI 'dna research list/show/create', kernel-bound. Decis\xF5\
    es ratificadas (Barna): (1) namespace github.com/ruinosus/dna/research/v1; (2)\
    \ tenancy PERMISSIVA (research \xE9 conhecimento autorado do repo, n\xE3o dado\
    \ per-cliente \u2014 dna research create sem tenant obrigat\xF3rio); (3) recall\
    \ sem\xE2ntico DEGRADA pra query lexical/estruturada (kernel.query) \u2014 servidor\
    \ de embeddings n\xE3o viajou; recall via pgvector \xE9 futuro documentado. Reference\
    \ companion j\xE1 existe via extension sdlc. Engenharia: verificar ratchet F3\
    \ descriptor-vs-classe (prov\xE1vel classe com exce\xE7\xE3o registrada \u2014\
    \ tem l\xF3gica comput\xE1vel). Payoff imediato: capturar as 3 pesquisas de hoje\
    \ (doc-frameworks, exemplar-repos, openwiki-analysis) como Research docs."
