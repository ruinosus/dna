    summary: "Design shipped for owner review: ADR adr-dna-cloud-saas (proposed) +\
      \ Feature f-dna-cloud (discovery) under e-dna-portability + 4 todo child stories\
      \ (portal/plans/quota-enforcement/billing). Core thesis: DNA Cloud reuses the\
      \ Phase-2 auth<->tenancy bridge \u2014 the token already carries a tenant claim,\
      \ we add a plan/quota claim through the SAME dna_cli._mcp_auth seam, so the\
