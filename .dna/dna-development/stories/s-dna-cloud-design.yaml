apiVersion: github.com/ruinosus/dna/sdlc/v1
kind: Story
metadata:
  name: s-dna-cloud-design
spec:
  title: Design the DNA Cloud SaaS (ADR + design doc + architecture visual) for owner
    approval
  description: 'DESIGN the hosted SaaS over the MCP runtime face: architecture (portal
    + MCP server + billing provider + IdP via the pluggable auth layer), plan taxonomy
    with concrete limits, the claim->plan enforcement mechanism (reusing the tenancy
    bridge), the billing model, and the portal surface. Deliverable is an ADR (adr-dna-cloud-saas)
    + a design doc + a self-contained HTML visual (architecture + plans table + enforcement
    flow) for the owner to VER and approve BEFORE any build. No SaaS code is written.'
  status: in-progress
  feature: f-dna-cloud
  priority: high
  labels:
  - saas
  - cloud
  - design
  - adr
  reporter: claude-code
  business_value: 780
  acceptance_criteria:
  - Given the owner opens the deliverable, When they read it, Then they see the full
    architecture (portal + hosted MCP server + billing + IdP), the plan taxonomy with
    concrete per-plan limits, and the claim->plan enforcement flow
  - Given the design, When reviewed, Then the enforcement reuses the existing auth<->tenancy
    bridge (claim->plan added alongside claim->tenant) rather than rebuilding auth
  - Given the design, When reviewed, Then the open decisions (separate portal repo?
    billing provider? tier limits? open-core split?) are listed explicitly for the
    owner to decide
  acceptance_criteria_source: claude-code
  definition_of_done:
  - ADR adr-dna-cloud-saas created + accepted; Feature f-dna-cloud + todo child stories
    (portal/plans/billing/quota) filed; research rsh-agent-config-landscape-2026 cited
  - "Design doc written (docs/ or HtmlArtifact) + a self-contained HTML visual at\
    \ design/dna-cloud-architecture.html covering architecture + plans table + enforcement\
    \ flow; local guards/mkdocs green if site docs touched; PR opened (CI frozen \u2014\
    \ left open, NOT merged)"
  definition_of_done_source: claude-code
