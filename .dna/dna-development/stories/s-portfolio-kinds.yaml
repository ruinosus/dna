  acceptance_criteria:
  - Given the portfolio extension is registered (entry-point + TS bootstrap), when
    Kernel.auto()/loadBuiltins run, then Organization/Project/Repo/Membership/Role
    register as record-plane, TENANTED, declarative Kinds with aliases portfolio-org/project/repo/membership/role
    and closed schemas (additionalProperties:false)
  - Given the 5 descriptors, when hashed, then the Py and TS kinds/*.kind.yaml are
    byte-identical (test_descriptor_hash_parity + TS twin green)
  - "Given Project, when inspected, then it is the multi-repo container: repo_refs\
    \ carries the N\u2014N edge (Repo has no project back-ref) and it owns board_scope\
    \ + intel_source_refs"
  - Given Role is data, when the 4 seed docs (owner/admin/member/guest) are loaded,
    then they validate against the Role schema and form a strictly-ordered ladder
