  title: "5 portfolio record Kinds as descriptors (byte-identical Py\u2194TS)"
  description: Ship Organization/Project/Repo/Membership/Role as a new portfolio extension
    of F3 descriptor Kinds, per adr-portfolio-project-model.
  status: in-progress
  feature: f-portfolio-kinds
  priority: high
  labels:
