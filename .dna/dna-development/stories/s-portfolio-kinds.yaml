    summary: "Modeling decisions flagged: (1) N\u2014N Repo\u2194Project \u2014 the\
      \ edge lives ONLY on Project.repo_refs (a list of Repo names); Repo carries\
      \ NO project back-ref, so a shared repo is never duplicated and there's a single\
      \ source of truth. A join Kind was considered and rejected as premature. (2)\
      \ Role ladder AS DATA \u2014 each rung a Role doc with rank+capabilities so\
      \ the ladder is extensible (custom roles) instead of a hardcoded enum; 4 standard\
      \ rungs (owner/admin/member/guest, ranks 40/30/20/10) ship as per-tenant seed\
      \ docs under examples/dna-cloud/.dna/tenants/acme/scopes/acme-development/roles/.\
      \ (3) Overlap flagged: Organization vs the platform-level Tenant Kind, Membership\
      \ vs TenantMembership \u2014 kept distinct names (no i-195 bare-name clash)\
      \ since these are the tenant's OWN editable portfolio profile/grants, not the\
      \ GLOBAL provisioning identity."
    commit_ref: b5e9eb96274a99dc89683e4d98c414eb09e1031c
