spec:
  title: 'Docs: clarify dna init (project) vs dna install (source-write) + completeness
    pass'
  description: A user confused 'projecting' (init) with 'installing' (install). Make
    the init-vs-install distinction explicit on BOTH the init tutorial and the install
    guide (comparison box + decision table + reciprocal cross-links), and do a docs
    completeness pass (CLI tour was missing init + eval; verify all command groups
    are reachable and explained).
  status: in-progress
  feature: f-dna-docs
  priority: medium
  labels:
  - docs
  reporter: claude-code
  acceptance_criteria:
  - GIVEN a reader on docs/guides/installing-scopes.md OR docs/getting-started/agent-onboarding.md
    WHEN they look for the difference THEN a comparison box + decision table + reciprocal
    cross-link makes 'projects to tool dirs' vs 'writes to .dna/ source' unmistakable
  - GIVEN the CLI tour claims 'every command group' THEN dna init and dna eval are
    present and linked to their dedicated pages
  acceptance_criteria_source: cli-create
  definition_of_done:
  - mkdocs build --strict green; docs_coverage_guard (+self-test) green; reference
    drift guard green (generated ref untouched or regenerated); lychee internal links
