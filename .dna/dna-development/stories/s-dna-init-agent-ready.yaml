apiVersion: github.com/ruinosus/dna/sdlc/v1
kind: Story
metadata:
  name: s-dna-init-agent-ready
spec:
  title: "dna init \u2014 onboarding agent-ready para projetos consumidores: pip install\
    \ dna-cl"
  description: "dna init \u2014 onboarding agent-ready para projetos consumidores:\
    \ pip install dna-cli entrega kernel+CLI mas o agente chega cego (skill/AGENTS.md/hooks\
    \ s\xF3 existem no repo dna; piloto foundry bootstrapou \xE0 m\xE3o). Um comando\
    \ materializa o Genome de onboarding embarcado via os writers de mercado do SDK."
  status: review
  feature: f-dna-ecosystem
  priority: high
  labels:
  - cli
  - docs
  - meta
  reporter: claude-code
  acceptance_criteria: &id001
  - "Given um diret\xF3rio de projeto limpo, When roda dna init, Then cria o board\
    \ .dna/<scope>/ com Genome (bootstrap can\xF4nico via kernel) + containers SDLC,\
    \ projeta a Skill dna-sdlc-cli via SkillWriter byte-fiel no diret\xF3rio de skills\
    \ de CADA tool selecionada (--tools claude,copilot,cursor,opencode; default claude,copilot;\
    \ aceita all), escreve AGENTS.md agents.md/v1 como superf\xEDcie can\xF4nica de\
    \ instru\xE7\xF5es na raiz e instala os git hooks"
  - "Given um projeto j\xE1 inicializado, When re-roda dna init, Then \xE9 idempotente:\
    \ nenhum arquivo existente \xE9 sobrescrito sem --force e o resumo diz o que foi\
    \ pulado; --force nunca reescreve o board"
  - "AGENTS.md gerado \xE9 parse\xE1vel pelo reader agentsmd do SDK; a skill materializada\
    \ round-tripa pelo reader agentskills e as N proje\xE7\xF5es s\xE3o byte-id\xEA\
    nticas entre si (um Kind, N proje\xE7\xF5es \u2014 provado por teste)"
  - "Conte\xFAdo tool-agnostic (sem frontmatter propriet\xE1rio nem persona de uma\
    \ tool); skill embarcada generalizada (zero caminhos/venvs internos do repo dna);\
    \ brand-guard e gitleaks limpos; decis\xE3o multi-tool ancorada em Research/rsh-cross-tool-agent-standards\
    \ linkada na story"
  acceptance_criteria_source: claude-code
  definition_of_done: &id002
  - "unit tests (init limpo + idempot\xEAncia + round-trip reader/writer + proje\xE7\
    \xF5es multi-tool) verdes; suites sdk-py/sdk-ts/cli + guards verdes; CI 11 checks\
    \ verdes no PR"
  - "smoke de produto real: scratch project + venv com dna-cli editable \u2192 dna\
    \ init \u2192 dna sdlc story create no board novo + hook assinando commit; TestGuide\
    \ --product + TestRun com evid\xEAncia"
  - "docs: prosa getting-started pro dna init com tabela ferramenta\u2192diret\xF3\
    rio + nota CLAUDE.md/GEMINI.md ponteiro (coverage guard) + refer\xEAncia CLI regenerada\
    \ (drift guard); mkdocs build --strict verde; assimetria Py-only documentada"
  definition_of_done_source: claude-code
