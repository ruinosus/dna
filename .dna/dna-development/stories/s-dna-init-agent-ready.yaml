      Writer + hooks via _git_symbiosis com cwd expl\xEDcito). Decis\xE3o: o board\
      \ rec\xE9m-criado ganha containers stories/features/issues com .gitkeep \u2014\
      \ sem eles o autodetect de scope do sdlc (que sonda containers SDLC, i-012)\
      \ n\xE3o enxerga o board novo e story create cairia no fallback dna-development.\
      \ Validado manualmente: init limpo + re-run idempotente + feature/story create\
      \ no board novo com autodetec\xE7\xE3o. Decis\xE3o adicional: next-steps e AGENTS.md\
      \ embarcado incluem feature create antes de story create (--feature \xE9 required)."
