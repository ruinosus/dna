      \ + skill via SkillReader\u2192SkillWriter + AGENTS.md via AgentDefinitionReader\u2192\
      Writer + hooks via _git_symbiosis com cwd expl\xEDcito). Decis\xE3o: o board\
      \ rec\xE9m-criado ganha containers stories/features/issues com .gitkeep \u2014\
      \ sem eles o autodetect de scope do sdlc (que sonda containers SDLC, i-012)\
      \ n\xE3o enxerga o board novo e story create cairia no fallback dna-development.\
      \ Validado manualmente: init limpo + re-run idempotente + feature/story create\
      \ no board novo com autodetec\xE7\xE3o. Decis\xE3o adicional: next-steps e AGENTS.md\
      \ embarcado incluem feature create antes de story create (--feature \xE9 required)."
    commit_ref: 13c17b20635eea7b62f1268bfc32b1389408ef08
  - at: '2026-07-10T19:26:04+00:00'
    actor: claude-code
    type: decision
    source: cli
    summary: "AMPLIA\xC7\xC3O DE ESCOPO ratificada: dna init vira MULTI-FERRAMENTA.\
      \ Evid\xEAncia capturada em Research/rsh-cross-tool-agent-standards: AGENTS.md\
      \ \xE9 O padr\xE3o de instru\xE7\xF5es (LF/Agentic AI Foundation, 28+ tools\
      \ incl. Claude Code que tamb\xE9m o l\xEA) e SKILL.md/agentskills.io \xE9 O\
      \ padr\xE3o de skills (~40 tools; formato id\xEAntico, s\xF3 muda o diret\xF3\
      rio: .claude/.github/.cursor/.opencode). Refatorando: --tools claude,copilot,cursor,opencode\
      \ (default claude,copilot; aceita all) \u2014 a MESMA Skill Kind projetada 1x\
      \ por diret\xF3rio-alvo; AGENTS.md vira superf\xEDcie can\xF4nica; conte\xFA\
      do tool-agnostic; sem GEMINI.md por default (documentado o ponteiro)."
    commit_ref: 13c17b20635eea7b62f1268bfc32b1389408ef08
