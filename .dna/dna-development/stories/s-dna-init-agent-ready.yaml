metadata:
  name: s-dna-init-agent-ready
spec:
  title: "dna init \u2014 multi-tool agent-ready onboarding para projetos consumidores"
  description: "dna init \u2014 onboarding agent-ready para projetos consumidores:\
    \ pip install dna-cli entrega kernel+CLI mas o agente chega cego (skill/AGENTS.md/hooks\
    \ s\xF3 existem no repo dna; piloto foundry bootstrapou \xE0 m\xE3o). Um comando\
    \ materializa o Genome de onboarding embarcado via os writers de mercado do SDK."
  status: done
  feature: f-dna-ecosystem
  priority: high
  labels:
  - cli
  - docs
  - meta
  reporter: claude-code
  acceptance_criteria:
  - text: "Given um diret\xF3rio de projeto limpo, When roda dna init, Then cria o\
      \ board .dna/<scope>/ com Genome (bootstrap can\xF4nico via kernel) + containers\
      \ SDLC, projeta a Skill dna-sdlc-cli via SkillWriter byte-fiel no diret\xF3\
      rio de skills de CADA tool selecionada (--tools claude,copilot,cursor,opencode;\
      \ default claude,copilot; aceita all), escreve AGENTS.md agents.md/v1 como superf\xED\
      cie can\xF4nica de instru\xE7\xF5es na raiz e instala os git hooks"
    done: true
    done_at: '2026-07-10T19:41:10+00:00'
    done_by: claude-code
    evidence: test_init_cmd.py::test_init_creates_full_onboarding_tree + ::test_init_tools_all_projects_every_tool_dir
      + smoke tr-tg-s-dna-init-agent-ready-20260710-193815 (init --tools all = 7 created)
  - text: "Given um projeto j\xE1 inicializado, When re-roda dna init, Then \xE9 idempotente:\
      \ nenhum arquivo existente \xE9 sobrescrito sem --force e o resumo diz o que\
      \ foi pulado; --force nunca reescreve o board"
    done: true
    done_at: '2026-07-10T19:41:12+00:00'
    done_by: claude-code
    evidence: test_init_rerun_is_idempotent_and_reports_skips + test_init_force_overwrites_files_but_never_the_board;
      smoke re-run 0 created/7 skipped
  - text: "AGENTS.md gerado \xE9 parse\xE1vel pelo reader agentsmd do SDK; a skill\
      \ materializada round-tripa pelo reader agentskills e as N proje\xE7\xF5es s\xE3\
      o byte-id\xEAnticas entre si (um Kind, N proje\xE7\xF5es \u2014 provado por\
      \ teste)"
    done: true
    done_at: '2026-07-10T19:41:13+00:00'
    done_by: claude-code
    evidence: "test_generated_agents_md_parses_via_agentsmd_reader + test_materialized_skill_roundtrips_via_agentskills_reader\
      \ (byte-identical) + test_init_tools_all (proje\xE7\xF5es byte-id\xEAnticas)"
  - text: "Conte\xFAdo tool-agnostic (sem frontmatter propriet\xE1rio nem persona\
      \ de uma tool); skill embarcada generalizada (zero caminhos/venvs internos do\
      \ repo dna); brand-guard e gitleaks limpos; decis\xE3o multi-tool ancorada em\
      \ Research/rsh-cross-tool-agent-standards linkada na story"
    done: true
    done_at: '2026-07-10T19:41:15+00:00'
    done_by: claude-code
    evidence: 'test_embedded_onboarding_assets_carry_no_repo_internals; brand-guard
      + gitleaks verdes no PR #39; Research/rsh-cross-tool-agent-standards linkada
      via produces'
  acceptance_criteria_source: claude-code
