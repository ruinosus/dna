    source: cli
    summary: "AMPLIA\xC7\xC3O DE ESCOPO ratificada: dna init vira MULTI-FERRAMENTA.\
      \ Evid\xEAncia capturada em Research/rsh-cross-tool-agent-standards: AGENTS.md\
      \ \xE9 O padr\xE3o de instru\xE7\xF5es (LF/Agentic AI Foundation, 28+ tools\
      \ incl. Claude Code que tamb\xE9m o l\xEA) e SKILL.md/agentskills.io \xE9 O\
      \ padr\xE3o de skills (~40 tools; formato id\xEAntico, s\xF3 muda o diret\xF3\
      rio: .claude/.github/.cursor/.opencode). Refatorando: --tools claude,copilot,cursor,opencode\
      \ (default claude,copilot; aceita all) \u2014 a MESMA Skill Kind projetada 1x\
      \ por diret\xF3rio-alvo; AGENTS.md vira superf\xEDcie can\xF4nica; conte\xFA\
