      \ skills/dna-sdlc-cli/SKILL.md + AGENTS.md generalizados; (2) dna init l\xEA\
      \ os assets com SkillReader/AgentDefinitionReader e materializa com SkillWriter/AgentDefinitionWriter\
      \ (round-trip de mercado \xE9 o produto); (3) board bootstrap reusa o padr\xE3\
      o can\xF4nico do install_cmd (kernel.write_document Genome); (4) hooks reusam\
      \ _ensure_hook_file/_git_symbiosis com cwd expl\xEDcito; (5) scope default <dirname>-dev\
      \ seguindo o precedente foundry-dev do piloto."
