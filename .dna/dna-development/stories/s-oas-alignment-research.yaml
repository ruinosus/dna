spec:
  title: "Oracle Agent Spec alignment \u2014 verdict"
  description: Research the Oracle Agent Spec (schema, adapters, format) and decide
    + document (Research Kind + ADR) whether DNA should emit THROUGH OAS or emit DIRECT
    per runtime, with trade-offs and a recommendation.
  status: in-progress
  feature: f-oracle-agent-spec
  priority: high
  labels:
  - research
  - oas
  acceptance_criteria:
  - Given the OAS research, when complete, then a Research doc captures its schema,
    shipped adapters, and format with cited sources.
  - Given the trade-offs, when documented, then an ADR records the emit-through-OAS
    vs emit-direct verdict with a clear recommendation.
  - "Given the verdict, when it recommends alignment, then the concrete DNA\u2194\
    OAS alignment points are named (or the decision to not align is justified)."
  acceptance_criteria_source: cli-create
