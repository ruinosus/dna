metadata:
  name: s-console-rest-seed
spec:
  title: Portfolio console REST endpoints + demo seed
  description: Add thin REST read-endpoints for the portfolio console and seed the
    demo portfolio so the portal shows real data.
  status: review
  feature: f-console-backend
  priority: high
  labels:
  - portfolio-console
  - rest
  - seed
  reporter: claude-code
  acceptance_criteria:
  - "Given the DNA REST API booted for tenant demo, when the console GETs /v1/orgs,\
    \ /v1/projects, /v1/projects/{slug}, /v1/repos, /v1/board?scope=dna-development\
    \ and /v1/insights?source=dna, then each returns the seeded portfolio data (project\
    \ detail resolves repo_refs\u2192Repo docs; board returns the REAL dna-development\
    \ counts-by-status + recent; insights filter isolates the dna source)."
  - Given the intel /v1/insights endpoint, when ?source=<name> is passed, then only
    that source's insights are returned (alias of source_ref).
  acceptance_criteria_source: claude-code
  definition_of_done:
  - New endpoints are thin adapters delegating to dna.application impls (adr-faces-reorg);
    REST tests added mirroring the intel ones; sdk-py + cli suites green; brand_guard
    + docs_coverage_guard clean; CLI reference regenerated; demo portfolio docs +
    dna IntelSource + DNA insights committed under .dna/tenants/demo/.
  definition_of_done_source: cli-create
