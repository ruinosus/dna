  description: "Eval Kinds + runner LOCAL (Tier B, item 2): a autoria de avalia\xE7\
    \xE3o como dados \u2014 EvalCase/EvalSuite/EvalRun/Baseline do SDK upstream (extension\
    \ eval, 752loc; a autoria \xE9 declarativa, o runner l\xE1 era Temporal/servi\xE7\
    o e N\xC3O viaja). EVOLU\xC7\xC3O: runner S\xCDNCRONO local no SDK ('rode seus\
    \ evals offline') \u2014 dna eval run <suite> executa os cases contra um alvo\
    \ plug\xE1vel (callable/porta EvalTargetPort \u2014 o default \xC9 o pr\xF3prio\
    \ kernel: build_prompt/composi\xE7\xE3o como alvo avali\xE1vel determin\xEDstico;\
    \ alvo-LLM \xE9 do host, extension point documentado como sempre), grava EvalRun\
    \ doc com resultados, compara com Baseline. Paridade TS dos Kinds (runner Py-primary\
    \ justificado se for o caso). Prosa + guards. Evals s\xE3o o assunto do momento\
    \ em agentic \u2014 e o testkit (TestGuide/TestRun) j\xE1 \xE9 primo no repo."
