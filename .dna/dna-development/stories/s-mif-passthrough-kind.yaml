  - at: '2026-07-19T19:19:21+00:00'
    actor: claude-code
    type: decision
    source: cli
    summary: "A story buscou a spec REAL do MIF v1.0.0 ao vivo em vez de confiar no\
      \ descritor rascunhado, e achou o rascunho substancialmente errado: o campo\
      \ temporal e validUntil (nao validTo); relationships[].type e string kebab-case\
      \ aberta (nao enum fechado) e 4 dos 9 valores do rascunho nao existem (related-to,\
      \ caused-by, documents, references \u2014 os reais incluem relates-to, uses,\
      \ created-by, mentioned-in); o id do perfil Markdown e UUID puro (o urn:mif:\
      \ e o @id do JSON-LD, outra coisa); e o naming .memory.md era convencao do draft\
      \ 0.1.0, nao da v1.0. Consequencia que passou perto: a tabela de mapeamento\
      \ secao 2 do design \u2014 que e a BASE da story s-memory-interchange-verbs\
      \ \u2014 usava validTo e related-to. Seguir o design teria produzido MIF invalido.\
      \ A tabela foi corrigida na fonte e ganhou um aviso no topo mandando conferir\
      \ contra o descritor real, nao contra ela."
    commit_ref: 983afe16f90784936911addc2632c0b99bc42fdd
