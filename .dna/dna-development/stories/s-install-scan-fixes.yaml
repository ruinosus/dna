apiVersion: github.com/ruinosus/dna/sdlc/v1
kind: Story
metadata:
  name: s-install-scan-fixes
spec:
  title: 'install scan: mixed trees + network test for init --from'
  description: Fix _scan_tree so a reader claiming a directory (root AGENTS.md) no
    longer hides sibling/child docs (i-016), and add the requires_network test for
    dna init --from against the onboarding pack on main (i-017).
  status: review
  feature: f-dna-ecosystem
  owner: claude-code
  reporter: claude-code
  acceptance_criteria:
  - Given a tree with AGENTS.md at the root AND skills/<name>/SKILL.md, When dna install
    runs, Then BOTH the AgentDefinition and every Skill are installed (plan lists
    them all).
  - "Given a Skill bundle directory (SKILL.md + companions/subdirs), When scanned,\
    \ Then it yields exactly ONE doc \u2014 no duplicates from recursing into the\
    \ bundle."
  - Given a skills-only tree, When installed, Then the result is byte-identical to
    before the fix (golden unchanged).
  - 'Given the fix, When dna init --from loads a pack, Then it delegates to the shared
    scan (workaround from PR #41 removed) and its tests stay green.'
  - Given network locally, When pytest runs test marked requires_network for dna init
    --from github:ruinosus/dna/examples/onboarding-pack (no ref), Then it passes;
    under DNA_OFFLINE=1 it skips.
  acceptance_criteria_source: cli-create
  definition_of_done:
  - code + tests (cli/sdk-py/sdk-ts suites green) + guards + mkdocs build --strict
  - TestGuide --product + TestRun recorded for the mixed-tree install smoke and the
    local network test
  - PR to main with 11/11 checks; i-016 + i-017 resolved on merge
  definition_of_done_source: cli-create
