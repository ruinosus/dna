  name: s-scope-as-package-data
spec:
  title: Resolve scope from package data via anchor
  description: load_prompts gains anchor= to resolve a scope embedded as package-data
    (importlib.resources); TS twin resolves relative to the module.
  status: done
  feature: f-dna-scope-packaging
  owner: claude-code
  acceptance_criteria:
  - text: Given a package that embeds a scope as package-data, When load_prompts(scope,
      anchor='pkg') is called from a different CWD, Then the scope resolves without
      path navigation or the file being in cwd
    done: true
    done_at: '2026-07-11T12:11:03+00:00'
    done_by: story-done-auto
  - text: Given base_dir/DNA_BASE_DIR/anchor all set, When resolving, Then precedence
      is base_dir > DNA_BASE_DIR > anchor > default .dna
    done: true
    done_at: '2026-07-11T12:11:03+00:00'
    done_by: story-done-auto
  - text: Given anchor points to a missing package/subpath, When resolving, Then it
      fails loud with a didactic message
    done: true
    done_at: '2026-07-11T12:11:03+00:00'
    done_by: story-done-auto
