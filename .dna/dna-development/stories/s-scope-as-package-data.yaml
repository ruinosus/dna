apiVersion: github.com/ruinosus/dna/sdlc/v1
kind: Story
metadata:
  name: s-scope-as-package-data
spec:
  title: Resolve scope from package data via anchor
  description: load_prompts gains anchor= to resolve a scope embedded as package-data
    (importlib.resources); TS twin resolves relative to the module.
  status: in-progress
  feature: f-dna-scope-packaging
  owner: claude-code
  acceptance_criteria:
  - Given a package that embeds a scope as package-data, When load_prompts(scope,
    anchor='pkg') is called from a different CWD, Then the scope resolves without
    path navigation or the file being in cwd
  - Given base_dir/DNA_BASE_DIR/anchor all set, When resolving, Then precedence is
    base_dir > DNA_BASE_DIR > anchor > default .dna
  - Given anchor points to a missing package/subpath, When resolving, Then it fails
    loud with a didactic message
  acceptance_criteria_source: cli-create
  definition_of_done:
  - 'Code: load_prompts anchor (Py) + loadPrompts anchor (TS) in parity'
  - 'Tests: sdk-py + sdk-ts cover anchor resolution + precedence + fail-loud'
  - 'Docs: new guide ''Shipping a scope with your app'''
  - 'CI: python + typescript + guards + mkdocs strict green'
  definition_of_done_source: cli-create
