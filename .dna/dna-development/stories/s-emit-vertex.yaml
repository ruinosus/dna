      \ and the Bedrock 'Instruction' (one source \u2192 three runtimes)."
    done: true
    done_at: '2026-07-11T14:42:10+00:00'
    done_by: story-done-auto
  - text: Given no GCP credential, when the artifact is validated, then it conforms
      structurally to the documented ADK LlmAgentConfig schema and carries the yaml-language-server
      schema header.
    done: true
    done_at: '2026-07-11T14:42:10+00:00'
    done_by: story-done-auto
  - text: Given DNA axes ADK has no slot for (composition, tenant, eval, tool-schema
      depth, output_schema, non-Gemini model), when emitting, then each is reported
      in EmitResult.losses, not hidden.
    done: true
    done_at: '2026-07-11T14:42:10+00:00'
    done_by: story-done-auto
