metadata:
  name: s-emit-vertex
spec:
  title: "Third runtime emitter: DNA \u2192 Google ADK Agent Config"
  description: "Emit a DNA agent as a Google ADK Agent Config (LlmAgent) YAML \u2014\
    \ the third proven runtime (agent-framework + bedrock + vertex), same composed\
    \ prompt byte-equal across all three."
  status: in-progress
  feature: f-dna-emitters
  owner: claude-code
  labels:
  - emitter
  - portability
  - adk
  - vertex
  reporter: claude-code
  acceptance_criteria:
  - Given the concierge example scope, when I run 'dna emit concierge --target vertex',
    then a valid ADK Agent Config YAML is produced with agent_class LlmAgent, name,
    model, instruction, tools.
  - "Given the emitted config, when I compare its 'instruction' to build_prompt(agent),\
    \ then they are byte-equal \u2014 AND identical to the agent-framework 'instructions'\
    \ and the Bedrock 'Instruction' (one source \u2192 three runtimes)."
  - Given no GCP credential, when the artifact is validated, then it conforms structurally
    to the documented ADK LlmAgentConfig schema and carries the yaml-language-server
    schema header.
  - Given DNA axes ADK has no slot for (composition, tenant, eval, tool-schema depth,
    output_schema, non-Gemini model), when emitting, then each is reported in EmitResult.losses,
    not hidden.
  acceptance_criteria_source: cli-create
  definition_of_done:
  - "Code: dna/emit/vertex.py + src/emit/vertex.ts (Py\u2194TS parity), registered\
    \ additively in both registries."
  - 'Tests: test_emit_vertex.py + emit-vertex.test.ts + CLI smoke; existing emit suites
    updated (vertex no longer the ''unknown target'').'
  - 'Docs: ''Emitting to a runtime'' guide gains the ADK section + mapping table;
    example README shows all three runtimes; CHANGELOG [Unreleased].'
  - 'CI: Py + TS + CLI emit suites green, mkdocs build --strict green, brand/docs-coverage/parity
    guards green.'
  definition_of_done_source: cli-create
