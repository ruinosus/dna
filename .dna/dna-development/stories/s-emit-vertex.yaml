  - text: Given the concierge example scope, when I run 'dna emit concierge --target
      vertex', then a valid ADK Agent Config YAML is produced with agent_class LlmAgent,
      name, model, instruction, tools.
    done: true
    done_at: '2026-07-11T14:42:10+00:00'
    done_by: story-done-auto
  - text: "Given the emitted config, when I compare its 'instruction' to build_prompt(agent),\
