apiVersion: github.com/ruinosus/dna/sdlc/v1
kind: Story
metadata:
  name: s-pkg-source-scheme
spec:
  title: pkg:// source scheme for dna.config.yaml
  description: 'source_from_url / sourceFromUrl resolve pkg://<package>[/<subpath>]
    to a read-only scope embedded as package-data; Kernel.from_config accepts source:
    pkg://app.'
  status: in-progress
  feature: f-dna-scope-packaging
  owner: claude-code
  acceptance_criteria:
  - 'Given dna.config.yaml with source: pkg://app, When Kernel.from_config() boots,
    Then the scope embedded in package ''app'' resolves read-only'
  - Given pkg://app/.dna subpath form, When resolving, Then the declared subpath is
    used
  - Given a missing package/subpath, When resolving pkg://, Then it fails loud with
    the supported set
  acceptance_criteria_source: cli-create
  definition_of_done:
  - 'Code: pkg:// in source_from_url (Py) + sourceFromUrl (TS)'
  - 'Tests: both SDKs cover pkg:// happy-path + fail-loud'
  - 'Docs: pkg:// documented in the shipping guide + configuring-ports'
  - 'CI: all suites + guards + mkdocs strict green'
  definition_of_done_source: cli-create
