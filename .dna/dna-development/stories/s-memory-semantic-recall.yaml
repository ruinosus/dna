kind: Story
metadata:
  name: s-memory-semantic-recall
spec:
  title: "Semantic recall na mem\xF3ria: quando um RecordSearchProvider + EmbeddingPort\
    \ est\xE3o"
  description: "Semantic recall na mem\xF3ria: quando um RecordSearchProvider + EmbeddingPort\
    \ est\xE3o configurados, recall(cue) combina o ranking de recall existente com\
    \ o ranking ecphory alimentado por similaridade de embedding (ativa o hook semantic_scores\
    \ do score_engram, hoje c\xF3digo morto) e funde via RRF \u2014 o mesmo RRF do\
    \ search. Sem provider \u2192 comportamento atual intacto (offline-first, zero\
    \ breaking change). Sem LLM/scribes."
  status: in-progress
  feature: f-dna-search-memory
  reporter: claude-code
  acceptance_criteria:
  - "Given um scope com provider sqlite-vec + embedder registrados, When recall(cue)\
    \ roda com uma par\xE1frase que o cue-match do ecphory n\xE3o alcan\xE7a, Then\
    \ a mem\xF3ria-alvo surge no top-k via plano sem\xE2ntico (cosine no Path 3 do\
    \ score_engram) e o hit \xE9 anotado (semantic/rank_ecphory/rank_recall)"
  - "Given nenhum provider registrado, When recall(cue) roda em modo auto, Then hits\
    \ id\xEAnticos (golden) ao comportamento pr\xE9-story"
  - "Given o mesmo conjunto de engrams + cue + fake embeddings, When o ranking sem\xE2\
    ntico roda em Py e TS, Then ordem e scores s\xE3o id\xEAnticos (fixture de paridade\
    \ compartilhada)"
  - "Given dna memory recall --semantic/--no-semantic, When o flag \xE9 omitido, Then\
    \ modo auto (usa sem\xE2ntico se provider dispon\xEDvel)"
  acceptance_criteria_source: cli-create
  definition_of_done:
  - "c\xF3digo Py+TS em paridade 1:1 (core puro twin; verbs Py-only como j\xE1 \xE9\
    \ a fronteira do repo); remember segue indexando no write; backfill lazy promovido\
    \ pra SDK e documentado; testes unit Py+TS com FakeEmbedding (par\xE1frase, golden\
    \ sem provider, paridade de ranking); fixture memory-scoring-parity estendida\
    \ via gerador; docs prosa (guides/semantic-recall.md + concepts/search-and-memory.md)\
    \ + refer\xEAncia CLI regenerada; suites completas + guards + mkdocs --strict\
    \ verdes; smoke real sqlite-vec com TestGuide --product + TestRun; PR via story\
    \ pr, sem merge"
  definition_of_done_source: cli-create
