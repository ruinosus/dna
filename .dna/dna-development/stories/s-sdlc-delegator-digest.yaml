  name: s-sdlc-delegator-digest
spec:
  title: "dna sdlc digest \u2014 retrospective board-native digest"
  description: "Comando 'dna sdlc digest [--since <ref>] [--scope] [--save] [--json]'\
    \ que agrega os eventos de timeline dos work items numa janela e produz um digest\
    \ de uma tela agrupado (Conclu\xEDdo / Decidido / Achado / Precisa de voc\xEA\
    ), persist\xEDvel como StatusReport."
  status: in-progress
  feature: f-sdlc-digest
  owner: claude-code
  priority: high
  labels:
  - sdlc
  - observability
  - cli
  acceptance_criteria:
  - "dna sdlc digest agrega eventos de timeline (status\u2192done/review/blocked,\
    \ decis\xF5es/ADRs, features/\xE9picos que avan\xE7aram, issues/kaizen, artefatos,\
    \ releases) numa janela --since que aceita ISO | Nh/Nd/Nw | last-digest, default\
    \ 24h"
  - "Se\xE7\xE3o 'PRECISA DA SUA ATEN\xC7\xC3O' lista blocked (com motivo), stories\
    \ em review com PR aberto, decis\xF5es-do-dono pendentes e perguntas em aberto\
    \ \u2014 primeiro e destacado"
  - "Sa\xEDda de UMA tela agrupada (Conclu\xEDdo/Decidido/Achado/Precisa de voc\xEA\
    ); --json estruturado; --save persiste StatusReport 'digest-<data>' query\xE1\
    vel via cognitive search/recall"
  - "Help/docs distinguem digest (o que j\xE1 aconteceu, pra tr\xE1s) de brief (pr\xF3\
    ximos passos, pra frente)"
  acceptance_criteria_source: cli-create
  definition_of_done:
  - "L\xF3gica de agrega\xE7\xE3o pura + unit-testada; suites Py + guards + mkdocs\
    \ build --strict verdes; doc-guia + CHANGELOG [Unreleased]; digest real do board\
    \ de hoje capturado no TestRun"
  definition_of_done_source: cli-create
