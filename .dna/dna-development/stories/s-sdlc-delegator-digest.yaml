spec:
  title: "dna sdlc digest \u2014 retrospective board-native digest"
  description: "Comando 'dna sdlc digest [--since <ref>] [--scope] [--save] [--json]'\
    \ que agrega os eventos de timeline dos work items numa janela e produz um digest\
    \ de uma tela agrupado (Conclu\xEDdo / Decidido / Achado / Precisa de voc\xEA\
    ), persist\xEDvel como StatusReport."
  status: done
  feature: f-sdlc-digest
  owner: claude-code
  priority: high
  labels:
  - sdlc
  - observability
  - cli
  acceptance_criteria:
  - text: "dna sdlc digest agrega eventos de timeline (status\u2192done/review/blocked,\
      \ decis\xF5es/ADRs, features/\xE9picos que avan\xE7aram, issues/kaizen, artefatos,\
      \ releases) numa janela --since que aceita ISO | Nh/Nd/Nw | last-digest, default\
      \ 24h"
    done: true
    done_at: '2026-07-11T14:10:52+00:00'
    done_by: story-done-auto
  - text: "Se\xE7\xE3o 'PRECISA DA SUA ATEN\xC7\xC3O' lista blocked (com motivo),\
      \ stories em review com PR aberto, decis\xF5es-do-dono pendentes e perguntas\
      \ em aberto \u2014 primeiro e destacado"
    done: true
    done_at: '2026-07-11T14:10:52+00:00'
    done_by: story-done-auto
  - text: "Sa\xEDda de UMA tela agrupada (Conclu\xEDdo/Decidido/Achado/Precisa de\
      \ voc\xEA); --json estruturado; --save persiste StatusReport 'digest-<data>'\
      \ query\xE1vel via cognitive search/recall"
    done: true
    done_at: '2026-07-11T14:10:52+00:00'
    done_by: story-done-auto
  - text: "Help/docs distinguem digest (o que j\xE1 aconteceu, pra tr\xE1s) de brief\
      \ (pr\xF3ximos passos, pra frente)"
    done: true
    done_at: '2026-07-11T14:10:52+00:00'
    done_by: story-done-auto
  acceptance_criteria_source: cli-create
