      \ (autogest\xE3o). Nada de PaymentIntent na m\xE3o. Nunca passar payment_method_types.\n\
      - Overage = Billing Meters b\xE1sico (pay-as-you-go simples); Metronome s\xF3\
      \ se virar UBB complexo (enterprise/cr\xE9ditos).\n- Free = sem Stripe (row\
      \ no PG). Enterprise = faturado \xE0 parte, fora do MVP.\n- Fluxo: MCP server\
