      DECIS\xD5ES (defaults ratificados salvo obje\xE7\xE3o): sem trial no MVP \xB7\
      \ Stripe Tax diferido p\xF3s-MVP \xB7 overage come\xE7a em Billing Meters b\xE1\
      sico.\nOrdem: (1) Barna faz setup Stripe \u2192 price_ids; (2) agente billing\
      \ (rotas+webhook+dashboard) em PR; (3) resolver plano-por-tenant no dna; (4)\
      \ job de overage quando PG dur\xE1vel subir."
