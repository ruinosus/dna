kind: Story
metadata:
  name: s-dna-cloud-billing
spec:
  title: "Billing \u2014 flat+quota+overage via a provider (Stripe-class), metering\
    \ tool calls server-side"
  description: 'Wire a billing provider (Stripe-class) for the SaaS: subscription
    per plan (flat monthly) + included quota + metered overage on tool-call counts.
    The server is the meter (it already counts calls for quota); push usage records
    to the provider for billing; the provider''s webhook flips the plan claim on subscribe/cancel/payment-fail.
    Design decision open: per-invocation pure metering vs flat+quota+overage (leaning
    flat+quota+overage for predictability). Provider choice open for the owner.'
  status: done
  feature: f-dna-cloud
  priority: medium
  labels:
  - saas
  - billing
  - stripe
  - metering
  - overage
  reporter: claude-code
  business_value: 480
  acceptance_criteria:
  - text: Given a subscribed user, When the billing period closes, Then flat + metered-overage
      (calls above quota) are invoiced from server-side usage records
    done: true
    done_at: '2026-07-12T00:01:55+00:00'
    done_by: story-done-auto
  - text: Given a provider webhook (subscribe/cancel/payment-fail), When received,
      Then the user's plan claim is updated so enforcement follows billing state
    done: true
    done_at: '2026-07-12T00:01:55+00:00'
    done_by: story-done-auto
