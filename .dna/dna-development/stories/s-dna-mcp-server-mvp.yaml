apiVersion: github.com/ruinosus/dna/sdlc/v1
kind: Story
metadata:
  name: s-dna-mcp-server-mvp
spec:
  title: "MCP server MVP \u2014 one stdio server exposing definitions + SDLC + memory"
  description: 'Build the thin MCP server (dna mcp serve, [mcp] extra) exposing DNA
    live over stdio: definitions, SDLC and memory tools + resources.'
  status: review
  feature: f-dna-mcp-server
  priority: high
  labels:
  - mcp
  - runtime
  acceptance_criteria:
  - Given a configured DNA source, When an MCP client calls compose_prompt(scope,agent),
    Then it returns the live-composed Soul+Guardrail+instruction prompt
  - Given a scope with a tenant overlay, When compose_prompt is called with tenant=X,
    Then the returned prompt reflects the tenant overlay (recovering what emit drops)
  - Given the same single server, When a client calls sdlc_digest / list_stories /
    get_adr, Then it returns the board data (the self-describing SDLC)
  - Given the same single server, When a client calls recall(query), Then it returns
    the matching DNA memory
  - Given the base install without the [mcp] extra, When dna is imported/run, Then
    nothing breaks (mcp imported lazily)
  acceptance_criteria_source: cli-create
  definition_of_done:
  - 'Code: dna_mcp server module + dna mcp serve CLI + [mcp] optional extra on dna-cli
    (lazy import)'
  - "Tests: in-process test instantiating the server and calling compose_prompt (incl.\
    \ tenant), sdlc_digest, list_agents, recall \u2014 one smoke proving definitions+SDLC+memory\
    \ from the SAME server"
  - "Docs: guide 'The MCP server \u2014 DNA as a live layer' (emit vs MCP, static/dynamic\
    \ table, how a client connects) + mkdocs nav; mkdocs build --strict green"
  - 'CI: suites + guards + mkdocs --strict green (11/11); CHANGELOG [Unreleased] updated;
    base install unaffected'
  definition_of_done_source: cli-create
