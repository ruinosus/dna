    actor: claude-code
    type: comment
    source: cli
    summary: "Origem: kaizen kz-001 (achado ao usar o DNA no consumidor foundry \u2014\
      \ gate de eval com dep local: resolvia no SDK via Kernel.quick mas nao no CLI\
      \ via dna eval run). Sem doc kz-001 no scope, cito aqui. Confirmei a mecanica\
      \ lendo os dois caminhos: build_quick_manifest registra o set completo de resolvers;\
      \ build_auto_kernel so registra LocalResolver quando recebe source; e o CLI\
      \ (_ctx._build_holder_async) chama Kernel.auto() SEM source e wira o source\
      \ depois, entao a branch de resolvers nunca roda -> zero resolvers no CLI. Proximo:\
      \ escrever o teste vermelho (TDD) e extrair helper compartilhado."
    commit_ref: fec9824409b71804205826e6b506a7d59d1605b0
  - at: '2026-07-11T10:29:22+00:00'
    actor: claude-code
    type: comment
    source: cli
    summary: "Fix aplicado. Extrai helper wire_filesystem_resolvers(kernel, base_dir)\
      \ em kernel_bootstrap.py (set canonico: local+github+http+https+registry+helix).\
      \ build_quick_manifest e build_auto_kernel (branch fs) agora usam o helper ->\
      \ uma so receita. CLI _ctx._build_holder_async passou a chamar o helper quando\
      \ source.supports_readers (fs), no-op honesto p/ SQLite/Postgres (sem scopes-root,\
      \ LocalResolver nao faz sentido). from_config alinhado por construcao (roteia\
      \ via build_auto_kernel). Teste TDD (packages/cli/tests/test_cli_local_resolver.py):\
      \ 4 casos, RED antes / GREEN depois \u2014 CLI resolve local:my-lib igual ao\
      \ Kernel.quick, e ambos concordam. Nota extra: antes build_auto_kernel so registrava\
      \ 'local'; agora registra o set completo, fechando tambem um gap latente github:/http:\
      \ no caminho auto e alinhando com o TS fromConfig."
    commit_ref: fec9824409b71804205826e6b506a7d59d1605b0
