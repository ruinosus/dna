apiVersion: github.com/ruinosus/dna/sdlc/v1
kind: Story
metadata:
  name: s-cli-localresolver-consistency
spec:
  title: 'CLI boot registers LocalResolver (auto==quick for local: deps)'
  description: "dna eval run / CLI boot builds kernel via Kernel.auto() WITHOUT LocalResolver\
    \ while Kernel.quick registers it \u2014 a local:<scope> dep resolves in the SDK\
    \ but not the CLI. Wire the resolvers on the CLI boot path consistently."
  status: done
  feature: f-dna-dx-configure
  priority: high
  labels:
  - cli
  - sdk
  - bug
  reporter: claude-code
  acceptance_criteria:
  - text: "Given a scope with a local:<lib-scope> dep, When the CLI boot path (dna\
      \ eval run) builds the kernel and resolves the manifest, Then the local: dep\
      \ resolves (LocalResolver present) \u2014 same result as Kernel.quick."
    done: true
    done_at: '2026-07-11T10:47:41+00:00'
    done_by: story-done-auto
  - text: Given a non-filesystem source (sqlite/postgres) with no resolvable base_dir,
      When the CLI boots, Then no LocalResolver is wired (documented no-op) and boot
      does not error.
    done: true
    done_at: '2026-07-11T10:47:41+00:00'
    done_by: story-done-auto
  - text: 'Given Kernel.quick for the same scenario, When it resolves the manifest,
      Then it still resolves the local: dep (no regression).'
    done: true
    done_at: '2026-07-11T10:47:41+00:00'
    done_by: story-done-auto
  acceptance_criteria_source: claude-code
  definition_of_done:
  - text: 'Code: CLI boot (_ctx._build_holder_async) wires the same resolver set as
      Kernel.quick for filesystem sources via a shared bootstrap helper; from_config/build_auto_kernel
      aligned.'
    done: true
    done_at: '2026-07-11T10:47:41+00:00'
    done_by: story-done-auto
  - text: 'Tests: a regression test proves the CLI/auto boot resolves a local: dep
      (red before, green after) and that Kernel.quick keeps resolving; ideally the
      same scenario via both paths yields the same result.'
    done: true
    done_at: '2026-07-11T10:47:41+00:00'
    done_by: story-done-auto
  - text: 'Docs: CHANGELOG [Unreleased] entry; Py<->TS asymmetry (CLI is Py-only)
      documented.'
    done: true
    done_at: '2026-07-11T10:47:41+00:00'
    done_by: story-done-auto
  - text: 'CI: full Py + TS suites + guards + mkdocs build --strict green; 11/11 checks
      on the PR.'
    done: true
    done_at: '2026-07-11T10:47:41+00:00'
    done_by: story-done-auto
  definition_of_done_source: claude-code
