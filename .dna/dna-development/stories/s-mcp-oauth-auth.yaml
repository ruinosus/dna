    summary: "Built the auth<->tenancy BRIDGE (dna_cli._mcp_auth) \u2014 the DNA-specific\
      \ value. Provider for the MVP: JWT bearer Resource Server (FastMCP JWTVerifier,\
      \ env-configured; RemoteAuthProvider wrapper advertises PRM RFC 9728; provider-agnostic\
      \ seam for a later WorkOS/Auth0 OAuthProxy). BRIDGE: verified token's claim\
      \ 'tenant' (configurable) or scope 'tenant:<x>' -> a DNA tenant, injected into\
      \ EVERY tool's data access (mi(scope,tenant)/with_tenant/kernel.query(tenant=));\
      \ cross-tenant request DENIED, tenant-less token DENIED (fail closed); no-auth\
