      \ globex get tenant-scoped compose_prompt (acme sees overlay, globex doesn't);\
      \ acme->globex denied; tenant-less denied; unauthenticated rejected; PRM discoverable.\
      \ 15 auth tests green. ADR adr-dna-mcp-runtime-face updated with the bridge\
      \ decision + provider choice + spec revisions (MCP Authorization 2025-11-25,\
      \ FastMCP 3.4)."
