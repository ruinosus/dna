spec:
  title: "dna explain \u2014 per-section prompt provenance"
  description: 'Ship ''dna explain <agent>'' + build_prompt(explain=True): composed
    prompt PLUS section provenance map (source file, hash, version, layer/overlay
    origin), byte-equal gate. Ref sp-exp-provenance.'
  status: in-progress
  feature: f-dna-cloud-intelligence
  acceptance_criteria:
  - Given an agent, When build_prompt(explain=True), Then it returns the prompt plus
    a per-section provenance map and the prompt is byte-identical to plain build_prompt.
  - Given a tenant overlay wins a layer, When dna explain runs, Then the row is marked
    OVERRIDDEN by tenant overlay.
  acceptance_criteria_source: claude-code
  definition_of_done:
  - 'Code: explain API in prompt builder (Py+TS parity) + dna explain CLI.'
  - 'Tests: Py+TS cover explain map + byte-equality gate + overlay marker.'
