    source: cli
    summary: "Kit implementado seguindo o padr\xE3o can\xF4nico do record_search_conformance\
      \ (factory async \u2192 (objeto, cleanup), caso fresh por execu\xE7\xE3o, skip\
      \ via SkipTest, runner program\xE1tico + report). Decis\xF5es: (1) DOIS suites\
      \ \u2014 memory_conformance_suite (kernel-bound, 10 casos sobre os verbos, capability-aware\
      \ via superf\xEDcie P\xDABLICA: remember reporta indexed / backfill_index retorna\
      \ 0 \u2192 MemoryCaseNotApplicable, sem tocar atributo privado) e memory_scoring_conformance_suite\
      \ (7 casos puros, twin TS memoryScoringConformanceSuite com nomes id\xEAnticos\
      \ \u2014 o pr\xF3prio kit \xE9 artefato de paridade). (2) Tempo 100% simulado\
      \ (now= dos verbos): staleness pro consolidate \xE9 produzida SURFACEANDO a\
      \ mem\xF3ria em data antiga via recall (superf\xEDcie p\xFAblica), n\xE3o escrevendo\
      \ last_surfaced na m\xE3o. (3) Casos com embedder assertam similaridade RELATIVA\
      \ (filosofia do search kit) \u2014 vale pra fake floor e modelo real; o caso\
      \ da par\xE1frase documenta o gate honesto cos \u2265 (threshold\u2212novelty)/cosine_weight\
      \ \u2248 0.41. (4) Verbos ficam Py-only (fronteira j\xE1 declarada no repo);\
      \ TS espelha s\xF3 o core puro. Verificado: Py 26 pass + 3 skips sim\xE9tricos\
      \ esperados (lexical skipa fus\xE3o/backfill; sqlite-vec skipa fallback lexical;\
      \ uni\xE3o dos passed == todos os 10 casos), TS 15 pass + typecheck OK. Leg\
      \ pgvector escrito no mesmo padr\xE3o requires_postgres/schema descart\xE1vel\
      \ do search kit \u2014 valida\xE7\xE3o local imposs\xEDvel (containerd com I/O\
      \ error, sem PG local), o job postgres do CI \xE9 o gate."
    commit_ref: 95232da0c9429b4e65644b1ba856af248763352c
