apiVersion: github.com/ruinosus/dna/sdlc/v1
kind: Story
metadata:
  name: s-memory-conformance-kit
spec:
  title: "Kit p\xFAblico de conformance de mem\xF3ria em dna.testing"
  description: "Follow-up nomeado do PR #38: dna.testing tem kits p\xFAblicos pra\
    \ SourcePort, Reader/Writer e RecordSearchProvider mas n\xE3o pra mem\xF3ria.\
    \ Criar memory_conformance_suite (verbos kernel-bound, capability-aware) + memory_scoring_conformance_suite\
    \ (core puro, twin TS memoryScoringConformanceSuite) pinando os invariantes comportamentais:\
    \ roundtrip remember\u2192recall, determinismo, semantic on/off, forget bi-temporal,\
    \ consolidate idempotente, decay monot\xF4nico, backfill lazy idempotente, pesos/threshold\
    \ do ecphory e fus\xE3o RRF."
  status: review
  feature: f-dna-search-memory
  reporter: claude-code
  acceptance_criteria:
  - "Given um autor de adapter com um kernel factory (source grav\xE1vel + provider\
    \ opcional), When ele roda memory_conformance_suite(factory) via pytest parametrize,\
    \ Then os 9 casos kernel-bound passam contra sqlite-vec e pgvector builtin e casos\
    \ que exigem provider skipam limpo sem provider"
  - "Given um embedder custom (EmbeddingPort), When memory_scoring_conformance_suite/memoryScoringConformanceSuite\
    \ rodam com o factory dele, Then os casos puros (pesos/threshold ecphory, fus\xE3\
    o RRF, decay monot\xF4nico, bi-temporal fail-open, cosine relativo) passam em\
    \ Py e TS com nomes de caso id\xEAnticos"
  - "Given recall com semantic=False, When o kit valida o shape, Then hits sem anota\xE7\
    \xF5es de fus\xE3o (byte-shape base); com provider em modo auto, semantic=True\
    \ + rank_recall/rank_ecphory/score_recall anotados"
  - "Given um consumidor externo simulado (projeto scratch com sdk editable + provider\
    \ fake trivial implementado de fora), When ele roda run_memory_conformance + run_memory_scoring_conformance,\
    \ Then a suite passa provando a API p\xFAblica de fora"
  acceptance_criteria_source: cli-create
  definition_of_done:
  - "kit Py dna.testing.memory_conformance + espelho TS dna-sdk/testing pro core puro\
    \ (verbs Py-only documentado); kit rodando contra sqlite-vec + pgvector (requires_postgres,\
    \ mesmo padr\xE3o do job postgres); docs na casa dos kits (getting-started/conformance-kit.md)\
    \ + ponteiro no guia de semantic recall; refer\xEAncias re-geradas se drift; suites\
    \ completas sdk-py/sdk-ts+typecheck/cli + guards + mkdocs --strict verdes; smoke\
    \ de produto com TestGuide --product + TestRun; PR via story pr com CI 11/11,\
    \ sem merge"
  definition_of_done_source: cli-create
