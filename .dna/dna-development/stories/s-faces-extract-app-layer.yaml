  feature: f-dna-cloud-intelligence
  acceptance_criteria:
  - Shared *_impl (compose_prompt/list_agents/list_tools/get_tool/recall/remember/consolidate/list_memories/forget/list_stories/get_adr)
    live in dna.application, transport-agnostic (no HTTP/Click/FastMCP)
  - MCP + REST faces import the use-cases from core and delegate; auth/quota stay
    at the MCP edge
  - dna mcp serve / dna api serve unchanged (same endpoints/responses); full sdk-py
    + cli suites green; guards clean
