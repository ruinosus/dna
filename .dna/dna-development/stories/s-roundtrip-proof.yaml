    summary: "Circulo B fica BLOQUEADO aguardando um export de memoria real do Claude.\
      \ Nao existe amostra no repo nem especificacao do formato no design (so a mencao\
      \ a Import Tool da Anthropic). Construir o adaptador contra um formato inventado\
      \ o validaria contra a propria ficcao \u2014 o criterio de aceite (recall por\
      \ parafrase de um fato vindo do Claude) perderia todo valor probatorio. Founder\
      \ vai fornecer o arquivo. Circulo A nao depende disso e segue agora."
    commit_ref: 522b6c74b71f40791e4a17b464e914d12c2276a3
  - at: '2026-07-19T20:43:00+00:00'
    actor: claude-code
    type: comment
    source: cli
    summary: "Metricas do DoD medidas (nao estimadas):\n\nCIRCULO A (caso interchange_round_trip\
      \ no memory_conformance_suite, requires=always):\n- Fidelidade de campo: 22/22\
      \ propriedades declaradas do descritor Engram sobrevivem com o MESMO VALOR.\
      \ A lista de campos e derivada do descritor em tempo de execucao, entao um Kind\
      \ que ganhe campo faz o caso FALHAR em vez de virar falso verde.\n- Preservacao\
      \ bi-temporal: valid_from, valid_to e superseded_by_memory preservados.\n- Idempotencia:\
      \ o primeiro round-trip NORMALIZA (carimba defaults e espelha summary em body);\
      \ do ciclo 2 em diante e ponto fixo. Asserir spec==back seria falso; asserir\
      \ nada esconderia crescimento sem limite.\n- Mutacao: 4 mutantes (cofre sem\
      \ affect, cofre sem surface_count, to_mif sem validUntil assimetrico, id pin\
      \ removido) \u2014 todos mortos. Duas versoes anteriores das minhas proprias\
      \ asser\xE7\xF5es SOBREVIVERAM a mutacao e foram reescritas: a checagem de fidelidade\
      \ testava presenca, nao valor, e o from_mif carimba defaults, entao um campo\
      \ que parava de ser carregado reaparecia com o default.\n\nCIRCULO B (adaptador\
      \ claude-export -> MIF):\n- LOC: 142 totais / 80 de codigo real (AC pedia <~150).\n\
      - Perda de prosa na segmentacao: ZERO (verificado contra o export REAL do founder,\
      \ 11 unidades; as unicas palavras ausentes do content sao as dos cabecalhos,\
      \ que vivem em title).\n- Determinismo: ids identicos entre execucoes; id derivado\
      \ do conteudo, nao do created, entao reimportar um export posterior deduplica\
      \ em vez de bifurcar.\n- Recuperabilidade por parafrase: alvo em RANK 1 com\
      \ embed-onnx, semantic=True, degraded=False, em corpus de 14 memorias.\n\nRESSALVA\
      \ MEDIDA, que muda o valor da AC: 'hit no top-3' NAO discrimina. Com --no-semantic\
      \ o fato ainda cai em rank 2 \u2014 nao porque o BM25 casou (nao ha palavra\
      \ em comum) mas porque, sem nada casando, a ordem cai nos desempates de retencao/confianca.\
      \ Por isso o teste asserta RANK 1, que e o que o plano semantico de fato compra."
    commit_ref: 522b6c74b71f40791e4a17b464e914d12c2276a3
