  acceptance_criteria:
  - Dado N Engrams semeados, quando export -> import -> diff semantico dos specs,
    entao 100% dos campos da secao 2 sobrevivem, x-dna voltam identicos, a cadeia
    supersede/valid_to e preservada e nao ha duplicatas
  - Dado o Circulo A, entao esta ligado ao memory_conformance_suite como caso 'interchange
    round-trip'
