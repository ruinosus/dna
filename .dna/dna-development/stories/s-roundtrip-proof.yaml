    -> MIF e importado com --as both --personal, entao um recall por PARAFRASE (sem
    token compartilhado) do fato importado retorna hit no top-3 com embed-onnx
  - Dado o adaptador, entao tem menos de ~150 LOC (a metrica de 'formato novo custa
    pouco')
  acceptance_criteria_source: cli-create
  definition_of_done:
  - Circulo A e B verdes na suite; metricas registradas (fidelidade de campo, preservacao
    bi-temporal, recuperabilidade por parafrase, idempotencia, LOC do adaptador);
    Circulo C explicitamente fora
