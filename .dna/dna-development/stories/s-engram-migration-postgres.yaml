    source: cli
    summary: 'Implementado: scripts/migrate_engram_postgres.py (nova) faz a migracao
      Postgres LessonLearned->Engram com pre-checagem de colisao (aborta ANTES de
      qualquer escrita, transacao unica via asyncpg), cobrindo dna_documents/dna_versions/dna_layer_documents/dna_bundle_entries/dna_edges
      (from_kind E to_kind)/dna_search_docs (skip gracioso se a tabela nao existir
      - pgvector e opt-in). Discrepancia vs a spec original: a PK real de dna_documents
      e dna_bundle_entries e (scope,kind,name,tenant) - a migracao v3 (Phase 8a) adicionou
      tenant na PK, nao so na tabela; as chaves de colisao usam isso. dna_outbox:
      decisao de NAO reescrever (ledger imutavel - nada resolve identidade por ele,
      so invalidacao de cache); contagem exposta no relatorio para visibilidade. scripts/migrate_engram.py
      (nova) unifica --source path-ou-url, delega para o script de FS (inalterado,
      12 testes originais continuam verdes) ou o novo modulo PG. Runbook: docs/guides/engram-postgres-cutover.md.
      Testes: packages/sdk-py/tests/test_migrate_engram_postgres_integration.py, 7
      casos contra Postgres local real (schema efemera por teste, migrada via SqlAlchemySource.connect()
      real) - migracao limpa multi-tabela, idempotencia, colisao abortando ANTES de
      qualquer escrita (inclusive em tabela diferente da que colidiu), colisao em
      edges (from/to independente), dry-run sem escrita, e o caminho generico de kind-only-table
      testado contra um UNIQUE real (dna_search_docs nao pode ser testado end-to-end
      aqui - extensao vector nao instalada neste Postgres local, mesmo gap que fez
      test_pgvector_memory_conformance.py falhar pre-existentemente, nao relacionado
      a esta mudanca). Mutation-testing: quebrei has_collisions() para sempre False
      -> 2 testes de colisao falharam (um delas por um UniqueViolationError REAL do
      Postgres, provando o pre-flight evita exatamente esse desastre); restaurado,
      verde. Quebrei o WHERE do UPDATE de dna_documents (AND false) -> 2 testes falharam
      (clean migration + idempotencia); restaurado, verde. Suite completa do SDK:
      2321+ passed, so a falha pre-existente de pgvector (ambiente sem extensao vector),
      nao tocada por esta story.'
    commit_ref: a14bec562bbd9b48df89155966374ef22f621044
