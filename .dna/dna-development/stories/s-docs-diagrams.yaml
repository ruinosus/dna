    \ carimbados)\u2192test-gate\u2192done + a symbiosis git\u2194SDLC; (7) README\
    \ \u2014 1 diagrama hero compacto da arquitetura (GitHub renderiza mermaid nativo).\
    \ Config superfences/mermaid no mkdocs.yml vem da story irm\xE3 s-docs-search-memory-prose\
    \ (que est\xE1 adicionando) \u2014 se ela n\xE3o tiver mergeado ainda, incluir\
    \ aqui com merge cuidadoso. Diagramas simples (~10 n\xF3s), sem cores custom,\
    \ leg\xEDveis no tema claro/escuro."
