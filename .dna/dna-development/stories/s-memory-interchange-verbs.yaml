  name: s-memory-interchange-verbs
spec:
  title: Modulo de projecao dna/memory/interchange.py (to_mif/from_mif, puros e determini
  description: Modulo de projecao dna/memory/interchange.py (to_mif/from_mif, puros
    e deterministicos) + os verbos CLI dna memory export/import na superficie Click
    existente. Cobre o mapeamento da secao 2 do design com o cofre x-dna e a estabilidade
    de @id no round-trip.
  status: in-progress
  feature: f-portable-memory
  priority: high
  labels:
  - memory
  - interchange
  - cli
  reporter: claude-code
  acceptance_criteria:
  - text: Dado interchange.py, quando to_mif(spec)/from_mif(doc) rodam, entao sao
      puros, deterministicos, sem rede, com espelho Py<->TS, e cobrem 100% do mapeamento
      da secao 2 incluindo o cofre extensions.x-dna
    done: true
    done_at: '2026-07-19T19:50:33+00:00'
    done_by: claude-code
    evidence: packages/sdk-py/dna/memory/interchange.py (to_mif/from_mif, pure/no
      network/no LLM) + TS mirror packages/sdk-ts/src/memory/interchange.ts; test_memory_interchange.py
      (18 tests, full-field + x-dna vault round trip, real MIF fixtures) + memory-interchange-parity.json/test_memory_interchange_parity.py/memory-interchange-parity.test.ts
      (Py<->TS parity, both green)
  - text: "Dado um Engram nascido no DNA, quando exportado, entao um urn:mif:<uuid>\
      \ e mintado UMA vez e pinado de volta no doc \u2014 um segundo export produz\
      \ o mesmo @id"
    done: true
    done_at: '2026-07-19T19:50:37+00:00'
    done_by: claude-code
    evidence: "CORRECTED per real descriptor (see decision comment): the pinned id\
      \ is a plain string in encoding_context['mif_id'], not urn:mif:<uuid> in the\
      \ doc \u2014 resolve_or_mint_mif_id() mints once, CLI export pins it back onto\
      \ the Engram; test_id_is_stable_across_repeated_exports_of_the_same_engram (CLI)\
      \ + test_reexport_of_the_same_engram_produces_the_same_id (unit) prove a second\
      \ export reuses the same id (minted_ids=0)"
  - text: Dado um MIF importado, quando reexportado, entao o @id original e preservado;
      --dedupe id e idempotente e o round-trip nao duplica
    done: true
    done_at: '2026-07-19T19:50:41+00:00'
    done_by: claude-code
    evidence: 'from_mif() pins doc[''id''] into encoding_context[''mif_id''] on import;
      test_import_pins_the_docs_own_id_for_a_stable_reexport + test_dedupe_id_reimport_no_op
      (CLI: re-import of the same export is skipped=1, imported=0, list count stays
      1) + test_dedupe_off_does_not_error_but_id_dedupe_default_prevents_duplication'
  - text: Dado dna memory export, entao suporta --format mif, --out, --bundle, --personal,
      --include-forgotten alem de --scope/--tenant/--kind/--json
    done: true
    done_at: '2026-07-19T19:50:44+00:00'
    done_by: claude-code
    evidence: "dna memory export: --format {mif} (omp/pam documented future), --out,\
      \ --bundle (JSON-LD @graph), --personal, --include-forgotten, --scope/--tenant/--kind/--json\
      \ \u2014 dna_cli/memory_cmd.py export_cmd; test_bundle_json_ld_round_trips_through_import\
      \ + test_include_forgotten_carries_the_bi_temporal_chain + test_export_rejects_non_engram_kind"
  - text: Dado dna memory import, entao suporta --as passthrough|native|both (default
      both), --dedupe id|content-hash|off, --personal alem de --scope/--tenant/--json
    done: true
    done_at: '2026-07-19T19:50:48+00:00'
    done_by: claude-code
    evidence: "dna memory import PATH: --as {passthrough,native,both} (default both),\
      \ --dedupe {id,content-hash,off} (default id), --personal, --scope/--tenant/--json\
      \ \u2014 import_cmd; test_as_passthrough_only_does_not_project_an_engram + test_dedupe_id_reimport_no_op"
  - text: 'Dado --personal, entao respeita INV-PERSONAL: identidade resolvida server-side,
      nunca argumento; export pessoal nunca vaza memoria de workspace e import pessoal
      nunca cai em particao compartilhada'
    done: true
    done_at: '2026-07-19T19:50:52+00:00'
    done_by: claude-code
    evidence: reuses dna.memory.personal (no reimplementation) via _resolve_memory_tenant
      (existing helper); test_personal_export_excludes_named_workspace_tenant + test_workspace_export_excludes_personal_memory
      + test_personal_import_lands_only_in_the_importers_own_partition (2 distinct
      identities A/B, cross-checked against a NAMED workspace tenant, not just base)
      + test_personal_and_tenant_mutually_exclusive_for_export
