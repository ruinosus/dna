  - at: '2026-07-19T19:50:06+00:00'
    actor: claude-code
    type: decision
    source: cli
    summary: "\xA76 id-stability decision (resolving the inherited open question):\
      \ the MIF Markdown-profile 'id' is a PLAIN string (not urn:mif:<uuid> \u2014\
      \ that's the JSON-LD @id, a separately-derived projection, per the passthrough\
      \ descriptor's own correction #1). So: mint a plain id (CLI default factory:\
      \ uuid4) and pin it to Engram.spec.encoding_context['mif_id'] (a flat scalar\
      \ \u2014 encoding_context already declares additionalProperties:true, no schema\
      \ change needed), NOT to Engram.name (a different concept \u2014 DNA's own storage\
      \ key) and NOT into a source_ref (semantically 'derived-from' provenance, would\
      \ collide with that mapping). resolve_or_mint_mif_id(spec, id_factory=...) reuses\
      \ the pinned id on re-export; from_mif() pins the doc's own id on import so\
      \ a re-export of an imported memory is stable too. dna/memory/interchange.py\
      \ module docstring has the full writeup; design doc \xA72/\xA76 updated to match."
    commit_ref: 8b9011568bf42719192ec5a76e37d8bbb884323f
  - at: '2026-07-19T19:50:10+00:00'
    actor: claude-code
    type: decision
    source: cli
    summary: "Second divergence found against the (explicitly non-authoritative) design\
      \ table: homophonic_links needs NO extensions.x-dna vault entry \u2014 the real\
      \ descriptor's relationships[].strength (0-1) is an exact fit for resonance_score,\
      \ and the open relationships[].metadata fits basis. Only fields with genuinely\
      \ no MIF-side home are vaulted: confidence_score, relevance_decay_seed, surface_count,\
      \ cues_history, encoding_context, affect, affect_reason, visibility (the task's\
      \ list) PLUS affect_evidence_refs, surface_when, revisions, last_surfaced (found\
      \ while checking every Engram schema field, not just the pre-named ones) \u2014\
      \ omitting them would have silently broken the 'loses nothing' bar."
    commit_ref: 8b9011568bf42719192ec5a76e37d8bbb884323f
  - at: '2026-07-19T19:50:14+00:00'
    actor: claude-code
    type: comment
    source: cli
    summary: "Implemented: dna/memory/interchange.py (to_mif/from_mif, pure) + TS\
      \ mirror packages/sdk-ts/src/memory/interchange.ts (following the established\
      \ precedent that every OTHER pure dna/memory/*.py module \u2014 decay/ecphory/encodingContext/memoryType/personal/policy/retrieval/semantic\
      \ \u2014 has a TS twin; only the kernel-bound verbs.py does not). Added a dedicated\
      \ Py<->TS parity fixture (memory-interchange-parity.json) mirroring the memory-scoring-parity.json\
      \ convention. CLI verbs dna memory export/import added to dna_cli/memory_cmd.py\
      \ on the existing Click surface (--format/--out/--bundle/--personal/--include-forgotten\
      \ for export; --as/--dedupe/--personal for import), no new vocabulary. 18 pure\
      \ unit tests (packages/sdk-py/tests/test_memory_interchange.py, including 2\
      \ real MIF spec fixtures from tests/parity-fixtures/mif/), 12 CLI tests (packages/cli/tests/test_memory_interchange_cmd.py)\
      \ covering id-stability, dedupe idempotence, and INV-PERSONAL isolation (personal\
      \ export excludes named-tenant workspace memory and vice versa; personal import\
      \ lands only in the importer's own partition, verified against a SECOND identity).\
      \ Mutation-tested: dropping a vault field breaks 2 tests; disabling the id-pin\
      \ reuse breaks 4 pure tests + 1 CLI test \u2014 both restored to green. Full\
      \ suites green: sdk-py 3438 passed, cli 898 passed, sdk-ts 1735 pass (0 failed\
      \ everywhere)."
    commit_ref: 8b9011568bf42719192ec5a76e37d8bbb884323f
