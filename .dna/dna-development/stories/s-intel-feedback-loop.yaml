    summary: "Core landed: pure dna/extensions/intel/feedback.py (adjust_score, precision,\
      \ noise_rate, summarize_states). set_insight_state now records a feedback engram\
      \ via the co-pillar remember() \u2014 dismissed=LessonLearned affect regret\
      \ (negative), actioned=triumph (reinforce), area Intel/<source>, body=insight\
      \ title+fact so the ranker can compare. engine.run_pass step 2 recalls the source\
      \ engrams, embeds candidate+engram texts once, and lowers dismissed-similar\
      \ candidates below the effective threshold (raise). Writes are fail-soft + skipped\
      \ when LessonLearned is not registered, so IntelExtension-only kernels are unaffected.\
      \ Test proves a dismissed pattern suppresses a similar (not identical) candidate\
      \ next pass (cosine band 0.80..0.97, control keeps it). feedback_metrics exposes\
      \ precision/noise_rate. Next: thin CLI + REST metric faces + docs regen."
