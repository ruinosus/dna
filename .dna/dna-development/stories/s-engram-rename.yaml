    source: cli
    summary: "DECISAO (c) REVERTIDA (founder, 2026-07-19): de 'alias read-time, zero\
      \ migracao' para REWRITE UNICO. Motivo: nao ha nenhum usuario nos dois repos\
      \ \u2014 a compat protegeria consumidores que nao existem. A medicao confirmou\
      \ o custo real: 5 memorias em disco (4 em personal:local-user, 1 em dna-cloud-dev),\
      \ todas YAML plano, rewrite mecanico de dois campos (apiVersion + kind). Producao\
      \ nao foi mensuravel (o MCP negou por membership/oid \u2014 ver s-consumer-lane-memory-key),\
      \ mas a decisao nao depende da contagem: o script e idempotente e reporta a\
      \ propria. Consequencia no desenho: cai o descritor de compat, cai o mecanismo\
      \ de alias (a escolha 'dois descritores vs lista' fica irrelevante), cai a desambiguacao\
      \ de _resolve_api_version. Fica o teste do conjunto que falha aberto \u2014\
      \ esse risco nao muda. Racional: rename limpo e mais barato agora do que jamais\
      \ sera; acumular divida de compat antes de existir alguem para quem ser compativel\
      \ e o pior dos dois mundos."
