apiVersion: github.com/ruinosus/dna/sdlc/v1
kind: Story
metadata:
  name: s-engram-rename
spec:
  title: Renomear o Kind de memoria LessonLearned -> Engram com identidade github.com/rui
  description: Renomear o Kind de memoria LessonLearned -> Engram com identidade github.com/ruinosus/dna/v1,
    preservando LessonLearned (/sdlc/v1) e o alias sdlc-lesson-learned como compat
    read-time. Bloqueia as demais stories (tudo abaixo fala 'Engram').
  status: review
  feature: f-portable-memory
  priority: high
  labels:
  - memory
  - kinds
  - parity
  reporter: claude-code
  acceptance_criteria:
  - Dado o novo descritor engram.kind.yaml, quando registrado, entao apiVersion=github.com/ruinosus/dna/v1
    e kind=Engram, schema identico ao atual, espelho Py<->TS byte-identico e golden
    de hash-parity atualizado
  - "Dado um doc ja gravado com kind: LessonLearned (/sdlc/v1), quando lido, entao\
    \ resolve como Engram via mapa de alias read-time \u2014 com golden novo provando\
    \ a resolucao"
  - Dado o alias legado sdlc-lesson-learned, quando usado, entao continua resolvendo
    para Engram
  - Dado que KindDefinitionSpec.alias e hoje uma string unica, quando a compat exigir
    dois nomes, entao a solucao (aliases lista vs mapa externo) e implementada com
    paridade Py<->TS e goldens em lockstep
  - Dado o Kind renomeado, entao display_label = Engrama e a view SDLC 'Licoes Aprendidas'
    segue funcionando como lente (Engram com affect reflexivo em area de SDLC), nao
    como nome do tipo
  acceptance_criteria_source: cli-create
  definition_of_done:
  - Zero migracao obrigatoria de dados; suite de memoria existente verde; goldens
    de parity e de alias verdes; make/CI verde; nenhum bump de pin e nenhum azd up
  definition_of_done_source: cli-create
