kind: Story
metadata:
  name: s-emit-bedrock
spec:
  title: "Second runtime emitter: DNA \u2192 Amazon Bedrock Agent (proves portability)"
  description: "Add dna emit --target bedrock \u2014 the second runtime emitter, materializing\
    \ a DNA agent into an AWS::Bedrock::Agent CloudFormation template (the de-para).\
    \ Proves the portability thesis: one DNA source \u2192 two runtimes."
  status: in-progress
  feature: f-dna-emitters
  owner: claude-code
  priority: highest
  acceptance_criteria:
  - Given the concierge example scope, When 'dna emit concierge --target bedrock',
    Then a structurally-valid AWS::Bedrock::Agent CloudFormation template is produced
  - Given the emitted template, When inspecting Properties.Instruction, Then it is
    byte-equal to mi.build_prompt(agent) (the survival gate)
  - Given a DNA Tool Kind, When emitted, Then it becomes an ActionGroup FunctionSchema
    Function with Parameters mapped {Type,Description,Required}
  - Given the bedrock emitter, When registered, Then it plugs into the same EmitterPort
    registry with no change to the CLI core
  acceptance_criteria_source: cli-create
  definition_of_done:
  - 'Code: dna/emit/bedrock.py + TS twin src/emit/bedrock.ts, registered in both registries'
  - "Tests: Py + TS emit-bedrock suites (byte-equal gate, structural de-para, honest\
    \ losses, credential-free schema shape validation); Py\u2194TS object parity"
  - 'Docs: ''Emitting to a runtime'' guide extended with the bedrock target + mapping
    table; CHANGELOG [Unreleased]'
  - 'CI: all 11 matrix checks green (suites + guards + mkdocs --strict); PR opened
    base main; NOT merged'
  - "UX: example extended \u2014 same concierge source emits to agent-framework AND\
    \ bedrock"
  definition_of_done_source: cli-create
