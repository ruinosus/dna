  feature: f-dna-sdlc-expressiveness
  acceptance_criteria:
  - "dna sdlc cite Research/<name> --from ADR/<name> (ou Epic) funciona e o v\xED\
    nculo aparece nos dois lados"
  - "cita\xE7\xE3o de bare-name continua defaultando pra Reference (backwards-compat)"
  acceptance_criteria_source: cli-create
  definition_of_done:
  - Teste automatizado travando cite cross-Kind + bidirecionalidade; Research ganha
    campo cited_by (Py+TS parity); docs/help atualizados; suites verdes
