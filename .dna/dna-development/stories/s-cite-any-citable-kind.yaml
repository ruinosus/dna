spec:
  title: "dna sdlc cite aceita qualquer Kind cit\xE1vel (n\xE3o s\xF3 Reference)"
  description: "Generaliza o resolvedor de cita\xE7\xE3o: cite <Kind>/<name> --from\
    \ <Kind>/<name>. Mant\xE9m bidirecionalidade (o citado ganha cited_by). Sem\xE2\
    ntica: produces=output autorado, cite=fonte que fundamenta."
