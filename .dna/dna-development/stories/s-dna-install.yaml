  title: 'dna install github:owner/repo[/subdir][@ref] [--scope NAME] [--dry-run]:
    instala'
  description: "dna install github:owner/repo[/subdir][@ref] [--scope NAME] [--dry-run]:\
    \ instala bundles/Kinds de um repo GitHub no source local \u2014 a porta de entrada\
    \ do ecossistema. EVOLU\xC7\xC3O (n\xE3o c\xF3pia) do source-as-distribution do\
    \ SDK upstream: reusa o GitHubResolver (ResolverPort, j\xE1 no DNA) pra fetch;\
    \ detecta bundles via os readers registrados; VALIDA e escreve via kernel.write_document\
    \ (todos os guards rodam \u2014 manifesto de terceiro \xE9 dado n\xE3o-confi\xE1\
    vel, coerente com SECURITY.md); registra proveni\xEAncia (lock \u2014 investigar\
    \ o lock_manager do kernel que j\xE1 viajou; sen\xE3o um installed-manifest pr\xF3\
    prio). dry-run mostra o plano; conflitos (doc j\xE1 existe) pedem --force ou skip\
    \ com aviso. Prosa obrigat\xF3ria (coverage guard: grupo CLI novo) + reference\
    \ regen (drift guard)."
