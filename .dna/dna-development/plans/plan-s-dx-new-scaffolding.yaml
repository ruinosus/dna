  body: 'New CLI group ''dna new agent|soul|guardrail <name>'' that scaffolds a valid
    skeleton doc into the scope via kernel.write_document (dna_session). Options:
    --scope, --soul/--guardrails/--layout/--model (agent), --force (idempotent, no
    overwrite without it), --dir/base. Skeleton = correct envelope apiVersion/kind/metadata/spec
    + a placeholder instruction/soul_content the author fills. CLI-only (Py); reuses
    dna doc apply write path. Tests in packages/cli/tests.'
