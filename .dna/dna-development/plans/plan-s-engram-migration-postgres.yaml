  title: 'Plano: s-engram-migration-postgres'
  date: '2026-07-19'
  status: accepted
  story_ref: s-engram-migration-postgres
  journey_phase: plan
  body: "Migracao Postgres do rename + runbook de cutover. Verificado no adapter sqlalchemy_:\
    \ kind e coluna real (integra PKs), apiVersion vive no JSON da coluna content\
    \ (que e TEXT-holding-JSON, castado para JSONB na leitura) \u2014 entao da para\
    \ fazer em SQL puro com jsonb_set, sem loop de parse em Python. Tabelas que carregam\
    \ a identidade: dna_documents (kind na PK), dna_versions, dna_layer_documents,\
    \ dna_bundle_entries, dna_edges (from_kind E to_kind, ambos na PK), dna_search_docs\
    \ (kind na UNIQUE), dna_outbox (audit \u2014 decidir se preserva como registro\
    \ historico). Passos: (1) generalizar a entrada \u2014 um verbo unico que aceita\
    \ --source como path de filesystem ou URL postgres e escolhe a implementacao;\
    \ (2) pre-checagem de colisao ANTES de qualquer escrita (kind dentro de PK/UNIQUE\
    \ significa que um Engram pre-existente de mesmo nome/scope aborta o UPDATE);\
    \ (3) migracao em transacao unica; (4) dry-run como default, com relatorio por\
    \ tabela; (5) teste contra Postgres semeado, modelado nos testes de integracao\
    \ PG existentes; (6) runbook documentando o cutover duro: freeze de escrita (scale-down\
    \ mcp/mcp-ws/api) -> migracao -> bump dos tres pins em lockstep -> azd up, e a\
    \ armadilha do .dna bakado na imagem do copilot que precisa ser migrado no mesmo\
    \ commit. Sem bump de pin nesta story."
  created_at: '2026-07-19T17:02:07+00:00'
  updated_at: '2026-07-19T17:02:07+00:00'
