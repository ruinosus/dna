  story_ref: s-faces-extract-app-layer
  journey_phase: plan
  body: "Realizes adr-faces-reorg move #1 (load-bearing).\n\n## What moves\nExtract\
    \ the transport-agnostic *_impl use-cases out of the CLI face (dna_cli._mcp_server)\
    \ into a new CORE application layer: packages/sdk-py/dna/application/ (live.py\
    \ = LiveDna handle; runtime.py = use-cases; __init__.py re-exports). Moved verbatim\
    \ (behavior-preserving): compose_prompt_impl, list_agents_impl, list_tools_impl,\
    \ get_tool_impl, list_stories_impl, get_adr_impl, recall_impl, remember_impl,\
    \ consolidate_impl, list_memories_impl, forget_impl + private helpers (_prompt_target_kinds/_tool_surface/_tool_rows/_collect/_slug)\
    \ + LiveDna.\n\n## Faces become thin\n- _mcp_server.py: imports the use-cases\
    \ from dna.application (re-exported so M.compose_prompt_impl etc still resolve\
    \ for tests); keeps boot_live (composition root) + build_server (FastMCP wiring)\
    \ + the auth/quota _guard seam AT THE EDGE.\n- _rest_api.py: imports the shared\
    \ use-cases from dna.application (was importing from _mcp_server); keeps boot_live\
    \ from _mcp_server.\n\n## Deferred (tracked, with note in code)\n- sdlc_digest_impl\
    \ stays in _mcp_server: it depends on CLI-internal _digest.build_digest/resolve_since\
    \ + sdlc_cmd._DIGEST_KINDS; clean move needs relocating the digest aggregator\
    \ (larger, separate change). MCP-only, no REST twin.\n- boot_live stays in CLI:\
    \ composition root reaching into dna_cli._ctx + recall_cmd.\n- REST-only memory\
    \ list/delete (_rest_api.list_memories_impl/delete_memory_impl) stay in the REST\
    \ face: single-face, no MCP twin \u2014 a follow-up to also lift into core.\n\n\
    ## Verification\nClean isolated venv (worktree editable installs), full sdk-py\
    \ + cli suites, brand_guard + docs_coverage_guard, regenerate parity/CLI/kinds\
    \ reference (expect no diff \u2014 no public surface/CLI change)."
