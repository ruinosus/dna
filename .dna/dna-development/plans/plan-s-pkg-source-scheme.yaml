  story_ref: s-pkg-source-scheme
  journey_phase: plan
  body: 'Extend the public source factory with a pkg:// scheme.


    ## Design

    - source_from_url/sourceFromUrl: pkg://<package>[/<subpath>] -> read-only FilesystemSource
    over anchor_scopes_root(package, subpath or .dna).

    - Reuse the shared package-data resolver (dna.package_scope / package-scope.ts).

    - Fail loud: missing package name (UnsupportedSourceScheme) + missing package/subpath
    (PackageScopeNotFound).

    - from_config accepts source: pkg://app (read-only source wired via existing supports_readers
    branch).'
