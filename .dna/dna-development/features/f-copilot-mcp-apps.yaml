  name: f-copilot-mcp-apps
spec:
  title: "MCP Apps \u2014 copilot cards render in Claude/ChatGPT (portability made\
    \ literal)"
  description: 'The DNA copilot''s cards (memory/board) emitted as MCP Apps (SEP-1865):
    the MCP server ships a ui:// UI resource via _meta, externalUrl -> a portal route,
    so the SAME card renders in the DNA portal AND in Claude AND in ChatGPT. This
    is the DNA portability thesis extended from data to UI. Touches the DNA MCP server
    (emit UI resources, Python mcp-ui-server SDK) + the portal card routes. Posture:
    portal React first, then MCP App by reference (externalUrl) so no forked UI. Depends
    on f-dna-cloud-copilot (needs the portal cards) + f-copilot-frontend-scaffold.'
