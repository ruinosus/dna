apiVersion: github.com/ruinosus/dna/sdlc/v1
kind: Feature
metadata:
  name: f-dna-cloud
spec:
  title: "DNA Cloud \u2014 the hosted SaaS over the MCP runtime face (plans + billing\
    \ + quota)"
  description: "Phase B of e-dna-portability: the multi-tenant SaaS ON TOP of the\
    \ hosted MCP runtime face (Phase A = the MCP server on managed cloud + IdP). Users\
    \ sign up, pick a PLAN (Free/Dev \u2192 Pro \u2192 Enterprise), register an OAuth\
    \ client, and consume the DNA MCP tools under a per-plan quota. Reuses the existing\
    \ auth<->tenancy bridge: the token already carries a tenant claim; DNA Cloud extends\
    \ it to carry a PLAN/QUOTA claim so the server enforces rate-limit + quota per\
    \ plan WITHOUT rebuilding auth. Billing via a provider (Stripe-class) on a flat+quota+overage\
    \ model, metering tool-call counts server-side. A web portal (signup, plan selection,\
    \ OAuth client registration/DCR, usage dashboards) fronts it. This Feature is\
    \ DESIGN-only for now: ADR + design doc + visual + todo stories for the owner\
    \ to approve before build."
  status: in-development
  epic: e-dna-portability
