apiVersion: github.com/ruinosus/dna/sdlc/v1
kind: ADR
metadata:
  name: adr-dna-cloud-saas
spec:
  title: "DNA Cloud \u2014 the hosted SaaS over the MCP runtime face (plans + quota\
    \ + billing, reusing the auth<->tenancy bridge)"
  status: accepted
  context: "e-dna-portability shipped the MCP runtime face and (Phase 2) hosted it\
    \ with OAuth 2.1 whose token claim is bridged to a DNA tenant, fail-closed. The\
    \ commercial SaaS on top of that hosted face needs users, plans, per-plan quota\
    \ and billing. Market pattern: tiered plans (Free ~100 calls/day / Pro ~10k /\
    \ Enterprise custom), flat+quota+overage billing on a Stripe-class provider, a\
    \ portal for signup + OAuth client registration + usage dashboards. Decisive:\
    \ DNA need NOT rebuild auth \u2014 the token already carries a tenant claim; adding\
    \ a plan/quota claim through the SAME bridge seam turns the existing enforcement\
    \ point into the SaaS enforcement point."
  decision: "Design DNA Cloud as a thin commercial layer over the hosted MCP face,\
    \ five parts + one reuse principle: (1) architecture = portal + hosted MCP server\
    \ + billing provider + pluggable IdP; (2) plans as DECLARATIVE data (a Plan/Tier\
    \ Kind) with concrete caps + feature-family flags (definitions/SDLC/memory/emit);\
    \ (3) enforcement = extend dna_cli._mcp_auth to map claim->plan alongside claim->tenant,\
    \ then meter every tool call + limit per plan, fail-closed (429/402) \u2014 no\
    \ auth rebuilt; (4) billing = flat+quota+overage on a Stripe-class provider, the\
    \ server is the meter, provider webhook flips the plan claim; (5) portal = signup\
    \ + plan select + OAuth client DCR + usage dashboards, in a SEPARATE dna-cloud\
    \ repo (open-core boundary). MVP = Free+Pro only; Enterprise deferred. RATIFIED\
    \ (owner Barna, 2026-07-11) \u2014 all six open decisions accepted per recommendation:\
    \ (1) portal in a SEPARATE dna-cloud repo; (2) Stripe as billing provider; (3)\
    \ tiers Free ~100 calls/day / Pro ~10k calls/day @ $29/mo / Enterprise custom;\
    \ (4) open-core = SDK/CLI/kernel/emit/MCP self-host free & never capped, managed\
    \ hosting+portal+billing+SSO paid; (5) flat + included quota + metered overage;\
    \ (6) MVP = Free+Pro only, Enterprise deferred."
  consequences: 'DNA gets monetization reusing the whole Phase-2 auth/tenancy stack
    (SaaS = plan resolver + meter + limiter + portal, not a new platform); plans stay
    declarative (no-deploy tier changes); commercial surface lives in a separate repo
    keeping the OSS SDK clean; enforcement + billing wired through ONE point (token
    bridge + server meter) so blast radius on the runtime is minimal. Open decisions
    for the owner: separate portal repo, billing provider, concrete tier limits, open-core
    split, billing model, MVP plan set.'
  body: "# ADR \u2014 DNA Cloud: the hosted SaaS over the MCP runtime face\n\n## Status\n\
    Proposed (2026-07-11). DESIGN for owner review \u2014 no SaaS code is built until\
    \ ratified.\nThis ADR is the complement of `adr-dna-mcp-runtime-face`: that ADR\
    \ gave DNA a live\nruntime face over MCP and (Phase 2) hosted it with OAuth 2.1\
    \ bridged to tenancy. This\nADR designs the **commercial SaaS layer** that turns\
    \ the hosted face into a product with\nusers, plans, quota and billing.\n\n##\
    \ Context\n\n`e-dna-portability` gave DNA two faces that serve runtimes: **EMIT**\
    \ (static de-para) and\n**MCP** (a live, tenant-aware runtime face). The MCP ADR's\
    \ Phase 2 already hosted the\nserver remotely (Streamable HTTP) and put **OAuth\
    \ 2.1 in front of it, with the token's\nclaim/scope bridged to a DNA tenant**\
    \ (`dna_cli._mcp_auth`: claim -> tenant, fail-closed).\n\nTwo layers are useful\
    \ to name precisely:\n\n- **Phase A \u2014 hosting.** The DNA MCP server running\
    \ on managed cloud (a container app on\n  ACA-class infra) behind the pluggable\
    \ IdP (Entra / Clerk / any provider via the\n  `OAuthProxy` seam). This is *operations*:\
    \ run the existing server, authenticated.\n- **Phase B \u2014 the SaaS (this ADR).**\
    \ The product **on top of** the hosted face: users\n  sign up, pick a **plan**\
    \ (Free/Dev -> Pro -> Enterprise), register an OAuth client, and\n  consume the\
    \ DNA MCP tools under a **per-plan quota**, **billed** by a provider.\n\nThe 2026\
    \ landscape (`rsh-agent-config-landscape-2026`) shows the value is portability\
    \ /\nanti-lock-in; a hosted, metered surface is how that value is monetized without\
    \ pulling the\nSDK behind a paywall. The market pattern for developer API SaaS\
    \ is well established:\ntiered plans (Free ~100 calls/day / Pro ~10k / Enterprise\
    \ custom), flat+quota+overage\nbilling on a Stripe-class provider, and a portal\
    \ for signup + OAuth client registration +\nusage dashboards.\n\nThe decisive\
    \ observation: **DNA does not need to build auth to build the SaaS.** The\nPhase-2\
    \ bridge already carries a **tenant** claim and enforces it fail-closed at every\n\
    tool. Adding a **plan/quota** claim alongside it \u2014 resolved through the *same*\
    \ seam \u2014 turns\nthe existing enforcement point into the SaaS enforcement\
    \ point. Auth is reused; only a plan\nresolver + a meter + a limiter are net-new.\n\
    \n## Decision\n\nDesign **DNA Cloud** as a thin commercial layer over the hosted\
    \ MCP runtime face, with\n**five parts** and one reuse principle.\n\n### 1. Architecture\
    \ (how the parts connect)\n\n```\n  +--------------+    signup / plan / DCR /\
    \ usage       +--------------------+\n  |   Portal     | ----------------------------------->\
    \ |   Billing provider |\n  | (dna-cloud   | <--- checkout / webhooks -----------\
    \ |   (Stripe-class)   |\n  |  repo, web)  |                                 \
    \      +---------+----------+\n  +------+-------+                            \
    \                     | usage push /\n         | provisions tenant + OAuth client\
    \ (DCR)                 | plan webhook\n         v                           \
    \                             v\n  +--------------+   OAuth 2.1 token (tenant\
    \ + plan claim)  +--------------------+\n  |     IdP      | --------------------------------------->\
    \ |  DNA MCP server    |\n  | (Entra/Clerk |   pluggable via FastMCP OAuthProxy\
    \ seam  |  (hosted, Phase A) |\n  |  /N, plug.)  |                           \
    \               |  -- ENFORCES --    |\n  +--------------+                   \
    \                       |  claim->tenant +   |\n                             \
    \                               |  claim->plan +     |\n   MCP clients (Claude/Cursor/Copilot/web)\
    \ -- tools ------> |  meter + limiter   |\n                                  \
    \                          +--------------------+\n```\n\nThe portal is the only\
    \ new *product* surface; the MCP server is the *existing* runtime with\ntwo extra\
    \ checks; the IdP and billing provider are external, pluggable dependencies.\n\
    \n### 2. Plans (taxonomy \u2014 declarative, not hardcoded)\n\nPlans are modeled\
    \ as **declarative data** (a `Plan`/`Tier` Kind or catalog doc), consistent\n\
    with DNA's \"everything is a Kind, changing it is a file edit not a deploy\" thesis.\
    \ Each plan\ndeclares concrete caps + which **feature families** it unlocks. Proposed\
    \ starting taxonomy\n(numbers are the owner's to ratify):\n\n| Plan | Calls/day\
    \ | Tenants | Rate limit | definitions (compose) | SDLC read | memory | emit |\
    \ Price |\n|------|-----------|---------|-----------|----------------------|-----------|--------|------|-------|\n\
    | **Free / Dev** | ~100 | 1 | 1 rps | yes | yes | read-only | no | $0 |\n| **Pro**\
    \ | ~10 000 | 5 | 10 rps | yes | yes | read + write | yes | flat/mo |\n| **Enterprise**\
    \ | custom | unlimited | custom | yes | yes | read + write + consolidate | yes\
    \ | custom + SLA |\n\nFeature families map to the MCP tool groups the runtime\
    \ already exposes: **definitions**\n(`compose_prompt`, `list_agents`, `list_tools`),\
    \ **SDLC** (`sdlc_digest`, `list_stories`,\n`get_adr`), **memory** (`recall` /\
    \ `remember` / `consolidate`), **emit** (materialize a\nnative runtime artifact).\
    \ Gating a family = the plan doc lists it or not; the server checks\nthe resolved\
    \ plan before dispatching the tool.\n\n### 3. Enforcement (the reusable technical\
    \ piece)\n\nExtend the **existing** `dna_cli._mcp_auth` bridge \u2014 which today\
    \ maps `claim -> tenant` and\ndenies cross-tenant fail-closed \u2014 to **also**\
    \ map `claim -> plan`:\n\n1. **Resolve**: the verified token's `plan` claim (or\
    \ `plan:<x>` scope) -> the `Plan` doc ->\n   concrete caps. No plan claim -> the\
    \ default Free plan (never \"unlimited\"), fail-closed.\n2. **Meter**: every metered\
    \ tool call is counted per `(tenant, plan)` in a quota window\n   (day) \u2014\
    \ the server is already the single choke point, so metering is one counter there.\n\
    3. **Limit**: before dispatch, check the running count + rate against the resolved\
    \ caps;\n   over-quota -> **429** (rate/quota) / **402** (payment required), same\
    \ fail-closed posture\n   as the tenant denial. Feature-family gating -> deny\
    \ tools the plan doesn't unlock.\n\n**No auth is rebuilt.** OAuth 2.1 (FastMCP\
    \ `JWTVerifier` / `OAuthProxy`), PKCE, DCR, PRM \u2014\nall stay exactly as Phase\
    \ 2 shipped them. The SaaS is a **plan resolver + a metering counter\n+ a limiter**\
    \ hung on the same tested seam. This is the load-bearing reuse.\n\n### 4. Billing\n\
    \nModel: **flat + included quota + metered overage** (leaning over pure per-invocation,\
    \ for\ncustomer-predictable bills), on a **Stripe-class provider** (final choice:\
    \ owner). The\nserver is already the meter, so it **pushes usage records** to\
    \ the provider; the provider's\n**webhook flips the plan claim** on subscribe\
    \ / upgrade / cancel / payment-fail so\nenforcement always follows billing state.\
    \ Overage = calls above the plan's included quota,\npriced per 1k calls. Enterprise\
    \ = custom contract + SLA, invoiced out of band.\n\n### 5. Portal\n\nA web app:\
    \ **signup** (via the pluggable IdP), **plan selection / upgrade** (drives the\n\
    billing checkout), **OAuth client registration** (DCR \u2014 the user gets client\
    \ credentials to\npoint their MCP client at the hosted server), and **usage dashboards**\
    \ (calls-today vs\nquota, per-tool breakdown, billing status). **Recommendation:\
    \ a separate `dna-cloud` repo**\n\u2014 the OSS SDK/CLI repo stays a pure library\
    \ (open-core boundary), and the commercial portal\n+ deploy + billing secrets\
    \ live apart. The portal talks to the hosted MCP server and the\nbilling provider\
    \ over HTTP; it holds no kernel logic.\n\n## Phasing (honest)\n\n- **SaaS MVP**\
    \ = Free + Pro only \xB7 plan claim in the token \xB7 quota + rate-limit enforcement\n\
    \  on the existing bridge \xB7 a minimal portal (signup, pick plan, DCR, a usage\
    \ number) \xB7\n  billing = one flat Pro subscription + overage on a provider\
    \ sandbox. This is small: it is\n  *resolver + counter + limiter + a CRUD portal*,\
    \ because auth/tenancy/transport already\n  shipped.\n- **Enterprise** = custom\
    \ limits, SLA, SSO org-mapping, private deploy, invoicing \u2014 a\n  larger,\
    \ sales-driven build; explicitly *not* MVP.\n- **Big builds** (flagged): the portal\
    \ web app itself (new repo, new surface); the\n  production metering store (durable\
    \ per-tenant counters, not in-process); billing\n  reconciliation + dunning; abuse\
    \ / DDoS protection on a public metered endpoint.\n\n## Risks\n- **Metering durability**\
    \ \u2014 an in-process counter is fine to prototype, wrong for billing;\n  needs\
    \ a durable store (Redis/Postgres) with a defined quota window and reset semantics.\n\
    - **Open-core tension** \u2014 the line between \"free SDK\" and \"paid hosting\"\
    \ must be crisp or it\n  erodes either adoption or revenue.\n- **Public endpoint\
    \ exposure** \u2014 a metered public API needs rate-limit + abuse controls\n \
    \ beyond per-plan quota.\n- **Provider lock-in** \u2014 keep the billing provider\
    \ behind a thin port so it is swappable.\n\n## Open decisions (for the owner)\n\
    1. **Separate repo for the portal?** (recommended: yes, `dna-cloud`, open-core\
    \ boundary.)\n2. **Billing provider?** (Stripe-class assumed; confirm.)\n3. **Tier\
    \ limits** \u2014 the concrete numbers (calls/day, rate, tenants, price) per plan.\n\
    4. **Open-core split** \u2014 SDK/CLI stay MIT-free, hosting + SaaS paid: confirm\
    \ the boundary.\n5. **Billing model** \u2014 flat+quota+overage (recommended)\
    \ vs pure per-invocation.\n6. **MVP plan set** \u2014 Free + Pro only for MVP,\
    \ Enterprise deferred: confirm.\n\n## Consequences\n- DNA gets a monetization\
    \ path that **reuses the entire Phase-2 auth/tenancy stack** \u2014 the\n  SaaS\
    \ is a plan resolver + meter + limiter + portal, not a new platform.\n- Plans\
    \ stay **declarative** (a Kind), preserving no-deploy tier changes.\n- The commercial\
    \ surface lives in a **separate repo**, keeping the OSS SDK clean (open-core).\n\
    - Enforcement and billing are wired through **one** point (the token bridge +\
    \ the server\n  meter), so the blast radius of the SaaS on the runtime is minimal.\n\
    \n## Evidence\n- Landscape + sources: Research `rsh-agent-config-landscape-2026`.\n\
    - Runtime + auth reused: `adr-dna-mcp-runtime-face` (Phase 2 \u2014 hosted HTTP\
    \ + OAuth-tenancy).\n- Pivot thesis: `adr-dna-pivot-portability`.\n\n## Ratification\
    \ (owner, 2026-07-11)\n\nAll six open decisions ratified by Barna, accepting the\
    \ recommended option for each:\n\n| # | Decision | Ratified |\n|---|----------|----------|\n\
    | 1 | Portal repo | **Separate `dna-cloud` repo** (open-core boundary) |\n| 2\
    \ | Billing provider | **Stripe** (metered / usage-based) |\n| 3 | Tier limits\
    \ + price | Free ~100 calls/day \xB7 **Pro ~10k calls/day @ $29/mo** \xB7 Enterprise\
    \ custom |\n| 4 | Open-core split | SDK/CLI/kernel/emit/MCP self-host **free (never\
    \ capped)**; managed hosting + portal + billing + SSO **paid** |\n| 5 | Billing\
    \ model | **Flat + included quota + metered overage** |\n| 6 | MVP plan set |\
    \ **Free + Pro only**; Enterprise deferred |\n\nStatus \u2192 accepted. This unblocks\
    \ **f-dna-cloud** implementation: scaffold the `dna-cloud` portal repo, add the\
    \ declarative Plan/Tier Kind (Free/Pro caps + $29/mo), extend `dna_cli._mcp_auth`\
    \ with claim\u2192plan + meter + limiter, and wire Stripe (flat + overage). To\
    \ be filed as Stories under `e-dna-portability`."
