name: Feature request
description: Propose a new capability, Kind, or improvement for DNA.
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an improvement. For open-ended ideas or questions,
        consider starting a **Discussion** first — reserve issues for concrete,
        actionable proposals.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem are you trying to solve? What's painful today?
      placeholder: Today, doing X requires ... which is awkward because ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: >-
        What would you like DNA to do? If you're proposing a new Kind, describe
        its `(apiVersion, kind)`, its schema, and its composition role.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - "Kernel / ports"
        - "A Kind (existing or new)"
        - "Reader/writer (bundle format)"
        - "Source adapter"
        - "CLI (dna)"
        - "SDLC workflow (dna sdlc)"
        - "Docs"
        - "Other"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why you prefer this one.
    validations:
      required: false
  - type: checkboxes
    id: parity-ack
    attributes:
      label: Parity acknowledgement
      description: DNA ships two behaviorally identical SDKs.
      options:
        - label: I understand a behavior change must land in both the Python and TypeScript SDKs.
          required: false
