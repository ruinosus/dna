# Python CI — sdk-py + cli test suites (s-public-ci).
#
# Jobs:
#   sdk-py    — full pytest suite, NO external resources: requires_postgres /
#               requires_llm skip (no DSN / key set) and requires_network is
#               forced off via DNA_OFFLINE=1 so CI never clones external repos
#               (tests/conftest.py is the single gating point).
#   cli       — dna-cli pytest suite (path-dep on sdk-py).
#   postgres  — ONLY the requires_postgres-marked tests, against a
#               postgres:16 service container.
#
# Python matrix (s-py312-floor): sdk-py + cli run on {3.12, 3.13} — the
# supported floor is 3.12 (first real consumer pins >=3.12,<3.13) and the
# matrix keeps it from regressing silently. The postgres job stays 3.13-only
# on purpose: it exercises adapter/SQL behavior, not language-version
# surface — the full suite (including the same adapter code minus the live
# DB) already runs on 3.12 in the sdk-py job, so a 3.12 postgres leg would
# double service-container minutes for near-zero marginal coverage.
name: python

on:
  push:
    branches: [main]
  pull_request:

env:
  # CI must never reach the network from tests — requires_network skips.
  DNA_OFFLINE: "1"

jobs:
  sdk-py:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    defaults:
      run:
        working-directory: packages/sdk-py
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: packages/sdk-py/pyproject.toml
      - name: Install
        run: |
          uv venv
          # [runtime] (langchain/langgraph) + fastapi + ag-ui-langgraph so the
          # dna.runtime adapter/middleware suite (tests/runtime/) RUNS here. It
          # is guarded by tests/runtime/conftest.py, so the base/postgres jobs
          # that skip these deps still collect cleanly. The `maf` extra
          # (agent-framework) stays out — its tests importorskip it.
          uv pip install -e ".[dev,runtime]" fastapi "ag-ui-langgraph==0.0.42"
      - name: Test
        run: uv run --no-project pytest tests -q --timeout=120 -p no:cacheprovider

  cli:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    defaults:
      run:
        working-directory: packages/cli
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: |
            packages/cli/pyproject.toml
            packages/sdk-py/pyproject.toml
      - name: Install
        run: |
          uv venv
          uv pip install -e ../sdk-py -e ".[dev]"
      - name: Test
        run: uv run --no-project pytest tests -q -p no:cacheprovider

  client-py:
    # dna-client (Python) — the REST read-API client. Its usage test drives an
    # httpx MockTransport (no server) and the OpenAPI drift test re-dumps the
    # live FastAPI schema and diffs the committed docs/openapi.json — so the dev
    # install pulls dna-cli[api] + dna-sdk (path-deps) to make the API face
    # importable. All offline (DNA_OFFLINE=1 workflow-wide).
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    defaults:
      run:
        working-directory: packages/client-py
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: |
            packages/client-py/pyproject.toml
            packages/cli/pyproject.toml
            packages/sdk-py/pyproject.toml
      - name: Install
        run: |
          uv venv
          uv pip install -e ../sdk-py -e "../cli[api]" -e ".[dev]"
      - name: Test
        run: uv run --no-project pytest tests -q -p no:cacheprovider

  postgres:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-py
    services:
      postgres:
        # pgvector-enabled image (NOT plain postgres:16) so the pgvector search
        # provider's migration can `CREATE EXTENSION vector` and the
        # record-search conformance suite runs FOR REAL here (s-search-pgvector).
        # Wire-compatible with postgres:16 for every other requires_postgres test.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: dna
          POSTGRES_PASSWORD: dna
          POSTGRES_DB: dna_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dna"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://dna:dna@localhost:5432/dna_test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: packages/sdk-py/pyproject.toml
      - name: Install
        run: |
          uv venv
          uv pip install -e ".[dev]"
      - name: Test (requires_postgres only)
        run: uv run --no-project pytest tests -q --timeout=120 -p no:cacheprovider -m requires_postgres
