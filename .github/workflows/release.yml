# Release — publish dna-sdk to PyPI and npm (s-publish-registries).
# Tag-triggered ONLY: pushing a `vX.Y.Z` tag is the release act; nothing here
# runs on PRs or branch pushes. See RELEASING.md for the full checklist.
#
# WHY TWO WORKFLOW FILES (this one + release-cli.yml): PyPI trusted-publishing
# pending publishers are deduplicated on the FULL identity tuple
# (owner + repo + WORKFLOW FILENAME + environment) and a given tuple can be
# registered for only ONE project name — registering dna-sdk and dna-cli from
# the same release.yml collides even with distinct environments. So each PyPI
# project gets its own workflow file: dna-sdk here (environment `pypi`),
# dna-cli in release-cli.yml (environment `pypi-cli`).
#
# Jobs:
#   sanity      — the tag MUST equal the version in both pyprojects and the
#                 npm package.json; any mismatch fails loud before anything
#                 is built or published.
#   build-py    — `uv build` (sdist + wheel) for packages/sdk-py; uploaded as
#                 an artifact.
#   publish-pypi — PyPI TRUSTED PUBLISHING (OIDC, zero long-lived token):
#                 pypa/gh-action-pypi-publish exchanges the workflow's
#                 id-token for a per-run PyPI token. Environment `pypi`.
#
# The `publish-npm` job (the `dna-sdk` npm package, packages/sdk-ts) was
# removed when the TypeScript SDK was frozen — tag `sdk-ts-final`. Nothing
# here publishes to npm any more; `packages/client-ts` has its own release
# workflow (release-client.yml) and is NOT wired up by this change.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag version must match every package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          SDK_PY=$(python3 -c "import tomllib; print(tomllib.load(open('packages/sdk-py/pyproject.toml','rb'))['project']['version'])")
          CLI_PY=$(python3 -c "import tomllib; print(tomllib.load(open('packages/cli/pyproject.toml','rb'))['project']['version'])")
          echo "tag=$TAG  dna-sdk(py)=$SDK_PY  dna-cli=$CLI_PY"
          FAIL=0
          [ "$TAG" = "$SDK_PY" ] || { echo "::error::tag $TAG != packages/sdk-py version $SDK_PY"; FAIL=1; }
          [ "$TAG" = "$CLI_PY" ] || { echo "::error::tag $TAG != packages/cli version $CLI_PY"; FAIL=1; }
          exit $FAIL

  build-py:
    needs: sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build sdist + wheel (dna-sdk)
        run: uv build --out-dir dist packages/sdk-py && ls -l dist/
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdk-py
          path: dist/
          if-no-files-found: error

  publish-pypi:
    needs: build-py
    runs-on: ubuntu-latest
    # Trusted publishing (OIDC): the environment name is part of the PyPI
    # pending-publisher identity — keep `pypi` in sync with RELEASING.md.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-sdk-py
          path: dist/
      - name: Publish dna-sdk to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

