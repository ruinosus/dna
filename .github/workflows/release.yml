# Release — publish dna-sdk to PyPI and npm (s-publish-registries).
# Tag-triggered ONLY: pushing a `vX.Y.Z` tag is the release act; nothing here
# runs on PRs or branch pushes. See RELEASING.md for the full checklist.
#
# WHY TWO WORKFLOW FILES (this one + release-cli.yml): PyPI trusted-publishing
# pending publishers are deduplicated on the FULL identity tuple
# (owner + repo + WORKFLOW FILENAME + environment) and a given tuple can be
# registered for only ONE project name — registering dna-sdk and dna-cli from
# the same release.yml collides even with distinct environments. So each PyPI
# project gets its own workflow file: dna-sdk here (environment `pypi`),
# dna-cli in release-cli.yml (environment `pypi-cli`).
#
# Jobs:
#   sanity      — the tag MUST equal the version in both pyprojects and the
#                 npm package.json; any mismatch fails loud before anything
#                 is built or published.
#   build-py    — `uv build` (sdist + wheel) for packages/sdk-py; uploaded as
#                 an artifact.
#   publish-pypi — PyPI TRUSTED PUBLISHING (OIDC, zero long-lived token):
#                 pypa/gh-action-pypi-publish exchanges the workflow's
#                 id-token for a per-run PyPI token. Environment `pypi`.
#   publish-npm — `bun run build` + `npm publish --provenance` via npm
#                 TRUSTED PUBLISHING (OIDC, no NPM_TOKEN secret): npm CLI
#                 >= 11.5.1 resolves the OIDC credential itself from the
#                 workflow's id-token. Prerequisite: the FIRST dna-sdk
#                 publish is done MANUALLY by the owner (npm login +
#                 npm publish, outside CI) — only an existing package can be
#                 given a trusted publisher on npmjs.com (package Settings →
#                 Trusted Publisher → this repo + release.yml). A guard step
#                 SKIPS the publish when the tag's version is already on the
#                 registry (e.g. v0.1.0 published manually), so the job never
#                 fails on a duplicate.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag version must match every package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          SDK_PY=$(python3 -c "import tomllib; print(tomllib.load(open('packages/sdk-py/pyproject.toml','rb'))['project']['version'])")
          CLI_PY=$(python3 -c "import tomllib; print(tomllib.load(open('packages/cli/pyproject.toml','rb'))['project']['version'])")
          SDK_TS=$(python3 -c "import json; print(json.load(open('packages/sdk-ts/package.json'))['version'])")
          echo "tag=$TAG  dna-sdk(py)=$SDK_PY  dna-cli=$CLI_PY  dna-sdk(npm)=$SDK_TS"
          FAIL=0
          [ "$TAG" = "$SDK_PY" ] || { echo "::error::tag $TAG != packages/sdk-py version $SDK_PY"; FAIL=1; }
          [ "$TAG" = "$CLI_PY" ] || { echo "::error::tag $TAG != packages/cli version $CLI_PY"; FAIL=1; }
          [ "$TAG" = "$SDK_TS" ] || { echo "::error::tag $TAG != packages/sdk-ts version $SDK_TS"; FAIL=1; }
          exit $FAIL

  build-py:
    needs: sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build sdist + wheel (dna-sdk)
        run: uv build --out-dir dist packages/sdk-py && ls -l dist/
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdk-py
          path: dist/
          if-no-files-found: error

  publish-pypi:
    needs: build-py
    runs-on: ubuntu-latest
    # Trusted publishing (OIDC): the environment name is part of the PyPI
    # pending-publisher identity — keep `pypi` in sync with RELEASING.md.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-sdk-py
          path: dist/
      - name: Publish dna-sdk to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  publish-npm:
    needs: sanity
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # OIDC: signs the --provenance attestation AND authenticates the publish
      # (npm trusted publishing — no NODE_AUTH_TOKEN / NPM_TOKEN secret).
      id-token: write
    defaults:
      run:
        working-directory: packages/sdk-ts
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # npm >= 11.5.1 is required for OIDC trusted publishing — node 24 ships
      # a new enough npm, and the explicit upgrade below pins the floor even
      # if the runner image lags.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Ensure npm supports OIDC trusted publishing (>= 11.5.1)
        run: npm install -g npm@latest && npm --version
      - name: Install
        run: bun install --frozen-lockfile
      - name: Build (tsc emit + runtime assets)
        run: bun run build
      # The FIRST publish (v0.1.0) is manual — the owner runs npm login +
      # npm publish locally, then configures the trusted publisher on the
      # package settings at npmjs.com. This guard keeps the tag job green in
      # that case (and on any re-run): if the tag's version is already on
      # the registry, skip instead of failing on the duplicate.
      - name: Skip if this version is already on npm
        id: guard
        run: |
          VER="${GITHUB_REF_NAME#v}"
          if npm view "dna-sdk@${VER}" version >/dev/null 2>&1; then
            echo "dna-sdk@${VER} already published — skipping npm publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "dna-sdk@${VER} not on the registry — will publish."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm (OIDC trusted publishing, with provenance)
        if: steps.guard.outputs.skip == 'false'
        run: npm publish --provenance --access public
