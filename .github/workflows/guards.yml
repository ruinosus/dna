# Repo guards — brand grep-guard + secret scan (s-public-ci).
#
#   brand-guard — scripts/brand_guard.py (pure stdlib): fails on internal brand
#                 tokens outside its explicit per-file allowlist. Runs its own
#                 planted-token self-test first, then the real scan.
#   gitleaks    — gitleaks binary over the full git history. Deliberately NOT
#                 gitleaks/gitleaks-action@v2: on pull_request the action calls
#                 GET /pulls/N/commits with the workflow GITHUB_TOKEN and dies
#                 with 403 "Resource not accessible by integration". The plain
#                 binary needs no token at all.
name: guards

on:
  push:
    branches: [main]
  pull_request:

jobs:
  brand-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Self-test (planted tokens must fail)
        run: python3 scripts/brand_guard.py --self-test
      - name: Scan repo
        run: python3 scripts/brand_guard.py

  gitleaks:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: "8.30.1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan history
        run: gitleaks detect --source . --no-banner --redact
