# MIF Memory — byte-faithful passthrough of an external portable-memory Kind.
#
# Applies DNA's normative rule #3 ("a Kind DNA did not invent MUST be carried
# under its owner's namespace, unchanged"): registers `mif-spec.dev/v1 · Memory`
# so a foreign .memory.md / .memory.json imported from another tool is stored
# VERBATIM, validated against MIF's own schema — the same way the SDK already
# carries agentskills.io/v1·Skill and soulspec.org/v1·Soul.
#
# This is the *interchange* face. It does NOT replace Engram (the native recall
# engine — formerly LessonLearned; see the rename in the design doc §3).
# `dna memory export/import` projects between the two — see
# docs/design/portable-memory-design.md. PROPOSAL (not yet in the SDK).
apiVersion: github.com/ruinosus/dna/core/v1
kind: KindDefinition
metadata:
  name: mif-memory
spec:
  target_api_version: mif-spec.dev/v1
  target_kind: Memory
  alias: portable-memory
  origin: mif-spec.dev
  plane: record
  prompt_target: false
  flatten_in_context: false
  scope_inheritable: false
  # MIF's canonical on-disk shape IS frontmatter + Markdown body — structurally
  # identical to a DNA bundle. `body_field: content` maps MIF `content` to the
  # marker body. (Open item: MIF names files `<slug>.memory.md`; the bundle
  # `marker` is a fixed filename — a small storage-pattern tweak gives literal
  # byte-fidelity. Until then the round-trip is field-faithful, not byte-faithful.)
  storage:
    type: bundle
    container: memories
    marker: MEMORY.md
    body_field: content
  schema:
    type: object
    # MIF Level 1 (Core) — REQUIRED for any conforming document.
    required:
    - id
    - type
    - content
    - created
    properties:
      id:
        type: string
        description: 'MIF @id — a URN (urn:mif:<uuid>). Preserved verbatim so a
          re-export is byte-stable. On import from Engram, minted once and pinned.'
      type:
        type: string
        enum:
        - episodic
        - semantic
        - procedural
        description: 'CoALA taxonomy — maps 1:1 to Engram.memory_type. This is why
          the DNA↔MIF projection is lossless on the type axis.'
      content:
        type: string
        description: Markdown body — the memory itself.
      created:
        type: string
        format: date-time
        description: ISO-8601 record time (engraphy). Maps to Engram created_at.
      # MIF Level 2 (Standard) — RECOMMENDED.
      title:
        type: string
      description:
        type: string
      modified:
        type: string
        format: date-time
      namespace:
        type: string
        description: 'MIF namespace (e.g. _semantic/preferences). Maps to
          Engram.area; reserved _public/_shared map to visibility.'
      tags:
        type: array
        items: { type: string }
        default: []
      aliases:
        type: array
        items: { type: string }
        default: []
      temporal:
        type: object
        description: 'Bi-temporal validity — maps 1:1 to Engram valid_from/valid_to.
          The second axis DNA and MIF already agree on.'
        properties:
          validFrom: { type: string, format: date-time }
          validTo: { type: string, format: date-time }
      relationships:
        type: array
        description: 'Typed edges (9 MIF types). derived-from ← source_refs;
          supersedes ← superseded_by_memory; related-to ← homophonic_links.'
        items:
          type: object
          required: [type, target]
          properties:
            type:
              type: string
              enum:
              - derived-from
              - supersedes
              - conflicts-with
              - related-to
              - caused-by
              - documents
              - implements
              - references
              - part-of
            target: { type: string }
      entities:
        type: array
        items: { type: string }
        default: []
      # MIF Level 3 (Full) — OPTIONAL. This is where DNA's cognitive "physics"
      # (which MIF flat-files lack) rides along without polluting the core, so a
      # DNA→MIF→DNA round-trip loses nothing.
      provenance:
        type: object
        description: W3C PROV. wasAttributedTo ← owner; wasDerivedFrom ← source_refs.
      embedding:
        type: object
      citations:
        type: array
        items: { type: object }
      extensions:
        type: object
        additionalProperties: true
        description: 'DNA-specific fields with no MIF home, preserved for
          round-trip fidelity: confidence_score, relevance_decay_seed,
          surface_count, cues_history, encoding_context, affect, affect_reason,
          visibility. Namespaced under x-dna.'
  embed:
  - content
  - title
  graph_style:
    fill: '#5ab99d'
    stroke: '#2f8570'
    text_color: '#12161c'
  ascii_icon: 🧬
  display_label: Memória Portável
