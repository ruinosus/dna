[project]
name = "dna-cli"
version = "0.23.0"
description = "DNA command-line interface — the `dna` binary for the declarative SDLC + document CRUD (kernel-local, no service required)"
readme = "README.md"
license = "MIT"
keywords = ["dna", "cli", "agents", "declarative", "sdlc", "manifests"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
# 3.12 floor: tracks dna-sdk, which is >=3.12 since s-py312-floor (PEP 696
# TypeVar defaults come from typing_extensions on <3.13 — see
# packages/sdk-py/pyproject.toml).
requires-python = ">=3.12,<3.14"
dependencies = [
    "click>=8.1.0",
    "pyyaml>=6.0",
    "rich>=13.0",
    # Published constraint (s-publish-registries): the wheel/sdist resolve
    # dna-sdk from PyPI within the same pre-1.0 minor. In THIS repo, uv
    # replaces the registry lookup with the workspace path source below
    # ([tool.uv.sources] — editable ../sdk-py), so dev installs keep tracking
    # the sibling package live; the constraint only bites consumers.
    "dna-sdk>=0.23,<0.24",
]

[project.scripts]
dna = "dna_cli:main"

[project.optional-dependencies]
# The MCP runtime face (`dna mcp serve`) — expose the live DNA (definitions +
# SDLC + memory) over the Model Context Protocol. Built on FastMCP (the
# standalone `fastmcp` framework) for native stdio+HTTP transports and built-in
# OAuth 2.1 auth, so Phase 2 (remote + authenticated) is enable+bridge, not
# build. Optional + lazily imported (dna_cli._mcp_server imports `fastmcp` only
# inside build_server), so the base install never carries it. Guard:
# tests/test_mcp_server.py::test_base_import_never_pulls_mcp.
# The >=3.2 floor is the MCP Apps (SEP-1865) surface: `fastmcp.apps.AppConfig`
# lets `list_memories`/`recall` point the `ui://dna/memory-list` template in the
# tool DECLARATION, and `@server.resource` serves the template itself.
mcp = ["fastmcp>=3.2"]
# The REST read-API face (`dna api serve`) — the correct HTTP boundary for a WEB
# app (the DNA Cloud portal): a normal request/response REST API over the SAME
# DNA kernel + the SAME `*_impl` cores the MCP server uses (zero logic
# duplication). Distinct from the `mcp` extra, which is for stateful AI clients.
# FastAPI (ASGI app) + uvicorn (server). Optional + lazily imported
# (dna_cli._rest_api imports `fastapi` only inside build_app), so the base
# install never carries it.
api = ["fastapi>=0.110", "uvicorn>=0.30"]
# The Microsoft On-Behalf-Of (OBO) graph adapter — `graph.*` MCP tools that
# exchange the verified inbound Entra token for a downstream Microsoft Graph
# token and act on the signed-in user's M365 (feature f-mcp-obo, ADR-mcp-obo).
# `msal` = the confidential-client OBO exchange (acquire_token_on_behalf_of);
# `httpx` = the outbound Graph call. Optional + lazily imported (dna_cli.graph
# imports msal/httpx only inside the exchange/Graph-call seams), off by default
# (needs the `graph:` config block), HTTP-only. The base install never carries it.
graph = ["msal>=1.28", "httpx>=0.27"]
# The DURABLE quota meter — `_mcp_quota.PostgresQuotaStore`, the counter DNA
# Cloud's overage billing reads. Needs a SYNCHRONOUS Postgres driver: the
# QuotaStore port is sync (`enforce_quota` is sync), and asyncpg — the driver
# `dna-sdk[postgres]` ships — is async-only, so it cannot back this store.
# `sqlalchemy` is already implied by dna-sdk[postgres] but is named here so the
# extra stands alone. Optional + lazily imported (the store imports sqlalchemy
# only inside its own methods), so the base install and the in-process meter
# never carry it. The counter TABLE is created by the SDK's Alembic ladder
# (revision 0002_quota_counters) — nothing to provision separately.
quota = ["sqlalchemy>=2", "psycopg2-binary>=2.9"]
dev = [
    "pytest>=8.0",
    # search-sqlite extra so `dna recall`/`dna research recall` end-to-end tests
    # (tests/test_recall_cmd.py) run the real provider offline in CI, instead of
    # importorskip. Resolves against the path-installed dna-sdk.
    "dna-sdk[search-sqlite]",
    # `fastmcp` so tests/test_mcp_server.py + tests/test_mcp_apps.py run the MCP
    # server (and the MCP Apps memory-card surface) for real in CI — the base
    # install keeps it optional, see the `mcp` extra above.
    "fastmcp>=3.2",
    # `fastapi` + `httpx` so tests/test_rest_api.py drives the REST read-API for
    # real via FastAPI's TestClient (httpx-backed). The base install keeps FastAPI
    # optional — see the `api` extra above.
    "fastapi>=0.110",
    "httpx>=0.27",
    # `msal` so tests/test_mcp_graph.py can import the OBO exchanger's default
    # seam (the exchange itself is faked in tests — no live Entra). The base
    # install keeps it optional — see the `graph` extra above.
    "msal>=1.28",
    # `sqlalchemy` + `psycopg2-binary` so tests/test_mcp_quota_postgres.py can
    # drive the DURABLE quota store against a real Postgres (the tests skip
    # without a DSN — see the `quota` extra above).
    "sqlalchemy>=2",
    "psycopg2-binary>=2.9",
]

[tool.pytest.ini_options]
pythonpath = ["tests"]
markers = [
    "requires_network: skip unless outbound network is available (tests/conftest.py; DNA_OFFLINE=1 forces the skip)",
    "requires_postgres: skip unless a Postgres DSN is set (DATABASE_URL / DNA_PG_TEST_URL / DNA_PG_TEST_DSN)",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["dna_cli"]

# Dev-workspace override: inside this repo, uv resolves dna-sdk from the
# sibling package (editable), NOT from PyPI — the registry constraint above
# is what published artifacts carry. Two paths, one name:
#   dev  (this repo)  → ../sdk-py editable, always current
#   user (pip/uv add) → PyPI dna-sdk>=0.23,<0.24
[tool.uv.sources]
dna-sdk = { path = "../sdk-py", editable = true }

[project.urls]
Homepage = "https://ruinosus.github.io/dna/"
Repository = "https://github.com/ruinosus/dna"
Documentation = "https://ruinosus.github.io/dna/reference/cli/"
Changelog = "https://github.com/ruinosus/dna/blob/main/CHANGELOG.md"
Issues = "https://github.com/ruinosus/dna/issues"
