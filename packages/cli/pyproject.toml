[project]
name = "dna-cli"
version = "0.1.0"
description = "DNA command-line interface — the `dna` binary for the declarative SDLC + document CRUD (kernel-local, no service required)"
# 3.13 floor: hard dependency on dna-sdk, which is >=3.13 (PEP 696 stdlib
# TypeVar defaults — see packages/sdk-py/pyproject.toml).
requires-python = ">=3.13,<3.14"
dependencies = [
    "click>=8.1.0",
    "pyyaml>=6.0",
    "rich>=13.0",
    "dna-sdk",
]

[project.scripts]
dna = "dna_cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    # search-sqlite extra so `dna recall`/`dna research recall` end-to-end tests
    # (tests/test_recall_cmd.py) run the real provider offline in CI, instead of
    # importorskip. Resolves against the path-installed dna-sdk.
    "dna-sdk[search-sqlite]",
]

[tool.pytest.ini_options]
pythonpath = ["tests"]
markers = [
    "requires_network: skip unless outbound network is available (tests/conftest.py; DNA_OFFLINE=1 forces the skip)",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["dna_cli"]

[tool.uv.sources]
dna-sdk = { path = "../sdk-py", editable = true }
