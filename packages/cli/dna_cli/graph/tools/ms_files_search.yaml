# ms_files_search — the On-Behalf-Of Graph "files" group (ADR-mcp-obo §6, read-only).
#
# The AGENT-FACING surface (description + input_schema) of the built-in
# ``ms_files_search`` MCP tool, expressed as a governed Tool document (record
# plane, alias ``helix-tool``). The built-in @server.tool reads its description
# and parameters FROM this doc, so what the model sees is DATA — overlayable per
# tenant like any Tool, not hardcoded in Python. Execution stays code (the OBO
# exchange + Graph call live in dna_cli/graph); this doc is only the surface.
#
# Delegated scope: Files.Read (read-only). Gated behind the config
# `graph.groups.files` block being enabled AND an Entra inbound identity.
apiVersion: github.com/ruinosus/dna/v1
kind: Tool
metadata:
  name: ms_files_search
  description: >-
    Search the signed-in user's Microsoft 365 files (OneDrive / SharePoint) by a
    text query, on their behalf (Microsoft Graph, delegated Files.Read). Matches
    across file name, metadata, and content via On-Behalf-Of token exchange — no
    separate sign-in. Returns named fields only (name, id, web URL, last-modified,
    size, type), never file contents. Only available when the DNA MCP server has
    the Graph files group enabled and the caller signed in with a Microsoft Entra
    identity. Use ms_file_read to read a matched file's content by id.
spec:
  type: builtin
  input_schema:
    type: object
    properties:
      query:
        type: string
        description: >-
          The text to search for. Matched across file name, metadata, and file
          content in the user's OneDrive / SharePoint.
      top:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
        description: Maximum number of files to return.
    required:
      - query
  output_schema:
    type: object
    properties:
      count:
        type: integer
      files:
        type: array
        items:
          type: object
          properties:
            id: { type: string }
            name: { type: string }
            web_url: { type: string }
            last_modified: { type: string }
            size: { type: integer }
            type: { type: string }
  auth_type: oauth2
  read_only: true
  requires_confirmation: false
  tags:
    - microsoft
    - graph
    - files
    - onedrive
    - sharepoint
    - read-only
    - on-behalf-of
