# WorkspaceMembership â€” the identityâ†’workspace boundary (record plane).
# Maps a VERIFIED identity (Entra oid + email + tid) to a workspace_id + role +
# status. This is the crown-jewel security boundary of ADR "Model B": Entra
# authenticates the identity from ANY org; an ACTIVE membership here is what
# authorizes access to a workspace (fail-closed â€” no membership, no access). It
# is the platform-level Kind the ADR calls the missing `TenantMembership`,
# distinct from the portfolio Membership (intra-workspace org/project RBAC).
#
# INVITE HANDLE = email, KEY = oid (two-phase bind). You invite by email BEFORE
# the person has ever signed in (identity_oid null, status pending); on their
# first verified sign-in the server matches the verified email claim and BINDS
# identity_oid (+ tid), flipping status to active. Email can change; the oid is
# durable â€” so post-bind re-auth keys on oid, never the mutable email. Matching
# is ONLY ever on a verified token claim, never a caller-supplied field.
#
# WorkspaceMemberships live in the `_lib` scope
# (`workspace-memberships/<workspace_id>--<email>.yaml`) â€” GLOBAL (the boundary
# lives above any single workspace, exactly like Workspace/TenantPlan) and NOT
# inheritable.
#
# PARITY-CRITICAL package data: the byte-identical mirror lives at
# packages/sdk-{py,ts}/{dna/extensions,src/extensions}/tenant/kinds/
# workspace-membership.kind.yaml (tests/test_descriptor_hash_parity.py enforces).
apiVersion: github.com/ruinosus/dna/core/v1
kind: KindDefinition
metadata:
  name: workspace-membership
spec:
  target_api_version: github.com/ruinosus/dna/tenant/v1
  target_kind: WorkspaceMembership
  alias: tenant-workspace-membership
  origin: github.com/ruinosus/dna/tenant
  tenant_scope: global
  plane: record
  prompt_target: false
  flatten_in_context: false
  prompt_target_priority: 0
  storage:
    type: yaml
    container: workspace-memberships
  schema:
    type: object
    additionalProperties: false
    required:
    - workspace_id
    - identity_email
    - role
    - status
    properties:
      workspace_id:
        type: string
        description: The workspace this grant is in â€” the tenant key (matches a
          Workspace.workspace_id).
      identity_email:
        type: string
        description: Normalized (lowercased) email â€” the INVITE HANDLE. You invite
          by email before the person has ever signed in; matching is only ever on
          a verified token email claim, never a caller-supplied value.
      identity_oid:
        type:
        - string
        - 'null'
        description: The stable Entra `oid`, BOUND on first accepted sign-in (null
          while pending). The durable key â€” post-bind re-auth keys on this, never
          the mutable email.
      identity_tid:
        type:
        - string
        - 'null'
        description: The Azure org (tenant id) the accepting identity came from â€”
          PROVENANCE only (no longer the DNA tenant under Model B). Bound on accept.
      role:
        type: string
        enum:
        - owner
        - admin
        - member
        - guest
        description: Workspace-level role â€” the standard ladder (owner > admin >
          member > guest, highest-role-wins). References the Role Kind.
      status:
        type: string
        enum:
        - pending
        - active
        default: pending
        description: Invite lifecycle â€” pending (invited, oid not yet bound) â†’
          active (accepted, oid bound). No membership / non-active â†’ no access.
      invited_by:
        type:
        - string
        - 'null'
        description: Email of the Owner/Admin who created the invite.
      invited_at:
        type:
        - string
        - 'null'
        description: ISO-8601 timestamp of the invite (stamped by the writer).
      accepted_at:
        type:
        - string
        - 'null'
        description: ISO-8601 timestamp when the invite was accepted and oid bound.
  describe: '{identity_email} â†’ {workspace_id} ({role})'
  summary:
    workspace_id: ''
    identity_email: ''
    role: ''
    status: pending
  ui:
    mode: govern
    label:
      en: Workspace Memberships
      pt-BR: Membros do Workspace
    icon: đź‘Ą
    description:
      en: Identityâ†’workspace grants (the Model B tenancy boundary).
      pt-BR: ConcessĂµes identidadeâ†’workspace (a fronteira de tenancy do Modelo B).
    routes:
      list: docs/WorkspaceMembership
      detail: docs/WorkspaceMembership/:name
    permissions:
      list: any
      detail: any
    in_sidebar: true
    display_order: 57
  ascii_icon: đź‘Ą
  display_label: Workspace Memberships
  docs: A WorkspaceMembership maps a verified identity (Entra oid + email + tid)
    to a workspace_id + role + status â€” the identityâ†’workspace boundary of ADR
    Model B and the crown-jewel authorization check (an ACTIVE grant is required
    to touch a workspace; fail-closed otherwise). Invites are by email (the handle)
    and bind to the durable oid on first verified sign-in (two-phase), matching
    only on verified token claims. GLOBAL declarative data in `_lib`, distinct from
    the portfolio Membership (intra-workspace org/project RBAC).
