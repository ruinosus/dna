apiVersion: github.com/ruinosus/dna/v1
kind: Tool
metadata:
  name: remember
  description: Persist a note to the tenant's memory store. A write — gated by
    human approval (the copilot's HITL approval card) before it runs.
spec:
  type: builtin
  input_schema:
    type: object
    required:
    - text
    properties:
      text:
        type: string
        description: The note to remember.
      reason:
        type: string
        description: Why this is worth remembering.
      personal:
        type: boolean
        description: Route to the caller's personal partition (personal:<oid>,
          oid server-derived — never model-controlled).
  read_only: false
  requires_confirmation: true
  tags:
  - memory
  - write
