apiVersion: github.com/ruinosus/dna/v1
kind: Tool
metadata:
  name: forget
  description: Delete a note from the tenant's memory store. A write — gated by
    human approval (the copilot's HITL approval card) before it runs.
spec:
  type: builtin
  input_schema:
    type: object
    required:
    - id
    properties:
      id:
        type: string
        description: Identifier of the note to forget.
      reason:
        type: string
        description: Why this note should be forgotten.
  read_only: false
  requires_confirmation: true
  tags:
  - memory
  - write
