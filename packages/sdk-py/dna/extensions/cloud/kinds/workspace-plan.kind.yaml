apiVersion: github.com/ruinosus/dna/core/v1
kind: KindDefinition
metadata:
  name: workspace-plan
spec:
  target_api_version: github.com/ruinosus/dna/cloud/v1
  target_kind: WorkspacePlan
  alias: cloud-workspace-plan
  origin: github.com/ruinosus/dna/cloud
  tenant_scope: global
  plane: record
