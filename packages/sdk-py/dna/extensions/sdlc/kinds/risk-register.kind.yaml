# RiskRegister — one risk entry per doc, PMBOK 7 + ISO 31000:2018 (record
# plane). The collection of RiskRegister docs in a scope IS the project's
# risk register; Studio aggregates them into a likelihood × impact heatmap.
#
# F3 lote-2 (spec 2026-06-10-kinds-descriptor-f3): synthesized from this
# descriptor; the hand-written class twins were deleted. SINGLE-SOURCE
# package data: this descriptor is the only definition of the Kind — the
# packages/sdk-ts mirror and the test that enforced byte-identity
# (tests/test_descriptor_hash_parity.py) were BOTH removed when the
# TypeScript SDK was frozen (commit 341e517). Nothing mirrors this file and
# no test enforces byte-identity.
# What DOES still guard it: equivalence vs the extinct class, frozen
# in tests/test_lote2_descriptor_equivalence.py (golden:
# tests/goldens/lote2/RiskRegister.golden.json). Deltas intencionais (semântica
# canônica = port): summary curado substitui o eco whole-spec do KindBase
# default (list endpoints não usam kp.summary()); parse valida contra o
# schema (classe era pass-through); to_card morto não migrado.
apiVersion: github.com/ruinosus/dna/core/v1
kind: KindDefinition
metadata:
  name: risk-register
spec:
  target_api_version: github.com/ruinosus/dna/sdlc/v1
  target_kind: RiskRegister
  alias: sdlc-risk-register
  origin: github.com/ruinosus/dna/sdlc
  tenant_scope: global
  plane: record
  prompt_target: false
  flatten_in_context: false
  prompt_target_priority: 0
  storage:
    type: bundle
    container: risks
    marker: RISK.md
    body_field: body
  dep_filters:
    owner: helix-actor
    related_features: sdlc-feature
    related_epics: sdlc-epic
  schema:
    type: object
    required:
    - description
    - category
    - likelihood
    - impact
    - owner
    - status
    properties:
      title:
        type: string
        description: Short risk name (used as doc name typically).
      description:
        type: string
        description: 'Risk in cause→event→consequence format. ISO 31000 convention:
          ''If <cause>, then <event> may occur, resulting in <consequence>''.'
      category:
        type: string
        enum:
        - strategic
        - operational
        - financial
        - compliance
        - reputational
        - cyber
        - ESG
        description: PMBOK 7 categorization.
      likelihood:
        type: integer
        minimum: 1
        maximum: 5
        description: 1=rare, 5=almost certain.
      impact:
        type: integer
        minimum: 1
        maximum: 5
        description: 1=negligible, 5=catastrophic.
      inherent_score:
        type: integer
        minimum: 1
        maximum: 25
        description: likelihood × impact (auto-derivable).
      owner:
        type: string
        description: Actor name accountable for monitoring/mitigation.
      response:
        type: string
        enum:
        - avoid
        - transfer
        - mitigate
        - accept
        description: 'Strategy: avoid|transfer|mitigate|accept.'
      mitigation_actions:
        type: array
        items:
          type: object
          required:
          - action
          properties:
            action:
              type: string
            owner:
              type: string
            due:
              type: string
              format: date
            story_ref:
              type: string
            status:
              type: string
              enum:
              - todo
              - in-progress
              - done
      residual_likelihood:
        type: integer
        minimum: 1
        maximum: 5
        description: Likelihood after mitigation.
      residual_impact:
        type: integer
        minimum: 1
        maximum: 5
      residual_score:
        type: integer
        minimum: 1
        maximum: 25
      status:
        type: string
        enum:
        - identified
        - assessed
        - mitigated
        - realized
        - closed
        description: 'Lifecycle: identified → assessed → mitigated → (realized = risk
          happened) → closed.'
      last_reviewed:
        type: string
        format: date
      next_review_due:
        type: string
        format: date
      related_features:
        type: array
        items:
          type: string
      related_epics:
        type: array
        items:
          type: string
      tags:
        type: array
        items:
          type: string
      body:
        type: string
      created_at:
        type: string
        format: date-time
      updated_at:
        type: string
        format: date-time
  summary:
    title: ''
    category: ''
    likelihood: null
    impact: null
    owner: ''
    status: ''
  graph_style:
    fill: '#EAB308'
    stroke: '#A16207'
    text_color: '#fff'
  ascii_icon: ⚠️
  display_label: Risks
  docs: 'One risk entry per RiskRegister doc. PMBOK 7 + ISO 31000:2018 compliant schema:
    cause→event→consequence description, category, likelihood × impact scoring, mitigation
    actions, residual score, owner, status lifecycle. Studio aggregates all RiskRegister
    docs into a heatmap.'
