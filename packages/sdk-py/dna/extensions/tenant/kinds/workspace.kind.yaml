# Workspace — the DNA Cloud tenancy root (record plane).
# A workspace is a first-class, named, DNA-native space (e.g. "Barnabé Labs")
# that a user creates and invites identities from ANY Azure org into — the
# GitHub/Slack shape (ADR "Model B"). Entra authenticates the IDENTITY;
# WorkspaceMembership (identity → workspace + role) decides what you see. The
# kernel `tenant` column carries this Kind's opaque `workspace_id`.
#
# THE ID IS OPAQUE, GENERATED AND IMMUTABLE — it is the physical value of the
# `tenant` column on every row the workspace owns; the name/slug are editable,
# the id never changes (renaming must never rewrite data — the GitHub org
# model). Decision **D5**: the id is MINTED BY THE SERVER at creation
# (`POST /v1/workspaces`) and is never derived from — nor equal to — an Azure
# `tid`. A `tid` is a fact of authentication only. The founding workspace's id
# happens to be a GUID that was once a `tid`; that is now historical trivia, not
# a rule, and nothing in this Kind treats it specially — an id is an id.
#
# BILLING IS PER ACCOUNT, NOT PER WORKSPACE. `account_id` records which billing
# account owns this workspace, written at creation from the caller's verified
# account claim. One `AccountPlan` covers every workspace sharing that id — so
# the second workspace is free, and there is exactly ONE place a tier is written.
# The enforcement path resolves workspace → account_id → AccountPlan; a workspace
# with no `account_id` gets the Free floor (fail-closed). The retired
# per-workspace `WorkspacePlan` is a write-block tombstone in
# `Kernel._REMOVED_KINDS`.
#
# Workspaces live in the `_lib` scope (`workspaces/<workspace_id>.yaml`) —
# Workspace is GLOBAL (the tenancy boundary lives above any single workspace,
# exactly like AccountPlan) and NOT inheritable.
#
# SINGLE-SOURCE package data: this descriptor is the only
# definition of the Kind — the packages/sdk-ts mirror and the test that
# enforced byte-identity (tests/test_descriptor_hash_parity.py) were BOTH
# removed when the TypeScript SDK was frozen (commit 341e517). Nothing
# mirrors this file and no test enforces byte-identity.
apiVersion: github.com/ruinosus/dna/core/v1
kind: KindDefinition
metadata:
  name: workspace
spec:
  target_api_version: github.com/ruinosus/dna/tenant/v1
  target_kind: Workspace
  alias: tenant-workspace
  origin: github.com/ruinosus/dna/tenant
  tenant_scope: global
  plane: record
  prompt_target: false
  flatten_in_context: false
  prompt_target_priority: 0
  storage:
    type: yaml
    container: workspaces
  schema:
    type: object
    additionalProperties: false
    required:
    - workspace_id
    - name
    - created_by
    - created_at
    properties:
      workspace_id:
        type: string
        description: Opaque, GENERATED, immutable id — the physical value of the
          `tenant` column on every row this workspace owns. Never changes
          (renaming edits name/slug, never this). The doc name SHOULD equal it.
          MINTED BY THE SERVER (decision D5); a client-supplied id is refused,
          which is what makes workspace takeover impossible by construction.
          Never derived from an Azure `tid`.
      name:
        type: string
        description: Human display name, e.g. "Barnabé Labs". Editable.
      slug:
        type: string
        description: URL-safe handle (e.g. for `/w/<slug>` links). Editable;
          distinct from the immutable workspace_id.
      created_by:
        type: string
        description: Email of the identity that created the workspace (its first
          Owner).
      created_at:
        type: string
        format: date-time
        description: When the workspace was created (ISO 8601).
      account_id:
        type:
        - string
        - 'null'
        description: The BILLING ACCOUNT that owns this workspace — an opaque id
          (like workspace_id it is matched WHOLE, never parsed), recorded AT
          CREATION from the caller's VERIFIED claims by
          dna.tenancy.account_id_from_claims. An account is an ORGANIZATION (the
          provider block's `tenant_claim` — Entra `tid`, WorkOS/Clerk/Auth0
          `org_id`, Google Workspace `hd`) or, when the sign-in belongs to no
          organization, a PERSON (the identity's durable `sub` — the consumer
          lane). The id is NAMESPACED by provider and kind (`entra-org:<tid>`,
          `workos-org:<org_id>`, `workos-user:<sub>`, ...) so a `tid` and a `sub`
          sharing a literal value can never be one account, and so the kind is
          legible; the prefix is for uniqueness and reading, NEVER a parsing or
          authorization surface. THE SUBSCRIPTION IS PER ACCOUNT - one AccountPlan
          covers EVERY workspace sharing this id, so a second workspace is never a
          second charge and never needs a second write. Null = no resolvable
          account, which resolves to the Free floor (fail-closed) — never another
          account's tier, never a paid default.
      plan_ref:
        type:
        - string
        - 'null'
        description: DEPRECATED, never read. Billing is per ACCOUNT, so the tier
          resolves as workspace → account_id → AccountPlan via
          kernel.account_plan(account_id) — never from a per-workspace field.
          Retained only so pre-existing docs carrying it still validate; writing
          it influences nothing.
  describe: '{name} ({workspace_id})'
  summary:
    workspace_id: ''
    name: ''
    slug: ''
  ui:
    mode: govern
    label:
      en: Workspaces
      pt-BR: Workspaces
    icon: 🗂️
    description:
      en: DNA-native tenancy spaces — cross-org collaboration (Model B).
      pt-BR: Espaços de tenancy nativos do DNA — colaboração entre orgs (Modelo B).
    routes:
      list: docs/Workspace
      detail: docs/Workspace/:name
    permissions:
      list: any
      detail: any
    in_sidebar: true
    display_order: 56
  ascii_icon: 🗂️
  display_label: Workspaces
  docs: A Workspace is the DNA tenancy root — a first-class, named, DNA-native
    space that authenticates identities from any Azure org via Entra and decides
    visibility through WorkspaceMembership (Model B, the GitHub/Slack shape). Its
    opaque, immutable workspace_id is the physical `tenant` column value on every
    row it owns, so renaming never rewrites data; the id is GENERATED by the
    server at creation and never derived from an Azure tid (decision D5). GLOBAL
    declarative data in `_lib`.
