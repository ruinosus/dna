[project]
name = "dna-sdk"
version = "0.2.0"
description = "DNA — Domain Notation of Anything: microkernel + extensions for declarative agent notation"
readme = "README.md"
license = "MIT"
keywords = ["dna", "agents", "declarative", "microkernel", "manifests", "prompts", "skills", "sdlc"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
# 3.12 floor (s-py312-floor): the first real consumer (an Azure Container
# Apps backend pinned >=3.12,<3.13) could not install the SDK under the old
# 3.13-only floor — that floor was a convenience decision from PR #1 whose
# single deliberate 3.13-ism is PEP 696 TypeVar(default=...) in
# dna/kernel/document.py, now sourced from typing_extensions on <3.13
# (conditional dependency below; zero cost on 3.13+). Ecosystem library →
# support N-1. The CI matrix {3.12, 3.13} keeps the floor from silently
# regressing.
requires-python = ">=3.12,<3.14"
dependencies = [
    "pyyaml>=6.0",
    "chevron>=0.14",
    "aiofiles>=24.1",
    "jsonschema>=4.0",
    # PEP 696 TypeVar(default=...) landed in stdlib typing on 3.13; on 3.12
    # dna/kernel/document.py imports it from typing_extensions (>=4.4 is the
    # first release with PEP 696). Env-markered so 3.13+ installs stay
    # zero-cost (s-py312-floor).
    "typing_extensions>=4.4; python_version < '3.13'",
]

[project.optional-dependencies]
# s-retire-raw-sql-adapters: the raw asyncpg/aiosqlite adapters are retired —
# the SQL path is SqlAlchemySource (adapters/sqlalchemy_) on both dialects,
# bound to the same tables (switching is pure instantiation — see
# docs/PORT-CONTRACT.md § "Using the SQLAlchemy adapter"). The `postgres` and
# `sqlite` extras KEEP their names (anyone who followed the docs keeps
# working) and now pull the engine + that dialect's async driver; `sql` is
# the umbrella for both. Nothing in the default install imports sqlalchemy
# (guard: tests/test_sqlalchemy_source.py::test_default_import_never_pulls_sqlalchemy).
postgres = ["sqlalchemy[asyncio]>=2", "asyncpg>=0.29"]
sqlite = ["sqlalchemy[asyncio]>=2", "aiosqlite>=0.20"]
redis = ["redis>=5.0"]
s3 = ["boto3>=1.28"]
tools = ["langchain-core>=1.4,<2"]
safety-ml = ["presidio-analyzer>=2.2", "presidio-anonymizer>=2.2", "spacy>=3.7", "detoxify>=0.5"]
sql = ["dna-sdk[sqlite,postgres]"]
# rec-embedding-port — the REAL EmbeddingPort (ONNX all-MiniLM-L6-v2 via
# fastembed, which drags onnxruntime). Deliberately OUT of `all`/`dev`: it is
# heavy (ONNX runtime) and the default/CI floor is the zero-dep
# FakeEmbeddingProvider. Nothing in the default install imports fastembed/onnx
# (guard: tests/test_embedding_import_isolation.py). Install explicitly to use
# real embeddings: pip install "dna-sdk[embed-onnx]".
embed-onnx = ["fastembed>=0.3"]
# rec-embeddable-provider — the embeddable RecordSearchProvider (sqlite-vec +
# FTS5 + RRF). sqlite-vec is a small, zero-dependency C extension (bundled by
# the pip package, loads anywhere SQLite runs) — the OFFLINE search floor, not
# a heavy dep. Kept OUT of `all` (opt-in per the story) but INCLUDED in `dev`
# so the provider conformance suite runs for real in CI with no server. Nothing
# in the default install imports sqlite_vec (guard:
# tests/test_search_import_isolation.py). Install explicitly to use search:
# pip install "dna-sdk[search-sqlite]".
search-sqlite = ["sqlite-vec>=0.1.6"]
# s-search-pgvector — the SCALE RecordSearchProvider (Postgres + pgvector +
# tsvector + RRF). Reuses the `postgres` extra's asyncpg driver: pgvector needs
# NO extra pip package (vectors ride as text literals over asyncpg; the `vector`
# extension is a server-side install, present in `pgvector/pgvector:pg16` used by
# the CI postgres job). Kept OUT of `all` (opt-in, and it needs a running
# pgvector Postgres) but INCLUDED in `dev` so the provider conformance suite runs
# for real in the CI postgres job. Nothing in the default install imports
# dna.adapters.search.pgvector (guard: tests/test_search_import_isolation.py).
# Install explicitly: pip install "dna-sdk[search-pgvector]".
search-pgvector = ["dna-sdk[postgres]"]
all = ["dna-sdk[postgres,sqlite,redis,s3,sql]"]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "pytest-xdist>=3.6",
    "pytest-timeout>=2.0",
    "httpx>=0.24",
    "dna-sdk[all]",
    # search-sqlite is the offline CI floor for the search plane — install it
    # in dev so tests/test_record_search_conformance.py runs the provider for
    # real (it importorskips only when the extra is genuinely absent).
    "dna-sdk[search-sqlite]",
    # s-search-pgvector — asyncpg (via [postgres]) so the pgvector provider
    # conformance suite runs for real in the CI postgres job (redundant with
    # [all] but explicit, mirroring search-sqlite).
    "dna-sdk[search-pgvector]",
    # s-dna-source-conformance-kit — in-process fake S3 so S3Source enters
    # the source-conformance matrix for real (not skip-forever).
    "moto>=5.0",
]

[project.entry-points."dna.extensions"]
helix = "dna.extensions.helix:HelixExtension"
agentskills = "dna.extensions.agentskills:AgentSkillsExtension"
soulspec = "dna.extensions.soulspec:SoulSpecExtension"
agentsmd = "dna.extensions.agentsmd:AgentsMdExtension"
guardrails = "dna.extensions.guardrails:GuardrailExtension"
kinddef = "dna.extensions.kinddef:KindDefinitionExtension"
hooks = "dna.extensions.hooks:HookExtension"
safety = "dna.extensions.safety:SafetyPolicyExtension"
recognizer = "dna.extensions.recognizer:RecognizerExtension"
evidence = "dna.extensions.evidence:EvidenceExtension"
audit = "dna.extensions.audit:AuditExtension"
collab = "dna.extensions.collab:CollabExtension"
sdlc = "dna.extensions.sdlc:SdlcExtension"
federation = "dna.extensions.federation:FederationExtension"
testkit = "dna.extensions.testkit:TestkitExtension"
tenant = "dna.extensions.tenant:TenantExtension"
lesson = "dna.extensions.lesson:LessonExtension"
research = "dna.extensions.research:ResearchExtension"
doc = "dna.extensions.doc:DocExtension"
modelreg = "dna.extensions.modelreg:ModelRegExtension"
automation = "dna.extensions.automation:AutomationExtension"
eval = "dna.extensions.eval:EvalExtension"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["dna"]

[tool.pytest.ini_options]
testpaths = ["tests"]
# Default wall-clock cap so a hung test fails fast instead of running to the CI
# job limit. Heavy-but-real tests override with @pytest.mark.timeout(N). The CI
# workflow also passes --timeout=120 as a backstop. See tests/conftest.py.
timeout = 120
# s-blessed-query-surface ratchet: the SDK's own code/tests must never call
# the deprecated MI query shims (mi.all/mi.one) or trip the lazy-materialize
# warning — those DeprecationWarnings (all prefixed "ManifestInstance") fail
# the suite. Tests that deliberately exercise the shims capture the warning
# (pytest.warns / warnings.catch_warnings), which bypasses this filter.
filterwarnings = [
    "error:ManifestInstance:DeprecationWarning",
]
markers = [
    "requires_postgres: skip unless a Postgres DSN is set (tests/conftest.py)",
    "requires_network: skip unless outbound network is available (tests/conftest.py)",
    "requires_llm: skip unless a real OPENAI_API_KEY is set (tests/conftest.py)",
]

[dependency-groups]
dev = [
    "aiosqlite>=0.22.1",
]

[project.urls]
Homepage = "https://ruinosus.github.io/dna/"
Repository = "https://github.com/ruinosus/dna"
Documentation = "https://ruinosus.github.io/dna/"
Changelog = "https://github.com/ruinosus/dna/blob/main/CHANGELOG.md"
Issues = "https://github.com/ruinosus/dna/issues"
