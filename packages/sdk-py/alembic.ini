# Alembic config for DEVELOPER use at the sdk-py root (i-038).
#
# The library itself does NOT read this file — SqlAlchemySource builds its
# Config programmatically (see adapters/sqlalchemy_/migrate.py) so the
# packaged wheel needs no ini on the consumer's disk. This exists so a
# developer evolving the schema can run, against a throwaway database:
#
#   alembic -x url=postgresql+psycopg2://... revision --autogenerate -m "..."
#   alembic -x url=sqlite:///dev.db upgrade head
#   alembic -x url=... check      # non-zero exit if model != database
#
# `alembic check` is the same comparison tests/test_schema_autogenerate_guard.py
# runs in CI; the CLI form is for iterating locally.

[alembic]
script_location = dna/adapters/sqlalchemy_/alembic
prepend_sys_path = .
# No sqlalchemy.url here on purpose: a default URL is how someone
# accidentally autogenerates against the wrong database. Pass -x url=...
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
