# dna.config.sample.yaml — REFERENCE for `dna mcp serve --auth config` (and
# `dna api serve --auth config`), the pluggable N-provider IdP layer.
#
# `--auth config` reads the `auth.providers[]` list below and builds one JWT
# verifier per provider (composed into a multi-issuer router that routes each
# token to its provider by `iss` and stamps the per-provider tenant claim for the
# DNA tenancy bridge). This is the path with correct **audience-only** validation
# for Entra's multi-tenant `/organizations` endpoint — the env-driven `--auth jwt`
# path validates a fixed single-tenant issuer and would reject `/organizations`
# tokens.
#
# The server still reads the SOURCE from the environment (DNA_SOURCE_URL /
# DNA_BASE_DIR); the `source:` here is only required for the file to validate —
# `--auth config` consumes ONLY the `auth:` section.

# Where the DNA documents live (validated, but the CLI boot reads the source from
# DNA_SOURCE_URL / DNA_BASE_DIR — this line is not the runtime source selector).
source: postgresql://dna:dna@db.internal:5432/dna
# source: file:///mnt/dna

search: off        # pgvector | sqlite-vec | off
embedding: off     # onnx | fake | off

# ── auth: the pluggable N-provider IdP layer (`--auth config`) ───────────────
auth:
  providers:
    # Microsoft Entra, MULTI-TENANT. `issuer` is the `/organizations` endpoint —
    # its tokens carry the CALLER's real Azure tenant GUID in `iss` (never the
    # literal `organizations`), so the verifier validates by **audience +
    # signature** (the security boundary is your MCP app-id `audience`) and the
    # DNA tenant is taken from the `tid` claim (globally unique per org). A token
    # from ANY Entra org that presents this audience is accepted and isolated to
    # its own `tid` (the tenancy bridge + `resolve_tenant` fail-close cross-tid).
    - type: entra
      name: entra-organizations
      issuer: https://login.microsoftonline.com/organizations/v2.0
      audience: api://dna-mcp-dnacloud      # the App ID URI you exposed
      # tenant_claim defaults to `tid` for entra; jwks derived from the issuer:
      #   https://login.microsoftonline.com/organizations/discovery/v2.0/keys

    # A SINGLE-TENANT Entra provider instead pins a concrete tenant issuer (strict
    # `iss` validation). Use this shape when you want to admit exactly one org:
    # - type: entra
    #   issuer: https://login.microsoftonline.com/<tenant-guid>/v2.0
    #   audience: api://dna-mcp-dnacloud

    # Any OIDC-generic IdP (Clerk/WorkOS/Auth0 have first-class types too). A
    # generic `oidc` provider MUST name the claim that carries the DNA tenant.
    # - type: oidc
    #   issuer: https://id.example.com/
    #   audience: dna-mcp
    #   tenant_claim: org_id

# ── multi-tenant base-scope isolation (H2) — set via ENV, not this file ──────
# When the runtime is multi-tenant, set these on the container so a NEW outside
# tenant never reads the vendor's base scope as its own (see LiveDna.default_scope):
#   DNA_VENDOR_TENANT       the reserved vendor tenant `tid` — it keeps reading the
#                           base scope (DNA_SCOPE_DEFAULT, e.g. dna-development);
#                           EVERY other tenant defaults to its own `tenant-<tid>`.
#   DNA_TENANT_SCOPE_PREFIX per-tenant scope prefix (default `tenant-`).
# Unset DNA_VENDOR_TENANT ⇒ single-tenant (every default stays the base scope).
