      - "Digest: what happened while you were away": guides/sdlc-digest.md
      - "Gallery: the artifacts you need to review": guides/sdlc-gallery.md
  # Reference — GENERATED FROM SOURCE. The three API sub-references (Python via
  # mkdocstrings, CLI + Kinds via scripts/gen_*_docs.py) are wired through
  # literate-nav: each generated subtree is discovered via
  # `reference/SUMMARY.md` (the section spine) without this file having to
  # hand-list every page (s-docs-api-reference).
  - Reference: reference/

markdown_extensions:
  # Admonitions + collapsible blocks
  - admonition
  - pymdownx.details
  # Code blocks, content tabs.
  # The mermaid custom fence renders ```mermaid blocks as diagrams on the
  # site (Material ships the Mermaid.js integration); GitHub renders the
  # same fences natively.
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  # Grid cards on the landing page
  - attr_list
  - md_in_html
  # Emoji + Material icons (used by the grid cards)
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # Nice tables, footnotes, task lists, heading anchors
  - tables
  - footnotes
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

plugins:
  - search
  # literate-nav — lets each generated reference subtree declare its own nav
  # (SUMMARY.md) so the variable, source-generated file set is discovered
  # without hand-listing every page in this file (s-docs-api-reference).
  - literate-nav:
      nav_file: SUMMARY.md
  # mkdocstrings — renders the Python API reference INLINE from the `dna`
  # package docstrings (`::: dna.kernel.Kernel`). Requires the `dna` SDK to be
  # importable in the build env; the docs CI job installs it before building.
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [packages/sdk-py]
          options:
            show_root_heading: true
            show_source: false
            show_signature_annotations: true
            separate_signature: true
            # docstring_style: null — the DNA source docstrings are prose, not
            # strict Google/Numpy sections; parsing them structurally makes
            # griffe emit "Failed to get exception:description" warnings that
            # `--strict` turns fatal. Rendering them as-is markdown keeps every
            # word (the docstrings ARE the source of truth) without the noise.
            docstring_style: null
            merge_init_into_class: true
            show_if_no_docstring: false
            members_order: source

# ADRs (docs/adr/), design specs (docs/design/) and implementation plans
# (docs/plans/) live as versioned repo artifacts — they land on main with the
# code they justify, not as rendered site pages — so exclude them from the
# strict build's nav-coverage check.
exclude_docs: |
  adr/
  design/
  plans/

# Make the build gate meaningful: with `mkdocs build --strict` these
# warnings become hard errors, so a broken internal link or anchor fails CI.
# Working documents that LIVE under docs/ but are deliberately not site pages:
# the superpowers brainstorming specs (design docs the composed flow produces
# at docs/superpowers/specs/ — its own convention). Without this, the first
# such file aborts `mkdocs build --strict` with an omitted-from-nav warning —
# which is exactly how main's docs build broke on 2026-07-21.
not_in_nav: |
  superpowers/

validation:
  nav:
    omitted_files: warn
    not_found: warn
  links:
    not_found: warn
    anchors: warn
    absolute_links: ignore
    unrecognized_links: warn
