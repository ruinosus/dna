site_name: DNA — Domain Notation of Anything
site_description: >-
  A declarative, typed notation for agentic behavior. Kubernetes CRDs, but
  for agents, skills, souls, guardrails and policies — behavior as versioned
  data, not code.
site_url: https://ruinosus.github.io/dna/
repo_url: https://github.com/ruinosus/dna
repo_name: ruinosus/dna
edit_uri: edit/main/docs/
copyright: MIT-licensed. DNA — Domain Notation of Anything.

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Tutorials:
      - getting-started/index.md
      - Your first Kind: getting-started/first-kind.md
      - Running the conformance kit: getting-started/conformance-kit.md
      - Make your project agent-ready: getting-started/agent-onboarding.md
  - Concepts:
      - concepts/index.md
      - The thesis — CRDs for agent behavior: concepts/thesis.md
      - Kinds — identity & composition: concepts/kinds.md
      - The built-in Kinds — a catalog: concepts/builtin-kinds.md
      - Microkernel & the five ports: concepts/microkernel-ports.md
      - Market fidelity: concepts/market-fidelity.md
      - Tenancy & layers: concepts/tenancy-layers.md
      - Search & memory: concepts/search-and-memory.md
      - Agent-facing knowledge: concepts/agent-knowledge.md
  - How-to guides:
      - guides/index.md
      - A tour of the dna CLI: guides/cli-tour.md
      - How to author an agent: guides/authoring-agents.md
      - How to consume prompts: guides/consuming-prompts.md
      - Tools as data: guides/tools-as-data.md
      - Emitting to a runtime (the de-para): guides/emitting-to-a-runtime.md
      - How to write an emitter: guides/writing-an-emitter.md
      - "Copilot persistence — the Mongo path": guides/copilot-persistence-mongo.md
      - "Spec Kit — the supported spec-driven flow": guides/spec-kit.md
      - "Spec Kit + DNA's live memory over MCP": guides/spec-kit-live-memory.md
      - "Spec Kit templates, served by DNA": guides/spec-kit-templates.md
      - The MCP server — DNA as a live layer: guides/mcp-server.md
      - The REST read-API — DNA's HTTP face for web apps: guides/rest-api.md
      - "Using the DNA client — typed REST access": guides/using-the-client.md
      - Hosting the MCP server on Azure (ACA + Entra): guides/hosting-mcp-aca.md
      - "On-Behalf-Of — MCP tools act on your Microsoft 365": guides/mcp-obo.md
      - "Act on behalf — one calendar tool, any provider": guides/act-on-behalf.md
      - "Copilot hosting — the hosted variant (Foundry)": guides/copilot-hosting.md
      - "Copilot infra binding — persistence/hosting to Terraform": guides/copilot-infra-binding.md
      - The DNA Cloud starter catalog & BYO-DNA: guides/dna-cloud-catalog.md
      - How to configure ports (dna.config.yaml): guides/configuring-ports.md
      - How to ship a scope with your app: guides/shipping-a-scope.md
      - How to install bundles from a repository: guides/installing-scopes.md
      - How to add a Kind: guides/add-a-kind.md
      - How to read document data: guides/read-document-data.md
      - How to write a source adapter: guides/write-a-source-adapter.md
      - How to write a Reader/Writer: guides/readers-and-writers.md
      - How to use semantic recall & memory: guides/semantic-recall.md
      - "Engram rename — the Postgres cutover runbook": guides/engram-postgres-cutover.md
