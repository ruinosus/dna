site_name: DNA — Domain Notation of Anything
site_description: >-
  A declarative, typed notation for agentic behavior. Kubernetes CRDs, but
  for agents, skills, souls, guardrails and policies — behavior as versioned
  data, not code.
site_url: https://ruinosus.github.io/dna/
repo_url: https://github.com/ruinosus/dna
repo_name: ruinosus/dna
edit_uri: edit/main/docs/
copyright: MIT-licensed. DNA — Domain Notation of Anything.

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Tutorials:
      - getting-started/index.md
      - Your first Kind: getting-started/first-kind.md
      - Running the conformance kit: getting-started/conformance-kit.md
      - Make your project agent-ready: getting-started/agent-onboarding.md
  - Concepts:
      - concepts/index.md
      - The thesis — CRDs for agent behavior: concepts/thesis.md
      - Kinds — identity & composition: concepts/kinds.md
      - The built-in Kinds — a catalog: concepts/builtin-kinds.md
      - Microkernel & the five ports: concepts/microkernel-ports.md
      - Market fidelity: concepts/market-fidelity.md
      - Tenancy & layers: concepts/tenancy-layers.md
      - Search & memory: concepts/search-and-memory.md
      - Agent-facing knowledge: concepts/agent-knowledge.md
  - How-to guides:
      - guides/index.md
      - A tour of the dna CLI: guides/cli-tour.md
      - How to author an agent: guides/authoring-agents.md
      - How to consume prompts: guides/consuming-prompts.md
      - How to configure ports (dna.config.yaml): guides/configuring-ports.md
      - How to ship a scope with your app: guides/shipping-a-scope.md
      - How to install bundles from a repository: guides/installing-scopes.md
      - How to add a Kind: guides/add-a-kind.md
      - How to read document data: guides/read-document-data.md
      - How to write a source adapter: guides/write-a-source-adapter.md
      - How to write a Reader/Writer: guides/readers-and-writers.md
      - How to use semantic recall & memory: guides/semantic-recall.md
      - How to evaluate agents: guides/evaluating-agents.md
      - Your git log is your SDLC: guides/sdlc.md
  # Reference — GENERATED FROM SOURCE. The four API sub-references (Python via
  # mkdocstrings, TypeScript via TypeDoc, CLI + Kinds via scripts/gen_*_docs.py)
  # plus the Py↔TS parity matrix are wired through literate-nav: each generated
  # subtree is discovered via `reference/SUMMARY.md` (the section spine) without
  # this file having to hand-list every page (s-docs-api-reference).
  - Reference: reference/

markdown_extensions:
  # Admonitions + collapsible blocks
  - admonition
  - pymdownx.details
  # Code blocks, content tabs, side-by-side Python/TypeScript.
  # The mermaid custom fence renders ```mermaid blocks as diagrams on the
  # site (Material ships the Mermaid.js integration); GitHub renders the
  # same fences natively.
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  # Grid cards on the landing page
  - attr_list
  - md_in_html
  # Emoji + Material icons (used by the grid cards)
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # Nice tables, footnotes, task lists, heading anchors
  - tables
  - footnotes
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

plugins:
  - search
  # literate-nav — lets each generated reference subtree declare its own nav
  # (SUMMARY.md) so the variable, source-generated file set is discovered
  # without hand-listing every page in this file (s-docs-api-reference).
  - literate-nav:
      nav_file: SUMMARY.md
  # mkdocstrings — renders the Python API reference INLINE from the `dna`
  # package docstrings (`::: dna.kernel.Kernel`). Requires the `dna` SDK to be
  # importable in the build env; the docs CI job installs it before building.
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [packages/sdk-py]
          options:
            show_root_heading: true
            show_source: false
            show_signature_annotations: true
            separate_signature: true
            # docstring_style: null — the DNA source docstrings are prose, not
            # strict Google/Numpy sections; parsing them structurally makes
            # griffe emit "Failed to get exception:description" warnings that
            # `--strict` turns fatal. Rendering them as-is markdown keeps every
            # word (the docstrings ARE the source of truth) without the noise.
            docstring_style: null
            merge_init_into_class: true
            show_if_no_docstring: false
            members_order: source

# Make the build gate meaningful: with `mkdocs build --strict` these
# warnings become hard errors, so a broken internal link or anchor fails CI.
validation:
  nav:
    omitted_files: warn
    not_found: warn
  links:
    not_found: warn
    anchors: warn
    absolute_links: ignore
    unrecognized_links: warn
